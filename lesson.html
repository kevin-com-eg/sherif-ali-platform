<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Lesson</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10">

<div class="max-w-4xl mx-auto p-4">
    <div id="lessonHeader" class="text-center mb-8">
        <h1 id="lessonTitle" class="text-4xl font-bold text-gray-800">Loading...</h1>
    </div>

    <div id="startScreen" class="text-center">
        <button id="startBtn" class="bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-2xl font-bold shadow-xl transition transform hover:scale-105">
            Start Lesson Quiz
        </button>
    </div>

    <div id="quizBox" class="hidden bg-white p-6 rounded-2xl shadow-xl border border-gray-200">
        <div id="progress" class="text-sm text-gray-500 mb-4 font-bold uppercase tracking-widest"></div>
        <img id="qImg" class="w-full rounded-xl mb-6 shadow-sm border">
        
        <div id="options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

        <button id="nextBtn" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 mt-8 rounded-xl font-bold shadow-lg transition">
            Next Question →
        </button>
    </div>

    <div id="resultBox" class="hidden animate-fade-in">
        <div class="bg-white p-8 rounded-2xl shadow-xl text-center mb-6">
            <h2 class="text-4xl font-black text-blue-600 mb-2" id="finalScore"></h2>
            <p class="text-gray-500">Exam completed! Review your performance below.</p>
        </div>

        <div class="flex bg-gray-200 p-1 rounded-xl mb-6">
            <button onclick="showTab('review')" id="tabRev" class="flex-1 py-3 rounded-lg font-bold bg-white shadow text-blue-600">Review Answers</button>
            <button onclick="showTab('video')" id="tabVid" class="flex-1 py-3 rounded-lg font-bold text-gray-600">Watch Explanation</button>
        </div>

        <div id="reviewTab" class="space-y-4"></div>

        <div id="videoTab" class="hidden bg-white p-4 rounded-2xl shadow-xl">
            <div id="videoContainer" class="aspect-video w-full"></div>
        </div>
    </div>
</div>

<script type="module">
    import { db } from "./firebase.js"
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

    const urlId = new URLSearchParams(window.location.search).get("id");
    let lessonData, questions = [], current = 0, userAnswers = [];

    // جلب الداتا
    async function init() {
        if(!urlId) return alert("No Lesson ID provided!");
        const snap = await getDoc(doc(db, "lessons", urlId));
        if(!snap.exists()) return alert("Lesson not found!");
        
        lessonData = snap.data();
        questions = lessonData.questions;
        document.getElementById("lessonTitle").innerText = lessonData.name;
    }

    window.startBtn.onclick = () => {
        document.getElementById("startScreen").classList.add("hidden");
        document.getElementById("quizBox").classList.remove("hidden");
        loadQ();
    };

    function loadQ() {
        let q = questions[current];
        document.getElementById("progress").innerText = `Question ${current + 1} / ${questions.length}`;
        document.getElementById("qImg").src = q.image;
        
        document.getElementById("options").innerHTML = ['a','b','c','d'].map(opt => `
            <label class="flex items-center p-4 border-2 rounded-xl cursor-pointer hover:bg-blue-50 transition border-gray-100">
                <input type="radio" name="choice" value="${opt}" class="w-5 h-5 mr-3">
                <span class="font-bold text-gray-700">${opt.toUpperCase()}: ${q[opt]}</span>
            </label>
        `).join('');
    }

    window.nextBtn.onclick = () => {
        let selected = document.querySelector('input[name="choice"]:checked');
        if(!selected) return alert("Select an answer!");

        userAnswers.push(selected.value);
        current++;

        if(current < questions.length) loadQ();
        else finish();
    };

    function finish() {
        document.getElementById("quizBox").classList.add("hidden");
        document.getElementById("resultBox").classList.remove("hidden");

        let score = 0;
        let reviewHTML = "";

        questions.forEach((q, i) => {
            let isCorrect = userAnswers[i] === q.correct;
            if(isCorrect) score++;
            
            reviewHTML += `
                <div class="bg-white p-4 rounded-xl shadow border-l-8 ${isCorrect ? 'border-green-500' : 'border-red-500'}">
                    <img src="${q.image}" class="w-48 rounded mb-2">
                    <p class="font-bold">Your: <span class="${isCorrect ? 'text-green-600' : 'text-red-600'}">${userAnswers[i].toUpperCase()}</span> | Correct: <span class="text-green-600">${q.correct.toUpperCase()}</span></p>
                </div>`;
        });

        document.getElementById("finalScore").innerText = `${score} / ${questions.length}`;
        document.getElementById("reviewTab").innerHTML = reviewHTML;

        // تجهيز الفيديو
        if(lessonData.videoUrl) {
            let vidId = lessonData.videoUrl.split('v=')[1]?.split('&')[0] || lessonData.videoUrl.split('/').pop();
            document.getElementById("videoContainer").innerHTML = `<iframe class="w-full h-full rounded-xl" src="https://www.youtube.com/embed/${vidId}" frameborder="0" allowfullscreen></iframe>`;
        }
    }

    window.showTab = (type) => {
        const isRev = type === 'review';
        document.getElementById("reviewTab").classList.toggle("hidden", !isRev);
        document.getElementById("videoTab").classList.toggle("hidden", isRev);
        
        document.getElementById("tabRev").className = isRev ? "flex-1 py-3 rounded-lg font-bold bg-white shadow text-blue-600" : "flex-1 py-3 rounded-lg font-bold text-gray-600";
        document.getElementById("tabVid").className = !isRev ? "flex-1 py-3 rounded-lg font-bold bg-white shadow text-blue-600" : "flex-1 py-3 rounded-lg font-bold text-gray-600";
    }

    init();
</script>
</body>
</html>
