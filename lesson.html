<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | الحصة الذكية</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; user-select: none; background: #f1f5f9; min-height: 100vh; }
        :root { --plyr-color-main: #f97316; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .video-container { border-radius: 2rem; overflow: hidden; border: 6px solid white; background: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .btn-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); transition: all 0.3s; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }
        
        /* مراجعة الأسئلة - النسخة الكبيرة */
        .review-card { border-radius: 1.5rem; border-right: 12px solid; padding: 2rem; margin-bottom: 1.5rem; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .review-card.correct { border-right-color: #22c55e; }
        .review-card.wrong { border-right-color: #ef4444; }
        .review-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 1rem; margin-bottom: 1rem; background: #f8fafc; padding: 10px; border: 1px solid #eee; }
        
        .plyr__video-embed iframe { pointer-events: none !important; }
    </style>
</head>
<body class="text-slate-800">

    <div id="authArea" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-md text-center shadow-2xl">
            <div class="text-6xl mb-6">🎫</div>
            <h2 class="text-3xl font-black mb-2 text-slate-900">تفعيل الحصة</h2>
            <p class="text-slate-500 mb-8">أدخل الكود الخاص بك لفتح المحتوى</p>
            <input id="accessCode" type="text" placeholder="XXXX-XXXX" class="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl mb-6 text-center font-black text-2xl uppercase outline-none focus:border-orange-500 transition-all">
            <button id="verifyBtn" class="w-full btn-gradient text-white font-black py-5 rounded-2xl text-xl">تفعيل الوصول الآن</button>
            <p id="authError" class="hidden text-red-500 mt-4 font-bold">⚠️ الكود غير صحيح أو منتهي الصلاحية</p>
        </div>
    </div>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 p-4 border-b">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 id="lessonTitle" class="text-xl font-black text-slate-800 italic">جاري التحميل...</h1>
                <p id="expiryDisplay" class="text-xs font-bold text-red-500 mt-1"></p>
            </div>
            <a href="dashboard.html" class="bg-slate-100 px-4 py-2 rounded-xl text-sm font-bold text-slate-500">خروج</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <section id="startExamScreen" class="hidden text-center py-20 glass-card">
            <div class="text-8xl mb-6">🚀</div>
            <h2 class="text-4xl font-black mb-4">تم تفعيل الحصة بنجاح!</h2>
            <p class="text-slate-500 text-lg mb-10 font-bold">يجب عليك اجتياز امتحان الدخول أولاً لمشاهدة فيديو الشرح.</p>
            <button id="goToQuizBtn" class="btn-gradient text-white px-16 py-6 rounded-3xl font-black text-2xl shadow-2xl">ابدأ الامتحان الآن</button>
        </section>

        <section id="quizScreen" class="hidden space-y-6">
            <div class="glass-card p-10 text-center">
                <div id="qBox" class="space-y-8">
                    <div class="flex justify-between items-center text-orange-600 font-black mb-4">
                        <span id="qProgress">السؤال 1</span>
                        <span>📝 امتحان الدخول</span>
                    </div>
                    <img id="qImg" src="" class="w-full max-h-96 object-contain rounded-2xl bg-slate-50 border shadow-inner">
                    <div id="options" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
                    <button id="nextBtn" class="w-full btn-gradient text-white py-6 rounded-3xl font-black text-2xl shadow-xl mt-6">تأكيد الإجابة والتاالي ←</button>
                </div>
            </div>
        </section>

        <section id="contentScreen" class="hidden space-y-10">
            <div class="bg-slate-900 text-white p-12 rounded-[3rem] shadow-2xl text-center border-b-8 border-orange-500">
                <p class="text-orange-400 font-black text-lg mb-2 uppercase tracking-widest">Your Score</p>
                <div id="scoreDisplay" class="text-8xl font-black mb-8">0 / 0</div>
                <a id="pdfLink" href="#" target="_blank" class="hidden bg-red-600 hover:bg-red-700 text-white px-10 py-5 rounded-2xl font-black text-lg transition-all inline-flex items-center gap-3">
                    تحميل ملزمة الحصة PDF 📥
                </a>
            </div>

            <div class="flex bg-slate-200 p-2 rounded-3xl gap-2">
                <button id="tabVid" class="flex-1 py-5 font-black rounded-2xl bg-white shadow-xl text-orange-600 transition-all text-lg">فيديو الشرح 📺</button>
                <button id="tabRev" class="flex-1 py-5 font-black rounded-2xl text-slate-500 transition-all text-lg">مراجعة الأسئلة 📝</button>
            </div>

            <div id="videoBox" class="video-container">
                <video id="player" playsinline controls></video>
            </div>

            <div id="reviewBox" class="hidden space-y-6">
                <h3 class="text-2xl font-black text-slate-800 mb-6 mr-4">تقرير الإجابات بالتفصيل:</h3>
                <div id="reviewList"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo", 
            authDomain: "math-e62c9.firebaseapp.com", 
            projectId: "math-e62c9", 
            appId: "1:271507842148:web:2907aad4caf67afd08ab71" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const lessonId = new URLSearchParams(window.location.search).get("id");

        let currentUser, lessonData, currentQ = 0, answers = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) { currentUser = user; checkFlow(); }
            else { window.location.href = "login.html"; }
        });

        async function checkFlow() {
            const enrollSnap = await getDoc(doc(db, "enrollments", `${currentUser.uid}_${lessonId}`));
            if (!enrollSnap.exists()) {
                document.getElementById("authArea").classList.remove("hidden");
                return;
            }

            // التحقق من صلاحية الحصة
            const lessonSnap = await getDoc(doc(db, "lessons", lessonId));
            lessonData = lessonSnap.data();
            
            if (lessonData.expiryDate) {
                const now = new Date();
                const exp = new Date(lessonData.expiryDate);
                if (now > exp) {
                    alert("عذراً، هذه الحصة انتهت صلاحيتها.");
                    window.location.href = "dashboard.html";
                    return;
                }
                document.getElementById("expiryDisplay").innerText = `صلاحية الحصة حتى: ${exp.toLocaleDateString('ar-EG')}`;
            }

            document.getElementById("lessonTitle").innerText = lessonData.name;

            // التحقق من الامتحان
            if (localStorage.getItem(`done_${currentUser.uid}_${lessonId}`)) {
                showFinal();
            } else {
                document.getElementById("startExamScreen").classList.remove("hidden");
            }
        }

        document.getElementById("goToQuizBtn").onclick = () => {
            document.getElementById("startExamScreen").classList.add("hidden");
            document.getElementById("quizScreen").classList.remove("hidden");
            renderQ();
        };

        function renderQ() {
            const q = lessonData.questions[currentQ];
            document.getElementById("qProgress").innerText = `سؤال ${currentQ + 1} من ${lessonData.questions.length}`;
            document.getElementById("qImg").src = q.image;
            document.getElementById("options").innerHTML = ['a','b','c','d'].map(opt => `
                <label class="p-6 border-2 rounded-2xl flex items-center gap-4 cursor-pointer bg-white hover:border-orange-500 transition-all shadow-sm">
                    <input type="radio" name="q" value="${opt}" class="w-6 h-6 accent-orange-600">
                    <span class="font-black text-xl uppercase">${opt}: ${q[opt]}</span>
                </label>
            `).join('');
        }

        document.getElementById("nextBtn").onclick = () => {
            const sel = document.querySelector('input[name="q"]:checked');
            if(!sel) return alert("اختار إجابة يا بطل!");
            answers.push(sel.value);
            currentQ++;
            if(currentQ < lessonData.questions.length) renderQ();
            else {
                localStorage.setItem(`done_${currentUser.uid}_${lessonId}`, "true");
                localStorage.setItem(`ans_${currentUser.uid}_${lessonId}`, JSON.stringify(answers));
                showFinal();
            }
        };

        function showFinal() {
            document.getElementById("quizScreen").classList.add("hidden");
            document.getElementById("startExamScreen").classList.add("hidden");
            document.getElementById("contentScreen").classList.remove("hidden");

            const saved = JSON.parse(localStorage.getItem(`ans_${currentUser.uid}_${lessonId}`)) || [];
            let score = 0;
            let html = "";

            lessonData.questions.forEach((q, i) => {
                const isCorrect = saved[i] === q.correct;
                if(isCorrect) score++;
                html += `
                    <div class="review-card ${isCorrect ? 'correct' : 'wrong'}">
                        <img src="${q.image}" class="review-img">
                        <h4 class="text-2xl font-black mb-3 ${isCorrect ? 'text-green-600' : 'text-red-600'}">
                            ${isCorrect ? 'إجابة صحيحة ✅' : 'إجابة خاطئة ❌'}
                        </h4>
                        <div class="flex gap-4 text-lg font-bold">
                            <span class="bg-slate-100 px-4 py-2 rounded-lg">إجابتك: (${saved[i].toUpperCase()})</span>
                            <span class="bg-green-100 text-green-700 px-4 py-2 rounded-lg">الإجابة الصحيحة: (${q.correct.toUpperCase()})</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById("scoreDisplay").innerText = `${score} / ${lessonData.questions.length}`;
            document.getElementById("reviewList").innerHTML = html;

            if (lessonData.pdf) {
                document.getElementById("pdfLink").href = lessonData.pdf;
                document.getElementById("pdfLink").classList.remove("hidden");
            }

            if (lessonData.video) {
                const vidId = lessonData.video.split('v=')[1]?.split('&')[0] || lessonData.video.split('/').pop();
                const player = new Plyr('#player', {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                    settings: ['quality', 'speed'],
                    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
                });
                player.source = { type: 'video', sources: [{ src: vidId, provider: 'youtube' }] };
            }
        }

        // الأزرار
        document.getElementById("tabVid").onclick = function() {
            document.getElementById("videoBox").classList.remove("hidden");
            document.getElementById("reviewBox").classList.add("hidden");
            this.className = "flex-1 py-5 font-black rounded-2xl bg-white shadow-xl text-orange-600 text-lg";
            document.getElementById("tabRev").className = "flex-1 py-5 font-black rounded-2xl text-slate-500 text-lg";
        };
        document.getElementById("tabRev").onclick = function() {
            document.getElementById("reviewBox").classList.remove("hidden");
            document.getElementById("videoBox").classList.add("hidden");
            this.className = "flex-1 py-5 font-black rounded-2xl bg-white shadow-xl text-orange-600 text-lg";
            document.getElementById("tabVid").className = "flex-1 py-5 font-black rounded-2xl text-slate-500 text-lg";
        };

        document.getElementById("verifyBtn").onclick = async () => {
            const code = document.getElementById("accessCode").value.trim().toUpperCase();
            if(!code) return;
            const snap = await getDoc(doc(db, "codes", code));
            if(snap.exists() && !snap.data().used) {
                await updateDoc(doc(db, "codes", code), { used: true, usedBy: currentUser.email });
                await setDoc(doc(db, "enrollments", `${currentUser.uid}_${lessonId}`), { active: true });
                location.reload();
            } else { document.getElementById("authError").classList.remove("hidden"); }
        };

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
