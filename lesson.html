<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Lesson</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; }
        #vidContainer iframe { width: 100%; height: 100%; border-radius: 12px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4">

    <div class="max-w-3xl mx-auto">
        <h1 id="lessonTitle" class="text-3xl font-black text-center my-6 text-gray-800 tracking-tighter"></h1>

        <div id="quizArea" class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
            <div id="progress" class="text-blue-600 font-bold mb-4 text-sm uppercase"></div>
            <img id="qImg" class="w-full rounded-xl mb-6 shadow-sm border border-gray-200">
            <div id="options" class="grid grid-cols-1 gap-3"></div>
            <button id="nextBtn" class="w-full bg-orange-500 text-white py-4 mt-8 rounded-xl font-black shadow-lg hover:bg-orange-600 transition uppercase">Next Question →</button>
        </div>

        <div id="resultsScreen" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-2xl shadow-xl text-center border-t-8 border-blue-600">
                <h2 id="finalScore" class="text-5xl font-black text-blue-600 mb-2"></h2>
                <p class="text-gray-400 font-bold">EXAM COMPLETED</p>
            </div>

            <div class="flex bg-white rounded-xl shadow border p-1">
                <button id="btnReview" class="flex-1 py-3 font-bold active-tab transition">Review Answers</button>
                <button id="btnVideo" class="flex-1 py-3 font-bold text-gray-400 transition">Watch Explanation</button>
            </div>

            <div id="reviewTab" class="space-y-4"></div>

            <div id="videoTab" class="hidden bg-white p-4 rounded-2xl shadow-xl">
                <div id="vidContainer" class="aspect-video w-full bg-black rounded-xl overflow-hidden shadow-inner">
                    </div>
            </div>
        </div>
    </div>
