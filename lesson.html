<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | الحصة الذكية</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; user-select: none; background: #f8fafc; min-height: 100vh; }
        :root { --plyr-color-main: #f97316; }
        
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .video-container { border-radius: 1.5rem; overflow: hidden; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); border: 4px solid white; background: #000; position: relative; }
        
        /* منع نسخ رابط اليوتيوب */
        .plyr__video-embed iframe { pointer-events: none !important; }
        
        .btn-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); transition: all 0.2s; }
        
        /* تنسيق كروت المراجعة */
        .review-card { border-right: 6px solid; transition: transform 0.2s; }
        .review-card.correct { border-right-color: #22c55e; background: #f0fdf4; }
        .review-card.wrong { border-right-color: #ef4444; background: #fef2f2; }
        .review-img { width: 80px; height: 60px; object-fit: contain; border-radius: 8px; background: white; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-800">

    <div id="authArea" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-6">تفعيل الحصة 🔑</h2>
            <input id="accessCode" type="text" placeholder="أدخل الكود هنا" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl mb-6 text-center font-black text-2xl uppercase outline-none focus:border-orange-500">
            <button id="verifyBtn" class="w-full btn-gradient text-white font-black py-4 rounded-2xl text-lg">تفعيل الوصول</button>
            <p id="authError" class="hidden text-red-500 mt-4 font-bold">⚠️ الكود غير صحيح!</p>
        </div>
    </div>

    <header class="glass-card sticky top-0 z-40 p-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 id="lessonTitle" class="text-lg font-black text-orange-600">تحميل...</h1>
            <a href="dashboard.html" class="text-xs font-bold bg-slate-100 px-3 py-1.5 rounded-lg">خروج</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <section id="quizScreen" class="hidden space-y-6">
            <div class="glass-card p-8 rounded-[2.5rem] text-center shadow-lg border-b-4 border-orange-500">
                <h2 class="text-xl font-black mb-6 italic">اختبار الدخول السريع</h2>
                <div id="qBox" class="space-y-6">
                    <img id="qImg" src="" class="w-full max-h-72 object-contain rounded-xl bg-white p-2 border">
                    <div id="options" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                    <button id="nextBtn" class="w-full btn-gradient text-white py-4 rounded-2xl font-black text-lg shadow-md mt-4">تأكيد الإجابة</button>
                </div>
            </div>
        </section>

        <section id="contentScreen" class="hidden space-y-8">
            
            <div class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl text-center">
                <p class="text-slate-400 font-bold text-sm mb-1">نتيجتك في الاختبار</p>
                <div id="scoreDisplay" class="text-6xl font-black text-orange-400 mb-6 tracking-tighter">0 / 0</div>
                
                <a id="pdfLink" href="#" target="_blank" class="hidden bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-black text-sm transition-colors inline-flex items-center gap-2">
                    تحميل الملزمة (PDF) 📥
                </a>
            </div>

            <div class="flex bg-slate-200/50 p-1.5 rounded-2xl gap-2">
                <button id="tabVideo" class="flex-1 py-3 font-black rounded-xl bg-white shadow text-orange-600 transition-all">الشرح 📺</button>
                <button id="tabReview" class="flex-1 py-3 font-black rounded-xl text-slate-500 transition-all">المراجعة 📝</button>
            </div>

            <div id="videoContainer" class="video-container">
                <video id="player" playsinline controls></video>
            </div>

            <div id="reviewContainer" class="hidden space-y-4">
                <h3 class="font-black text-lg mb-4 text-slate-700">تفاصيل إجاباتك:</h3>
                <div id="reviewList" class="space-y-3"></div>
            </div>
            
        </section>

    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo", 
            authDomain: "math-e62c9.firebaseapp.com", 
            projectId: "math-e62c9", 
            appId: "1:271507842148:web:2907aad4caf67afd08ab71" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const lessonId = new URLSearchParams(window.location.search).get("id");

        let currentUser, lessonData, currentQ = 0, userAnswers = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) { currentUser = user; checkAccess(); }
            else { window.location.href = "login.html"; }
        });

        async function checkAccess() {
            const enrollSnap = await getDoc(doc(db, "enrollments", `${currentUser.uid}_${lessonId}`));
            if (enrollSnap.exists()) loadLesson();
            else document.getElementById("authArea").classList.remove("hidden");
        }

        async function loadLesson() {
            const snap = await getDoc(doc(db, "lessons", lessonId));
            lessonData = snap.data();
            document.getElementById("lessonTitle").innerText = lessonData.name;

            if (localStorage.getItem(`done_${currentUser.uid}_${lessonId}`)) {
                showFinalResults();
            } else {
                document.getElementById("quizScreen").classList.remove("hidden");
                renderQuestion();
            }
        }

        function renderQuestion() {
            const q = lessonData.questions[currentQ];
            document.getElementById("qImg").src = q.image;
            document.getElementById("options").innerHTML = ['a','b','c','d'].map(opt => `
                <label class="p-4 border-2 rounded-xl flex items-center gap-3 cursor-pointer bg-white hover:border-orange-500">
                    <input type="radio" name="quiz" value="${opt}" class="w-4 h-4 accent-orange-600">
                    <span class="font-bold text-sm uppercase">${opt}: ${q[opt]}</span>
                </label>
            `).join('');
        }

        document.getElementById("nextBtn").onclick = () => {
            const selected = document.querySelector('input[name="quiz"]:checked');
            if(!selected) return alert("اختار إجابة!");
            
            userAnswers.push(selected.value);
            currentQ++;

            if(currentQ < lessonData.questions.length) {
                renderQuestion();
            } else {
                localStorage.setItem(`done_${currentUser.uid}_${lessonId}`, "true");
                localStorage.setItem(`ans_${currentUser.uid}_${lessonId}`, JSON.stringify(userAnswers));
                showFinalResults();
            }
        };

        function showFinalResults() {
            document.getElementById("quizScreen").classList.add("hidden");
            document.getElementById("contentScreen").classList.remove("hidden");
            document.getElementById("authArea").classList.add("hidden");

            const saved = JSON.parse(localStorage.getItem(`ans_${currentUser.uid}_${lessonId}`)) || [];
            let score = 0;
            let reviewHtml = "";

            lessonData.questions.forEach((q, i) => {
                const isCorrect = saved[i] === q.correct;
                if(isCorrect) score++;
                
                reviewHtml += `
                    <div class="review-card p-4 rounded-xl shadow-sm flex items-center gap-4 ${isCorrect ? 'correct' : 'wrong'}">
                        <img src="${q.image}" class="review-img">
                        <div class="flex-1">
                            <p class="font-black ${isCorrect ? 'text-green-700' : 'text-red-700'} text-sm">
                                ${isCorrect ? 'إجابة صحيحة ✅' : 'إجابة خاطئة ❌'}
                            </p>
                            <p class="text-xs font-bold text-slate-500 mt-1">
                                إجابتك: (${saved[i].toUpperCase()}) | الصح: (${q.correct.toUpperCase()})
                            </p>
                        </div>
                    </div>
                `;
            });

            document.getElementById("scoreDisplay").innerText = `${score} / ${lessonData.questions.length}`;
            document.getElementById("reviewList").innerHTML = reviewHtml;

            if (lessonData.pdf) {
                document.getElementById("pdfLink").href = lessonData.pdf;
                document.getElementById("pdfLink").classList.remove("hidden");
            }

            initPlayer();
        }

        function initPlayer() {
            if (!lessonData.video) return;
            const vidId = lessonData.video.split('v=')[1]?.split('&')[0] || lessonData.video.split('/').pop();
            const player = new Plyr('#player', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                settings: ['quality', 'speed'],
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
            });
            player.source = { type: 'video', sources: [{ src: vidId, provider: 'youtube' }] };
        }

        // تبديل التابات
        document.getElementById("tabVideo").onclick = function() {
            document.getElementById("videoContainer").classList.remove("hidden");
            document.getElementById("reviewContainer").classList.add("hidden");
            this.className = "flex-1 py-3 font-black rounded-xl bg-white shadow text-orange-600";
            document.getElementById("tabReview").className = "flex-1 py-3 font-black rounded-xl text-slate-500";
        };

        document.getElementById("tabReview").onclick = function() {
            document.getElementById("reviewContainer").classList.remove("hidden");
            document.getElementById("videoContainer").classList.add("hidden");
            this.className = "flex-1 py-3 font-black rounded-xl bg-white shadow text-orange-600";
            document.getElementById("tabVideo").className = "flex-1 py-3 font-black rounded-xl text-slate-500";
        };

        document.getElementById("verifyBtn").onclick = async () => {
            const code = document.getElementById("accessCode").value.trim().toUpperCase();
            if(!code) return;
            const snap = await getDoc(doc(db, "codes", code));
            if(snap.exists() && !snap.data().used) {
                await updateDoc(doc(db, "codes", code), { used: true, usedBy: currentUser.email });
                await setDoc(doc(db, "enrollments", `${currentUser.uid}_${lessonId}`), { active: true });
                location.reload();
            } else {
                document.getElementById("authError").classList.remove("hidden");
            }
        };

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
