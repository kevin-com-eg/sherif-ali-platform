<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lesson</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

</head>


<body class="bg-gray-100">


<div class="max-w-5xl mx-auto p-6">


<h1 class="text-2xl font-bold text-center mb-6">

EXPLANATION VIDEO

</h1>



<!-- VIDEO PLAYER -->

<div id="videoBox" class="hidden">

<div class="video-wrapper">

<div id="player"
data-plyr-provider="youtube"
data-plyr-embed-id="VIDEO_ID"></div>

</div>

</div>



<!-- TABS -->

<div class="flex gap-4 mt-6 justify-center">

<button onclick="showTab('exam')" class="bg-gray-200 px-6 py-2 rounded">

Exam

</button>

<button onclick="showTab('video')" class="bg-gray-200 px-6 py-2 rounded">

Video

</button>

<button onclick="showTab('files')" class="bg-gray-200 px-6 py-2 rounded">

Files

</button>

</div>



<!-- EXAM -->

<div id="exam" class="mt-6">

<div class="bg-white p-6 rounded-xl shadow">


<img src="question.png" class="mb-4 w-full">


<label>
<input type="radio" name="q1" value="A"> A
</label><br>

<label>
<input type="radio" name="q1" value="B"> B
</label><br>

<label>
<input type="radio" name="q1" value="C"> C
</label><br>

<label>
<input type="radio" name="q1" value="D"> D
</label>


<button id="finishExam"
class="bg-orange-500 text-white px-6 py-3 mt-4 rounded">

Finish Exam

</button>


</div>

</div>



<!-- VIDEO TAB -->

<div id="video" class="hidden mt-6">

<p class="text-center text-gray-500">

Finish the exam first

</p>

</div>



<!-- FILES -->

<div id="files" class="hidden mt-6">

<div class="bg-white p-6 rounded-xl shadow">

<a href="files/lesson.pdf"
class="bg-orange-500 text-white px-6 py-3 rounded">

Download PDF

</a>

</div>

</div>



<!-- RESULT -->

<div id="result" class="hidden mt-6 text-center text-xl font-bold"></div>



</div>



<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>



<script>


function showTab(tab){

document.getElementById("exam").classList.add("hidden")
document.getElementById("video").classList.add("hidden")
document.getElementById("files").classList.add("hidden")

document.getElementById(tab).classList.remove("hidden")

}



document.getElementById("finishExam").onclick = () => {

if(!confirm("Are you sure you want to finish the exam?")) return


const selected = document.querySelector("input[name='q1']:checked")

let score = 0

if(selected && selected.value === "B"){
score = 1
}


localStorage.setItem("lesson_result",score)


document.getElementById("result").classList.remove("hidden")
document.getElementById("result").innerText = "Score: "+score+"/1"


document.getElementById("videoBox").classList.remove("hidden")

showTab("video")


initPlayer()

}



function initPlayer(){

const player = new Plyr('#player', {

controls:[
'play',
'progress',
'current-time',
'mute',
'volume',
'settings',
'fullscreen'
],

youtube:{
noCookie:true,
rel:0,
modestbranding:1
}

})

}



/* if user already did exam */

const saved = localStorage.getItem("lesson_result")

if(saved){

document.getElementById("videoBox").classList.remove("hidden")

document.getElementById("result").classList.remove("hidden")

document.getElementById("result").innerText="Score: "+saved+"/1"

initPlayer()

}



</script>


<style>

.video-wrapper{

max-width:900px;
margin:auto;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.4);

}

</style>


</body>
</html>
