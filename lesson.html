<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lesson</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdn.plyr.io/3.7.8/plyr.css"/>

</head>


<body class="bg-gray-100">


<div class="max-w-4xl mx-auto p-6">


<h1 class="text-2xl font-bold text-center mb-6">

Lesson

</h1>


<!-- TABS -->

<div class="flex gap-4 justify-center mb-6">

<button onclick="showTab('quiz')"
class="bg-blue-500 text-white px-6 py-2 rounded">

Quiz

</button>

<button onclick="showTab('video')"
class="bg-gray-200 px-6 py-2 rounded">

Video

</button>

<button onclick="showTab('pdf')"
class="bg-gray-200 px-6 py-2 rounded">

PDF

</button>

</div>



<!-- QUIZ -->

<div id="quiz">

<button id="startExam"
class="bg-green-600 text-white px-6 py-3 rounded mb-6">

Enter Exam

</button>


<div id="examBox"
class="hidden bg-white p-6 rounded shadow">

<img id="questionImage"
class="mb-4 w-full">

<div id="answers"></div>

<button id="nextBtn"
class="bg-orange-500 text-white px-6 py-3 mt-4 rounded">

Next Question

</button>

</div>

</div>



<!-- VIDEO -->

<div id="video" class="hidden">

<div class="video-wrapper">

<div id="player"
data-plyr-provider="youtube"></div>

</div>

</div>



<!-- PDF -->

<div id="pdf"
class="hidden text-center">

<a id="pdfLink"
class="bg-blue-500 text-white px-6 py-3 rounded">

Download PDF

</a>

</div>



<div id="result"
class="text-center mt-6 text-xl font-bold"></div>


</div>



<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>



<script type="module">


import { db } from "./firebase.js"

import {

doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"



const lessonId =
new URLSearchParams(location.search).get("id")


const ref = doc(db,"lessons",lessonId)

const snap = await getDoc(ref)

const lesson = snap.data()



/* VIDEO */

const videoId =
lesson.video.split("v=")[1]

document
.getElementById("player")
.setAttribute(
"data-plyr-embed-id",
videoId
)



/* PDF */

document
.getElementById("pdfLink")
.href = lesson.pdf



/* QUESTIONS */

let questions = lesson.questions

let currentQuestion = 0

let answers = []

let finished = false



document
.getElementById("startExam")
.onclick = () => {

document
.getElementById("examBox")
.classList.remove("hidden")

loadQuestion()

}



function loadQuestion(){

let q = questions[currentQuestion]

questionImage.src = q.image

answersDiv.innerHTML = `

<label>
<input type="radio"
name="a"
value="a"> ${q.a}
</label><br>

<label>
<input type="radio"
name="a"
value="b"> ${q.b}
</label><br>

<label>
<input type="radio"
name="a"
value="c"> ${q.c}
</label><br>

<label>
<input type="radio"
name="a"
value="d"> ${q.d}
</label>

`

}



nextBtn.onclick = () => {

let selected =
document.querySelector(
"input[name='a']:checked"
)

if(!selected){

alert("Choose answer")

return

}

answers.push(selected.value)

currentQuestion++


if(currentQuestion < questions.length){

loadQuestion()

}

else{

finishExam()

}

}



function finishExam(){

if(!confirm("Finish exam?"))
return


let score = 0

let review = ""


questions.forEach((q,i)=>{

let user = answers[i]

if(user === q.correct){

score++

review +=
`<p style="color:green">
Question ${i+1}: Correct
</p>`

}

else{

review +=
`<p style="color:red">
Question ${i+1}: Wrong
Correct: ${q.correct}
</p>`

}

})


finished = true


localStorage
.setItem("lesson_score",score)


examBox.innerHTML = `

<h2>
Score ${score}/${questions.length}
</h2>

${review}

`


result.innerText =
"Score "+score+"/"+questions.length


initPlayer()

}



/* PLAYER */

function initPlayer(){

const player = new Plyr('#player',{

controls:[
'play',
'progress',
'current-time',
'mute',
'volume',
'settings',
'fullscreen'
],

youtube:{
rel:0,
modestbranding:1
}

})

}



/* TABS */

function showTab(tab){

if(tab==="video" && !finished){

alert("Finish quiz first")

return

}

quiz.classList.add("hidden")
video.classList.add("hidden")
pdf.classList.add("hidden")

document
.getElementById(tab)
.classList.remove("hidden")

}



</script>



<style>

.video-wrapper{

max-width:900px;
margin:auto;

border-radius:20px;

overflow:hidden;

box-shadow:0 10px 40px
rgba(0,0,0,0.4);

}

</style>


</body>
</html>
