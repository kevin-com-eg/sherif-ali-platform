<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | Protected Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; user-select: none; } /* منع تحديد النصوص */
        :root { --plyr-color-main: #f97316; } 
        
        .video-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* طبقة شفافة فوق الفيديو لمنع النقر بيمين الماوس على اليوتيوب نفسه */
        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 80%; /* تغطية الجزء العلوي لمنع copy link */
            z-index: 10;
            background: transparent;
        }

        /* إخفاء شعار يوتيوب تماماً عند التوقف */
        .plyr__video-embed iframe {
            transform: scale(1.2); /* تكبير بسيط لإخفاء الحواف اللي فيها اللوجو */
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-5xl w-full">
        <h1 id="lessonTitle" class="text-2xl font-black text-center mb-8 text-white">جاري التحميل...</h1>

        <div class="video-container bg-black">
            <div class="video-overlay"></div>
            
            <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
        </div>
        
        <p class="text-center text-gray-500 mt-6 text-sm">محتوى محمي © منصة الأستاذ شريف علي</p>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // --- منع الـ DevTools (أدوات المطور) ---
    document.addEventListener('contextmenu', e => e.preventDefault()); // منع كليك يمين
    
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; // F12
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U (عرض الكود)
    };

    // --- إعدادات Firebase ---
    const firebaseConfig = {
        apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
        authDomain: "math-e62c9.firebaseapp.com",
        projectId: "math-e62c9",
        appId: "1:271507842148:web:2907aad4caf67afd08ab71"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const lessonId = new URLSearchParams(window.location.search).get("id");

    async function init() {
        if(!lessonId) return;
        const snap = await getDoc(doc(db, "lessons", lessonId));
        
        if(snap.exists()) {
            const data = snap.data();
            document.getElementById("lessonTitle").innerText = data.name; //

            let vidUrl = data.video; //
            let vidId = vidUrl.split('v=')[1]?.split('&')[0] || vidUrl.split('/').pop();

            document.getElementById('player').setAttribute('data-plyr-embed-id', vidId);

            const player = new Plyr('#player', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                settings: ['speed'],
                youtube: { 
                    noCookie: true, 
                    rel: 0, // يمنع More Videos من قنوات تانية
                    showinfo: 0, 
                    iv_load_policy: 3, 
                    modestbranding: 1 // إخفاء لوجو يوتيوب
                }
            });
        }
    }

    init();
</script>
</body>
</html>
