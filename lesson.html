<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lesson</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

</head>


<body class="bg-gray-100">


<div class="max-w-5xl mx-auto p-6">


<h1 class="text-2xl font-bold text-center mb-6">
Lesson
</h1>


<!-- TABS -->

<div class="flex gap-4 justify-center mb-6">

<button onclick="showTab('quiz')" class="tabBtn bg-blue-500 text-white px-6 py-2 rounded">
Quiz
</button>

<button onclick="showTab('video')" class="tabBtn bg-gray-200 px-6 py-2 rounded">
Video
</button>

<button onclick="showTab('pdf')" class="tabBtn bg-gray-200 px-6 py-2 rounded">
PDF
</button>

</div>



<!-- QUIZ TAB -->

<div id="quiz">

<div class="bg-white p-6 rounded-xl shadow">

<img src="question.png" class="mb-4 w-full">


<label class="block mb-2">
<input type="radio" name="q1" value="A"> A
</label>

<label class="block mb-2">
<input type="radio" name="q1" value="B"> B
</label>

<label class="block mb-2">
<input type="radio" name="q1" value="C"> C
</label>

<label class="block mb-2">
<input type="radio" name="q1" value="D"> D
</label>


<button id="finishBtn"
class="bg-orange-500 text-white px-6 py-3 mt-4 rounded">

Finish Exam

</button>

</div>

</div>



<!-- VIDEO TAB -->

<div id="video" class="hidden">

<div class="bg-white p-6 rounded-xl shadow">

<div class="video-wrapper">

<div id="player"
data-plyr-provider="youtube"
data-plyr-embed-id="dQw4w9WgXcQ"></div>

</div>

</div>

</div>



<!-- PDF TAB -->

<div id="pdf" class="hidden">

<div class="bg-white p-6 rounded-xl shadow text-center">

<a href="files/lesson.pdf"
class="bg-blue-500 text-white px-6 py-3 rounded">

Download PDF

</a>

</div>

</div>



<div id="result"
class="text-center text-xl font-bold mt-6 hidden">

</div>



</div>



<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>



<script>


let finished = false
let correctAnswer = "B"



function showTab(tab){

if(tab === "video" && !finished){
alert("Finish quiz first")
return
}

document.getElementById("quiz").classList.add("hidden")
document.getElementById("video").classList.add("hidden")
document.getElementById("pdf").classList.add("hidden")

document.getElementById(tab).classList.remove("hidden")

}



document.getElementById("finishBtn").onclick = () => {

if(!confirm("Are you sure you want to finish the exam?"))
return


finished = true


const selected = document.querySelector("input[name='q1']:checked")


let score = 0


if(selected && selected.value === correctAnswer){

score = 1

selected.parentElement.style.color = "green"

}else{

if(selected) selected.parentElement.style.color = "red"

document.querySelector(`input[value="${correctAnswer}"]`).parentElement.style.color="green"

}


document.querySelectorAll("input").forEach(i=>i.disabled=true)


document.getElementById("result").classList.remove("hidden")

document.getElementById("result").innerText = "Score: "+score+"/1"


initPlayer()

}



function initPlayer(){

const player = new Plyr('#player',{

controls:[
'play',
'progress',
'current-time',
'mute',
'volume',
'settings',
'fullscreen'
],

youtube:{
rel:0,
modestbranding:1
}

})

}



</script>



<style>

.video-wrapper{
max-width:900px;
margin:auto;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

</style>


</body>
</html>
