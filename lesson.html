<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | منطقة الحصة 🎓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0b1120; color: white; }
        .glass { background: #151e32; border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-btn { opacity: 0.3; pointer-events: none; transition: 0.3s; border-bottom: 4px solid transparent; }
        .tab-btn.unlocked { opacity: 1; pointer-events: auto; }
        .tab-btn.active { border-bottom: 4px solid #10b981; color: #10b981; } 
        .hidden { display: none !important; }
        .q-card { transition: all 0.3s ease; }
        
        .plyr__video-wrapper iframe { pointer-events: none !important; }
        .plyr__control--overlaid { z-index: 10 !important; }

        /* 🔥 العلامة المائية المتحركة لحماية الفيديو 🔥 */
        .watermark-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* عشان الطالب يقدر يدوس على الفيديو عادي */
            z-index: 40; /* تظهر فوق الفيديو */
            overflow: hidden;
        }
        .watermark-text {
            position: absolute;
            font-size: 28px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.25); /* شفافة */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            animation: moveWatermark 25s linear infinite alternate; /* بتتحرك ببطء */
        }
        @keyframes moveWatermark {
            0% { top: 10%; left: 10%; }
            25% { top: 80%; left: 20%; }
            50% { top: 50%; left: 70%; }
            75% { top: 20%; left: 50%; }
            100% { top: 70%; left: 80%; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <div id="codeLockScreen" class="fixed inset-0 z-[100] bg-[#0b1120] flex items-center justify-center p-6 hidden">
        <div class="glass p-10 rounded-[3rem] w-full max-w-md text-center space-y-6 shadow-2xl border-emerald-500/20">
            <button onclick="window.history.back()" class="absolute top-6 right-6 text-gray-400 hover:text-white transition font-bold bg-white/5 px-4 py-2 rounded-xl">↩️ رجوع</button>
            <h2 class="text-3xl font-black text-white mt-4">تفعيل الحصة 🎫</h2>
            <input id="accessCodeInput" type="text" placeholder="أدخل الكود هنا" class="w-full bg-[#0b1120] border border-gray-700 p-5 rounded-2xl text-center text-white text-xl outline-none focus:border-emerald-500">
            <button id="verifyBtn" class="w-full bg-emerald-600 font-black py-5 rounded-2xl text-xl hover:bg-emerald-700 transition shadow-lg shadow-emerald-600/20">تفعيل الحصة</button>
        </div>
    </div>

    <div id="lessonContent" class="hidden">
        <nav class="glass sticky top-0 z-50 p-4 mb-6 shadow-sm">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4 flex-wrap justify-center">
                    <button onclick="window.history.back()" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2">↩️ رجوع</button>
                    <div class="flex gap-2 sm:gap-6">
                        <button id="btn-quiz-tab" onclick="switchTab('quiz')" class="tab-btn unlocked active px-4 py-2 font-black text-lg">📝 الامتحان</button>
                        <button id="btn-video-tab" onclick="switchTab('video')" class="tab-btn px-4 py-2 font-black text-lg">📺 الشرح</button>
                        <button id="btn-pdf-tab" onclick="switchTab('pdf')" class="tab-btn px-4 py-2 font-black text-lg">📚 الملزمة</button>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <div id="accessTimerBox" class="hidden bg-emerald-900/30 text-emerald-400 border border-emerald-500/50 px-4 py-1 rounded-full text-sm font-bold">صلاحية الحصة: <span id="accessCountdown" class="font-mono">--:--:--:--</span></div>
                    <div id="timerBox" class="bg-red-600 px-6 py-2 rounded-full font-black font-mono shadow-lg shadow-red-600/20 hidden">40:00</div>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto px-6 pb-20">
            <div id="tab-quiz" class="tab-pane">
                <div id="startScreen" class="text-center py-20 glass rounded-[3rem]">
                    <h2 class="text-3xl font-black mb-6">جاهز تبدأ الامتحان؟</h2>
                    <p class="text-gray-400 mb-8">لن يفتح فيديو الشرح والملزمة إلا بعد إنهاء هذا الامتحان</p>
                    <button id="startBtn" class="bg-emerald-600 px-16 py-5 rounded-2xl text-2xl font-black hover:scale-105 transition">ابدأ الآن 🚀</button>
                </div>
                <div id="quizApp" class="hidden">
                    <div id="qDisplay" class="glass p-10 rounded-[3rem] q-card min-h-[400px]"></div>
                    <div class="flex justify-between items-center mt-8">
                        <button id="prevBtn" class="bg-gray-800 border border-gray-700 px-10 py-4 rounded-2xl font-bold hover:bg-gray-700 transition hidden">السابق</button>
                        <span id="qCount" class="text-2xl font-black text-emerald-500">1 / 10</span>
                        <button id="nextBtn" class="bg-emerald-600 px-10 py-4 rounded-2xl font-bold hover:bg-emerald-700 transition">التالي</button>
                        <button id="finishBtn" class="hidden bg-blue-600 px-10 py-4 rounded-2xl font-black hover:bg-blue-700 transition">إنهاء وتصحيح 🔓</button>
                    </div>
                </div>
                <div id="reviewArea" class="hidden space-y-8 mt-10">
                    <div id="scoreBanner" class="glass p-10 rounded-[3rem] text-center border-2 border-emerald-500"></div>
                    <div id="reviewList" class="space-y-6"></div>
                </div>
            </div>

            <div id="tab-video" class="tab-pane hidden w-full"></div>

            <div id="tab-pdf" class="tab-pane hidden text-center p-20 glass rounded-[3rem]">
                <h3 class="text-3xl font-black mb-10 text-white">ملزمة الحصة بصيغة PDF 📚</h3>
                <a id="pdfLink" href="#" target="_blank" class="bg-emerald-600 text-white px-16 py-6 rounded-2xl font-black text-2xl hover:bg-emerald-700 transition shadow-xl">تحميل الملزمة الآن</a>
            </div>
        </main>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
            authDomain: "math-e62c9.firebaseapp.com",
            projectId: "math-e62c9",
            appId: "1:271507842148:web:2907aad4caf67afd08ab71"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let questions = [], curIdx = 0, userAns = {}, lessonData = null, timeLeft = 40 * 60;
        let plyrPlayer, examTimerInterval;
        let myStudentId = "000000"; // 🔥 متغير الـ ID الجديد

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}-tab`).classList.add('active');
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const lessonId = new URLSearchParams(window.location.search).get('id');
                if(!lessonId) return;

                // 🔥 جلب رقم الطالب من الداتا بيز للعلامة المائية
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if(userSnap.exists()){
                    myStudentId = userSnap.data().studentId || user.uid.substring(0, 6).toUpperCase(); 
                }

                const saved = localStorage.getItem(`access_${user.uid}_${lessonId}`);
                
                try {
                    const q = query(collection(db, "codes"), where("usedBy", "==", user.email));
                    const codesSnap = await getDocs(q);
                    let hasAccess = false; let validExpiry = null; const now = new Date().getTime();
                    codesSnap.forEach((docSnap) => { const data = docSnap.data(); if (data.lessonId === lessonId && data.expiryAt > now) { hasAccess = true; validExpiry = data.expiryAt; } });
                    if (hasAccess) { initLesson(); startAccessTimer(validExpiry); } else if (saved && new Date().getTime() < JSON.parse(saved).expiry) { initLesson(); startAccessTimer(JSON.parse(saved).expiry); } else { document.getElementById('codeLockScreen').classList.remove('hidden'); }
                } catch(error) { if (saved && new Date().getTime() < JSON.parse(saved).expiry) { initLesson(); startAccessTimer(JSON.parse(saved).expiry); } else { document.getElementById('codeLockScreen').classList.remove('hidden'); } }
            } else { window.location.href = "index.html"; }
        });

        // ... [دوال startAccessTimer و verifyBtn كما هي بدون تغيير لتوفير المساحة] ...
        function startAccessTimer(expiryTime) {
            document.getElementById('accessTimerBox').classList.remove('hidden');
            const interval = setInterval(() => {
                const now = new Date().getTime(); const distance = expiryTime - now;
                if (distance <= 0) { clearInterval(interval); alert("انتهت صلاحية هذه الحصة."); localStorage.removeItem(`access_${auth.currentUser.uid}_${new URLSearchParams(window.location.search).get('id')}`); location.reload(); return; }
                const days = Math.floor(distance / (1000 * 60 * 60 * 24)); const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)); const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)); const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById('accessCountdown').innerText = `${days}يوم ${hours}س ${minutes}د ${seconds}ث`;
            }, 1000);
        }

        document.getElementById('verifyBtn').onclick = async () => {
            const code = document.getElementById('accessCodeInput').value.trim(); const lessonId = new URLSearchParams(window.location.search).get('id');
            if(!code) return alert("من فضلك أدخل الكود");
            try {
                const snap = await getDoc(doc(db, "codes", code));
                if (snap.exists()) {
                    const data = snap.data(); const now = new Date().getTime();
                    if (!data.used) {
                        const expiry = now + (7 * 24 * 60 * 60 * 1000); 
                        await updateDoc(doc(db, "codes", code), { used: true, usedBy: auth.currentUser.email, lessonId: lessonId, expiryAt: expiry });
                        localStorage.setItem(`access_${auth.currentUser.uid}_${lessonId}`, JSON.stringify({ expiry })); location.reload();
                    } 
                    else if (data.usedBy === auth.currentUser.email && data.lessonId === lessonId && data.expiryAt > now) { localStorage.setItem(`access_${auth.currentUser.uid}_${lessonId}`, JSON.stringify({ expiry: data.expiryAt })); location.reload(); }
                    else if (data.expiryAt && data.expiryAt <= now) { alert("عذراً، هذا الكود انتهت صلاحيته!"); } else { alert("هذا الكود مستخدم مسبقاً لحساب آخر أو لحصة أخرى!"); }
                } else { alert("الكود غير صحيح!"); }
            } catch (error) { console.error("خطأ: ", error); }
        };

        async function initLesson() {
            document.getElementById('lessonContent').classList.remove('hidden');
            const id = new URLSearchParams(window.location.search).get('id');
            const snap = await getDoc(doc(db, "lessons", id));
            
            if (snap.exists()) {
                lessonData = snap.data();
                questions = lessonData.questions || [];

                try {
                    const q = query(collection(db, "results"), where("email", "==", auth.currentUser.email), where("lesson", "==", lessonData.name));
                    const querySnapshot = await getDocs(q);

                    if (!querySnapshot.empty) {
                        const examData = querySnapshot.docs[0].data(); userAns = examData.userAns || {}; const score = examData.score; generateReviewList(); 
                        const msg = `<h2 class="text-4xl font-black mb-2 text-emerald-500">لقد حصلت مسبقاً على: ${score} من ${questions.length} ✅</h2><p class="text-gray-400 font-bold mt-2">فيديو الشرح والملزمة متاحين لك الآن بالأعلى.</p>`; unlockLessonFeatures(msg);
                    } else {
                        const savedExamData = localStorage.getItem(`exam_data_${auth.currentUser.uid}_${id}`);
                        if(savedExamData) {
                            const parsedData = JSON.parse(savedExamData); userAns = parsedData.userAns; generateReviewList();
                            const msg = `<h2 class="text-4xl font-black mb-2 text-emerald-500">لقد حصلت مسبقاً على: ${parsedData.score} من ${questions.length} ✅</h2><p class="text-gray-400 font-bold mt-2">فيديو الشرح والملزمة متاحين لك الآن بالأعلى.</p>`; unlockLessonFeatures(msg);
                        }
                    }
                } catch (error) { console.log("خطأ", error); }
            }
        }

        function generateReviewList() { /* الكود الخاص بك هنا للأسئلة بدون تعديل */ }

        function unlockLessonFeatures(scoreMessage = null) {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizApp').classList.add('hidden');
            document.getElementById('timerBox').classList.add('hidden');
            document.getElementById('reviewArea').classList.remove('hidden');
            if (scoreMessage) { document.getElementById('scoreBanner').innerHTML = scoreMessage; }
            document.getElementById('btn-video-tab').classList.add('unlocked');
            document.getElementById('btn-pdf-tab').classList.add('unlocked');
            
            if (lessonData.video && !plyrPlayer) {
                const videoContainer = document.getElementById('tab-video');
                const getYouTubeId = (url) => { const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/; const match = url.match(regExp); return (match && match[2].length === 11) ? match[2] : null; };
                const vId = getYouTubeId(lessonData.video);

                // 🔥 حقن العلامة المائية برقم الطالب فوق الفيديو 🔥
                const watermarkHtml = `
                    <div class="watermark-container">
                        <div class="watermark-text">ID: ${myStudentId}</div>
                    </div>
                `;

                if (vId) {
                    videoContainer.innerHTML = `
                        <div class="rounded-[3rem] overflow-hidden shadow-2xl border border-gray-800 bg-black relative" oncontextmenu="return false;">
                            ${watermarkHtml}
                            <div id="player" data-plyr-provider="youtube" data-plyr-embed-id="${vId}"></div>
                        </div>`;
                } else {
                    videoContainer.innerHTML = `
                        <div class="rounded-[3rem] overflow-hidden shadow-2xl border border-gray-800 bg-black relative" oncontextmenu="return false;">
                            ${watermarkHtml}
                            <video id="player" playsinline controlsList="nodownload"><source src="${lessonData.video}" type="video/mp4" /></video>
                        </div>`;
                }
                
                plyrPlayer = new Plyr('#player', { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'], youtube: { rel: 0, showinfo: 0, modestbranding: 1, disablekb: 1 } });
            }
            if(lessonData.pdf) { document.getElementById('pdfLink').href = lessonData.pdf; }
        }

        // ... دوال تشغيل الامتحان بدون تغيير ...
        document.getElementById('startBtn').onclick = () => { /* ... */ document.getElementById('startScreen').classList.add('hidden'); document.getElementById('quizApp').classList.remove('hidden'); document.getElementById('timerBox').classList.remove('hidden'); renderQ(); startTimer(); };
        function renderQ() { /* ... الكود بتاعك ... */ }
        document.getElementById('nextBtn').onclick = () => { saveAns(); curIdx++; renderQ(); };
        document.getElementById('prevBtn').onclick = () => { saveAns(); curIdx--; renderQ(); };
        function saveAns() { const sel = document.querySelector('input[name="math"]:checked'); if(sel) userAns[curIdx] = sel.value; }

        document.getElementById('finishBtn').onclick = async () => {
            saveAns(); clearInterval(examTimerInterval);
            let score = 0; questions.forEach((q, i) => { if(userAns[i] === q.correct) score++; });

            try { await addDoc(collection(db, "results"), { email: auth.currentUser.email, lesson: lessonData.name, score: score, total: questions.length, date: new Date(), userAns: userAns }); } catch(e) {}
            const lessonId = new URLSearchParams(window.location.search).get('id');
            localStorage.setItem(`exam_data_${auth.currentUser.uid}_${lessonId}`, JSON.stringify({ userAns: userAns, score: score }));
            generateReviewList(); 
            const msg = `<h2 class="text-4xl font-black mb-2">درجتك النهائية: ${score} من ${questions.length}</h2><p class="text-emerald-400 font-bold mt-2 animate-pulse">✅ تم فتح فيديو الشرح والملزمة الآن بنجاح بالأعلى</p>`;
            unlockLessonFeatures(msg); window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        function startTimer() { /* ... */ }
    </script>
</body>
</html>
