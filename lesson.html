<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | الدرس المحمي</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; user-select: none; background-color: #f3f4f6; }
        :root { --plyr-color-main: #f97316; }
        .video-container { position: relative; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 8px solid white; background: #000; }
        .option-card { cursor: pointer; transition: all 0.2s; border: 2px solid #f1f5f9; background: white; }
        .option-card:hover { border-color: #f97316; background-color: #fff7ed; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake-error { animation: shake 0.4s ease-in-out; border-color: #ef4444 !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="timerBar" class="hidden sticky top-0 z-50 bg-gray-900 text-white py-2 px-4 flex justify-center items-center gap-3 border-b border-orange-500 shadow-lg">
        <span class="text-orange-500 text-lg animate-pulse">⏳</span>
        <span class="text-xs md:text-sm font-bold opacity-80">الوقت المتبقي لحسابك:</span>
        <span id="countdownDisplay" class="font-black text-orange-500 tracking-tighter text-sm md:text-base">-- : -- : -- : --</span>
    </div>

    <div id="authArea" class="hidden fixed inset-0 bg-gray-900/95 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div id="authContent" class="bg-white p-8 md:p-12 rounded-[3rem] w-full max-w-md text-center shadow-2xl border-t-8 border-orange-500">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-orange-50 rounded-full mb-6 text-3xl">🔑</div>
            <h2 class="text-2xl font-black mb-3 text-gray-800">تفعيل الحصة</h2>
            <p class="text-gray-500 mb-8 text-sm leading-relaxed">أدخل الكود لربط الحصة بحسابك <span class="text-orange-600 font-bold">7 أيام</span>.</p>
            <input id="accessCode" type="text" placeholder="ABC-123" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl mb-4 text-center font-black text-xl uppercase focus:border-orange-500 outline-none transition-all">
            <button id="verifyBtn" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-orange-600 transition-all">تفعيل الآن</button>
            <div id="errorMsg" class="hidden mt-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm font-bold">⚠️ الكود غير صحيح أو مستخدم مسبقاً!</div>
        </div>
    </div>

    <header class="glass-nav sticky top-0 z-40 p-4 border-b border-gray-200">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 id="lessonTitle" class="text-lg font-black text-gray-800">جاري التحقق...</h1>
            <a href="dashboard.html" class="text-orange-600 font-bold text-xs bg-orange-50 px-4 py-2 rounded-xl">خروج</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <section id="quizArea" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-white text-center">
                <div class="flex justify-between items-center mb-6">
                    <span id="progressText" class="bg-orange-100 text-orange-600 px-4 py-1 rounded-full text-xs font-black uppercase">Question 1/0</span>
                    <div class="w-1/2 bg-gray-200 h-2 rounded-full overflow-hidden"><div id="progressBar" class="bg-orange-500 h-full transition-all duration-500" style="width: 0%"></div></div>
                </div>
                <img id="qImg" src="" class="w-full max-h-96 object-contain rounded-2xl mb-8 border-4 border-gray-50">
                <div id="optionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <button id="nextBtn" class="w-full bg-gray-900 text-white py-5 mt-10 rounded-2xl font-black text-lg shadow-xl hover:bg-black">تأكيد الإجابة ←</button>
            </div>
        </section>

        <section id="resultsArea" class="hidden space-y-6">
            <div class="bg-orange-600 text-white p-10 rounded-[2.5rem] shadow-2xl text-center">
                <h2 class="text-lg font-bold opacity-80 mb-2">درجتك في الامتحان</h2>
                <div id="scoreText" class="text-7xl font-black mb-2">0/0</div>
            </div>

            <div class="flex bg-white rounded-2xl shadow-sm p-1 border border-gray-200">
                <button id="tabVideoBtn" class="flex-1 py-4 font-black rounded-xl text-orange-600 border-b-4 border-orange-500">فيديو الشرح 📺</button>
                <button id="tabReviewBtn" class="flex-1 py-4 font-black text-gray-400 rounded-xl">مراجعة الأخطاء 📝</button>
            </div>

            <div id="videoTab" class="video-container">
                <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
            </div>
            <div id="reviewTab" class="hidden space-y-4"></div>
        </section>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo", 
            authDomain: "math-e62c9.firebaseapp.com", 
            projectId: "math-e62c9", 
            appId: "1:271507842148:web:2907aad4caf67afd08ab71" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const lessonId = new URLSearchParams(window.location.search).get("id");

        let currentUser, lessonData, questions = [], current = 0, userAns = [], timerInt;

        onAuthStateChanged(auth, async (user) => {
            if (user) { currentUser = user; await checkAccess(); } 
            else { window.location.href = "index.html"; }
        });

        async function checkAccess() {
            const enrollId = `${currentUser.uid}_${lessonId}`;
            const enrollSnap = await getDoc(doc(db, "enrollments", enrollId));

            if (enrollSnap.exists()) {
                const data = enrollSnap.data();
                const now = new Date().getTime();
                if (now - data.activatedAt > 7 * 24 * 60 * 60 * 1000) {
                    showLockScreen("انتهت الصلاحية ⏰", "يجب تفعيل كود جديد.");
                } else {
                    document.getElementById("authArea").classList.add("hidden");
                    startTimer(data.activatedAt);
                    initLesson();
                }
            } else {
                document.getElementById("authArea").classList.remove("hidden");
            }
        }

        document.getElementById("verifyBtn").onclick = async () => {
            const code = document.getElementById("accessCode").value.trim().toUpperCase();
            if (!code) return;
            const btn = document.getElementById("verifyBtn");
            btn.innerText = "جاري الربط..."; btn.disabled = true;
            try {
                const codeRef = doc(db, "codes", code);
                const codeSnap = await getDoc(codeRef);
                if (codeSnap.exists() && codeSnap.data().used === false) {
                    const now = new Date().getTime();
                    await updateDoc(codeRef, { used: true, usedBy: currentUser.email, uid: currentUser.uid });
                    await setDoc(doc(db, "enrollments", `${currentUser.uid}_${lessonId}`), {
                        uid: currentUser.uid, email: currentUser.email, lessonId: lessonId, activatedAt: now
                    });
                    location.reload();
                } else {
                    document.getElementById("authContent").classList.add("shake-error");
                    document.getElementById("errorMsg").classList.remove("hidden");
                    setTimeout(() => document.getElementById("authContent").classList.remove("shake-error"), 500);
                }
            } catch (e) { alert("خطأ في الشبكة"); }
            btn.disabled = false; btn.innerText = "تفعيل الآن";
        };

        async function initLesson() {
            const snap = await getDoc(doc(db, "lessons", lessonId));
            if(!snap.exists()) return;
            lessonData = snap.data();
            questions = lessonData.questions || [];
            document.getElementById("lessonTitle").innerText = lessonData.name;

            // مفتاح تخزين فريد لكل طالب ولكل حصة لضمان عدم تداخل الدرجات
            const storageKey = `done_${currentUser.uid}_${lessonId}`;
            const answersKey = `ans_${currentUser.uid}_${lessonId}`;

            if(localStorage.getItem(storageKey)) {
                showFinalUI(JSON.parse(localStorage.getItem(answersKey)));
            } else {
                document.getElementById("quizArea").classList.remove("hidden");
                document.getElementById("resultsArea").classList.add("hidden");
                renderQuestion();
            }
        }

        function renderQuestion() {
            if (questions.length === 0) return;
            const q = questions[current];
            document.getElementById("progressText").innerText = `السؤال ${current + 1} / ${questions.length}`;
            document.getElementById("progressBar").style.width = `${((current + 1) / questions.length) * 100}%`;
            document.getElementById("qImg").src = q.image;
            document.getElementById("optionsGrid").innerHTML = ['a','b','c','d'].map(opt => `
                <label class="option-card flex items-center p-5 rounded-2xl shadow-sm border-2 border-transparent">
                    <input type="radio" name="choice" value="${opt}" class="w-6 h-6 ml-4 accent-orange-500">
                    <span class="font-bold text-gray-700 uppercase">${opt}: ${q[opt]}</span>
                </label>
            `).join('');
        }

        document.getElementById("nextBtn").onclick = () => {
            const sel = document.querySelector('input[name="choice"]:checked');
            if(!sel) return alert("اختار إجابة!");
            userAns.push(sel.value);
            current++;
            if(current < questions.length) renderQuestion();
            else {
                const storageKey = `done_${currentUser.uid}_${lessonId}`;
                const answersKey = `ans_${currentUser.uid}_${lessonId}`;
                localStorage.setItem(storageKey, "true");
                localStorage.setItem(answersKey, JSON.stringify(userAns));
                showFinalUI(userAns);
            }
        };

        function showFinalUI(answers) {
            document.getElementById("quizArea").classList.add("hidden");
            document.getElementById("resultsArea").classList.remove("hidden");
            let score = 0;
            let revHtml = "";
            questions.forEach((q, i) => {
                const correct = answers[i] === q.correct;
                if(correct) score++;
                revHtml += `<div class="bg-white p-4 rounded-xl border-r-8 ${correct ? 'border-green-500':'border-red-500'} shadow-sm flex items-center gap-4 text-right">
                    <img src="${q.image}" class="w-20 h-12 rounded object-cover border">
                    <p class="font-bold text-xs text-gray-600">${correct ? '✅':'❌'} س${i+1}: الحل (${q.correct.toUpperCase()})</p>
                </div>`;
            });
            document.getElementById("scoreText").innerText = `${score} / ${questions.length}`;
            document.getElementById("reviewTab").innerHTML = revHtml;
            if(lessonData.video) {
                let vidId = lessonData.video.split('v=')[1]?.split('&')[0] || lessonData.video.split('/').pop();
                document.getElementById('player').setAttribute('data-plyr-embed-id', vidId);
                new Plyr('#player', { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] });
            }
        }

        function startTimer(startTime) {
            const display = document.getElementById("countdownDisplay");
            document.getElementById("timerBar").classList.remove("hidden");
            const expiry = parseInt(startTime) + (7 * 24 * 60 * 60 * 1000);
            timerInt = setInterval(() => {
                const now = new Date().getTime();
                const diff = expiry - now;
                if (diff <= 0) { clearInterval(timerInt); location.reload(); return; }
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                display.innerText = `${d} يوم و ${h}:${m}:${s}`;
            }, 1000);
        }

        function showLockScreen(title, msg) {
            document.getElementById("authArea").classList.remove("hidden");
            document.getElementById("authContent").innerHTML = `<h2 class='text-red-600 font-black text-2xl'>${title}</h2><p class='mt-4'>${msg}</p>`;
        }

        document.getElementById("tabVideoBtn").onclick = () => {
            document.getElementById("videoTab").classList.remove("hidden");
            document.getElementById("reviewTab").classList.add("hidden");
            document.getElementById("tabVideoBtn").className = "flex-1 py-4 font-black rounded-xl text-orange-600 border-b-4 border-orange-500";
            document.getElementById("tabReviewBtn").className = "flex-1 py-4 font-black text-gray-400 rounded-xl";
        };
        document.getElementById("tabReviewBtn").onclick = () => {
            document.getElementById("reviewTab").classList.remove("hidden");
            document.getElementById("videoTab").classList.add("hidden");
            document.getElementById("tabReviewBtn").className = "flex-1 py-4 font-black rounded-xl text-orange-600 border-b-4 border-orange-500";
            document.getElementById("tabVideoBtn").className = "flex-1 py-4 font-black text-gray-400 rounded-xl";
        };
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
