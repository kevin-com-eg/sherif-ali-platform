<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathPro | منطقة الحصة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── التنسيقات العامة (ستايلك الأصلي) ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
:root{
  --bg:#f0f4f7;--white:#fff;--teal:#0d7a5f;--teal2:#0a6650;--teal3:#e8f5f1;--teal4:#c8e8e0;
  --border:#e2e8ed;--border2:#d0dae2;--text:#1a2332;--text2:#5a6a7a;--text3:#8a9aaa;
  --red:#dc2626;--gold:#d97706;--sans:'Tajawal',sans-serif;--mono:'DM Mono',monospace;
  --shadow:0 2px 12px rgba(0,0,0,.07);--shadow2:0 8px 32px rgba(0,0,0,.15);--nav-h:62px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── LOADING ── */
#loadingScreen{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--white); transition: opacity 0.3s;}
.ld-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--teal),var(--teal2));display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;color:#fff;font-family:var(--mono);box-shadow:0 8px 24px rgba(13,122,95,.3);}

/* ── NAVBAR ── */
nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:var(--white);border-bottom:1px solid var(--border);box-shadow:0 1px 8px rgba(0,0,0,.05);}
.nav-inner{max-width:960px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.tabs{display:flex;gap:3px;background:var(--bg);border:1px solid var(--border2);border-radius:11px;padding:3px;overflow-x:auto;scrollbar-width:none;}
.tab-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:none;background:none;font-family:var(--sans);font-weight:700;font-size:.82rem;cursor:pointer;color:var(--text3);transition:all .22s;opacity:.45;pointer-events:none;white-space:nowrap;}
.tab-btn.unlocked{opacity:1;pointer-events:auto;color:var(--text2);}
.tab-btn.active{background:var(--teal)!important;color:#fff!important;opacity:1!important;}

/* ─────────────────────────────────────────────
    🔥 DAILYMOTION PRO PLAYER 🔥
───────────────────────────────────────────── */
.pro-player-wrap {
    position: relative; width: 100%; aspect-ratio: 16/9;
    border-radius: 20px; overflow: hidden; background: #000;
    box-shadow: var(--shadow2); border: 1px solid rgba(255,255,255,0.08);
}
.vp-iframe-wrap { width: 100%; height: 100%; position: absolute; inset: 0; overflow: hidden; }
/* تكبير بسيط لضمان اختفاء حواف Dailymotion */
.vp-iframe-wrap iframe { 
    width: 100%; height: 110%; position: absolute; top: -5%; border: none; 
}
.vid-blocker { position: absolute; background: #000; z-index: 5; pointer-events: none; }
.vid-blocker-top { top: 0; left: 0; right: 0; height: 50px; } 
.vid-blocker-bottom-right { bottom: 0; right: 0; width: 140px; height: 50px; } 

.pro-watermark { position: absolute; inset: 0; z-index: 10; pointer-events: none; overflow: hidden; }
.pro-watermark span {
    position: absolute; font-family: var(--mono); font-size: 1.1rem; font-weight: 900;
    color: rgba(255,255,255,0.15); text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    animation: wmMove 25s linear infinite alternate;
}
@keyframes wmMove { 0%{top:5%;left:5%;} 100%{top:85%;left:75%;} }

.video-cover {
    position: absolute; inset: 0; z-index: 20;
    background-size: cover; background-position: center;
    display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
}
.video-cover::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.4); }
.play-btn-circle {
    position: relative; z-index: 21; width: 75px; height: 75px;
    background: var(--teal); border-radius: 50%; display: flex;
    align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(13,122,95,0.5);
}

/* ── Content Sections ── */
main{max-width:900px;margin:0 auto;padding:26px 20px;}
.q-card, .score-card { background:var(--white); border-radius:22px; padding:32px; box-shadow:var(--shadow); margin-bottom:20px; }
.hidden { display:none !important; }
.lock-btn{width:100%; background:var(--teal); color:#fff; border:none; padding:15px; border-radius:12px; font-weight:900; cursor:pointer;}
</style>
</head>
<body oncontextmenu="return false;">

<div id="loadingScreen">
    <div class="ld-logo">MP</div>
    <div id="ldText">جاري التحقق...</div>
</div>

<div id="codeLockScreen" class="hidden">
    <div style="display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px;">
        <div class="score-card" style="max-width:400px; width:100%; text-align:center;">
            <div style="font-size:3rem; margin-bottom:15px;">🎫</div>
            <h3 style="margin-bottom:10px;">تفعيل الحصة</h3>
            <p style="font-size:0.9rem; color:var(--text2); margin-bottom:20px;">أدخل الكود الخاص بك لفتح المحتوى</p>
            <input id="accessCodeInput" style="width:100%; padding:14px; border-radius:10px; border:1px solid var(--border2); text-align:center; margin-bottom:15px;" placeholder="أدخل الكود هنا">
            <button id="verifyBtn" class="lock-btn">تفعيل الآن</button>
        </div>
    </div>
</div>

<div id="lessonContent" class="hidden">
    <nav>
        <div class="nav-inner">
            <div class="tabs">
                <button id="btn-quiz-tab" class="tab-btn unlocked active" onclick="switchTab('quiz')">📝 الامتحان</button>
                <button id="btn-homework-tab" class="tab-btn locked-dim" onclick="switchTab('homework')">📋 الواجب</button>
                <button id="btn-video-tab" class="tab-btn locked-dim" onclick="switchTab('video')">📺 الشرح</button>
                <button id="btn-pdf-tab" class="tab-btn locked-dim" onclick="switchTab('pdf')">📚 الملزمة</button>
            </div>
        </div>
    </nav>

    <main>
        <div id="tab-quiz">
            <div id="startScreen" class="score-card" style="text-align:center;">
                <h2>جاهز تبدأ الامتحان؟</h2>
                <button onclick="startQuiz()" class="lock-btn" style="width:auto; padding:12px 50px; margin-top:20px;">ابدأ الآن</button>
            </div>
            <div id="quizApp" class="hidden">
                <div id="qDisplay"></div>
                <button onclick="nextQuestion()" id="nextBtn" class="lock-btn" style="width:auto; padding:12px 40px; margin-top:20px;">السؤال التالي ←</button>
            </div>
            <div id="reviewArea" class="hidden">
                <div id="scoreBanner"></div>
            </div>
        </div>

        <div id="tab-video" class="hidden">
            <div class="pro-player-wrap" id="playerWrap">
                <div class="pro-watermark"><span>STUDENT ID: <span id="sid_label">000000</span></span></div>
                <div class="vp-iframe-wrap">
                    <div class="vid-blocker vid-blocker-top"></div>
                    <div class="vid-blocker vid-blocker-bottom-right"></div>
                    <iframe id="dmFrame" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
                    <div class="video-cover" id="videoCover" onclick="startDailymotion()">
                        <div class="play-btn-circle">
                            <svg viewBox="0 0 24 24" width="35" height="35" fill="white"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-homework" class="hidden"></div>
        <div id="tab-pdf" class="hidden">
            <div class="pdf-card" style="text-align:center;">
                <div style="font-size:3rem;">📚</div>
                <h3 style="margin-top:10px;">ملزمة الحصة</h3>
                <a id="pdfLink" href="#" target="_blank" class="lock-btn" style="display:inline-block; text-decoration:none; margin-top:20px; width:auto; padding:12px 40px;">تحميل PDF</a>
            </div>
        </div>
    </main>
</div>

<script>
// الإعدادات الأساسية
const SUPABASE_URL="https://kspfjzewkpfoeyocbzbm.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_4RiANbDn7lrulIbcXHS_3A_ANMSwaYp";
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let currentUser, lessonData, questions=[], curIdx=0, userAns={}, myStudentId;

// 1. بدء التشغيل والتحقق
async function init() {
    const id = new URLSearchParams(window.location.search).get('id');
    const {data:{session}} = await supabaseClient.auth.getSession();
    if(!session) return window.location.href="index.html";
    currentUser = session.user;

    const {data:ls} = await supabaseClient.from('lessons').select('*').eq('id', id).single();
    if(ls) {
        lessonData = ls;
        questions = ls.questions || [];
        myStudentId = currentUser.id.substring(0,6).toUpperCase();
        document.getElementById('sid_label').innerText = myStudentId;
        
        // التحقق من صلاحية الدخول (هل الكود مفعّل مسبقاً؟)
        const {data:access} = await supabaseClient.from('codes').select('*').eq('usedby', currentUser.email).eq('lessonid', id.toLowerCase()).single();
        if(access) {
            document.getElementById('lessonContent').classList.remove('hidden');
            // هل حل الامتحان قبل كدة؟
            const {data:examDone} = await supabaseClient.from('results').select('*').eq('email', currentUser.email).eq('lesson', ls.name).single();
            if(examDone) unlockEverything();
        } else {
            document.getElementById('codeLockScreen').classList.remove('hidden');
        }
    }
    document.getElementById('loadingScreen').style.display='none';
}

// 2. تفعيل الكود
document.getElementById('verifyBtn').onclick = async () => {
    const code = document.getElementById('accessCodeInput').value.trim();
    if(!code) return alert("اكتب الكود الأول");
    
    document.getElementById('ldText').innerText = "جاري التفعيل...";
    document.getElementById('loadingScreen').style.display='flex';

    const {data:codeCheck} = await supabaseClient.from('codes').select('*').eq('code', code).eq('used', false).single();
    if(codeCheck) {
        await supabaseClient.from('codes').update({used:true, usedby:currentUser.email, lessonid:lessonData.id.toLowerCase()}).eq('code', code);
        location.reload();
    } else {
        alert("الكود غير صحيح أو مستخدم مسبقاً");
        document.getElementById('loadingScreen').style.display='none';
    }
};

// 3. المشغل الاحترافي
function startDailymotion() {
    const vId = lessonData.video.match(/(?:video\/|dai\.ly\/)([a-zA-Z0-9]+)/)?.[1] || lessonData.video;
    const frame = document.getElementById('dmFrame');
    document.getElementById('videoCover').style.opacity = '0';
    setTimeout(() => document.getElementById('videoCover').style.display = 'none', 300);
    
    // تشغيل الفيديو فوراً مع إعدادات Dailymotion
    frame.src = `https://www.dailymotion.com/embed/video/${vId}?autoplay=1&ui-logo=0&sharing-enable=0&info=0&controls=1`;
}

// 4. نظام الامتحان (المنطق الأصلي)
function startQuiz() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('quizApp').classList.remove('hidden');
    renderQ();
}
function renderQ() {
    const q = questions[curIdx];
    document.getElementById('qDisplay').innerHTML = `
        <div class="q-card">
            <h4 style="color:var(--teal); margin-bottom:15px;">السؤال ${curIdx+1} من ${questions.length}</h4>
            <div style="font-weight:700; font-size:1.1rem; margin-bottom:20px;">${q.text}</div>
            <div style="display:grid; gap:10px;">
                ${['a','b','c','d'].map(l => q[l] ? `<label class="opt-label"><input type="radio" name="math" value="${l}"> ${q[l]}</label>` : '').join('')}
            </div>
        </div>`;
}
async function nextQuestion() {
    const sel = document.querySelector('input[name="math"]:checked');
    if(!sel) return alert("اختار إجابة الأول يا بطل");
    userAns[curIdx] = sel.value;

    if(curIdx < questions.length -1) {
        curIdx++; renderQ();
    } else {
        finishQuiz();
    }
}
async function finishQuiz() {
    document.getElementById('loadingScreen').style.display='flex';
    let score = 0;
    questions.forEach((q,i) => { if(userAns[i] === q.correct) score++; });
    
    await supabaseClient.from('results').insert([{ email:currentUser.email, lesson:lessonData.name, score, total:questions.length, userans:userAns }]);
    unlockEverything();
    switchTab('video');
    document.getElementById('loadingScreen').style.display='none';
}

function unlockEverything() {
    ['video','pdf','homework'].forEach(t => {
        const btn = document.getElementById(`btn-${t}-tab`);
        if(btn) { btn.classList.add('unlocked'); btn.classList.remove('locked-dim'); }
    });
    if(lessonData.pdf) document.getElementById('pdfLink').href = lessonData.pdf;
    document.getElementById('tab-quiz').innerHTML = `<div class="score-card" style="text-align:center;"><h3>تم إنهاء الامتحان بنجاح ✅</h3><p>تقدر دلوقتي تشوف الشرح وتحمل الملزمة</p></div>`;
}

// 5. التنقل بين التابات
window.switchTab = (tab) => {
    document.querySelectorAll('[id^="tab-"]').forEach(p=>p.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
    document.getElementById(`btn-${tab}-tab`).classList.add('active');
    
    if(tab === 'video' && lessonData) {
        const vId = lessonData.video.match(/(?:video\/|dai\.ly\/)([a-zA-Z0-9]+)/)?.[1] || lessonData.video;
        const coverImg = lessonData.image || `https://www.dailymotion.com/thumbnail/video/${vId}`;
        document.getElementById('videoCover').style.backgroundImage = `url('${coverImg}')`;
    }
};

init();
</script>
</body>
</html>
