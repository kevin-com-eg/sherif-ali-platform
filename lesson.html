<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | منطقة الحصة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg:    #050810;
    --card:  #0e1828;
    --panel: #0c1322;
    --border:rgba(255,255,255,0.07);
    --g1:    #00e5a0;
    --g2:    #00b578;
    --g3:    #007a52;
    --red:   #ef4444;
    --gold:  #c9933a;
    --glow:  rgba(0,229,160,0.15);
    --muted: #4b5e7a;
    --text:  #e8f4f0;
    --text2: #8ba8b8;
    --mono:  'DM Mono', monospace;
    --sans:  'Tajawal', sans-serif;
    --r:     16px;
}
html { scroll-behavior: smooth; }
body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}
body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .022;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--g3); border-radius: 2px; }
.hidden { display: none !important; }

/* ── LOCK SCREEN ─────────────────────── */
#codeLockScreen {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
}
.lock-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 44px 40px;
    width: 100%; max-width: 440px;
    text-align: center;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,.6);
    overflow: hidden;
}
.lock-card::before {
    content: '';
    position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
    background: linear-gradient(to right, transparent, var(--g1), transparent);
}
.lock-icon {
    font-size: 2.8rem; margin-bottom: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    width: 72px; height: 72px;
    background: rgba(0,229,160,.08);
    border: 1px solid rgba(0,229,160,.2);
    border-radius: 18px;
}
.lock-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 6px; }
.lock-sub { font-size: .85rem; color: var(--text2); margin-bottom: 28px; }
.lock-input {
    width: 100%;
    background: rgba(255,255,255,.04) !important;
    border: 1px solid rgba(255,255,255,.08) !important;
    color: var(--text) !important;
    padding: 14px 18px; border-radius: 12px;
    font-family: var(--mono); font-size: 1rem; letter-spacing: 3px;
    text-align: center; outline: none !important; margin-bottom: 14px;
    transition: all .25s;
}
.lock-input:focus { border-color: var(--g1) !important; background: rgba(0,229,160,.04) !important; box-shadow: 0 0 0 3px rgba(0,229,160,.1); }
.lock-input::placeholder { color: #344558; letter-spacing: 1px; font-size: .85rem; }
.lock-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--g1) 0%, var(--g2) 100%);
    color: #021a10; border: none; padding: 14px;
    border-radius: 12px; font-family: var(--sans); font-size: 1rem;
    font-weight: 900; cursor: pointer; transition: all .3s;
    box-shadow: 0 6px 24px rgba(0,229,160,.2);
    position: relative; overflow: hidden;
}
.lock-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
    transform: translateX(-100%); transition: transform .5s;
}
.lock-btn:hover::before { transform: translateX(100%); }
.lock-btn:hover { box-shadow: 0 10px 30px rgba(0,229,160,.35); transform: translateY(-1px); }
.back-btn-lock {
    position: absolute; top: 16px; right: 16px;
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    font-family: var(--sans); font-size: .8rem; font-weight: 700;
    color: var(--text2); cursor: pointer; transition: all .2s;
}
.back-btn-lock:hover { border-color: var(--g1); color: var(--g1); }

/* ── LESSON CONTENT ──────────────────── */
#lessonContent { position: relative; z-index: 1; min-height: 100vh; }

/* ── NAV ─────────────────────────────── */
nav {
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(24px) saturate(1.8);
    background: rgba(5,8,16,.85);
}
.nav-w {
    max-width: 1100px; margin: 0 auto;
    padding: 0 28px; height: 62px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    flex-wrap: wrap;
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.back-btn {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    font-size: .8rem; font-weight: 700; color: var(--text2); cursor: pointer;
    transition: all .2s; white-space: nowrap;
}
.back-btn:hover { border-color: var(--g1); color: var(--g1); }

/* TABS */
.tabs-wrap { display: flex; gap: 2px; }
.tab-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 10px; border: none;
    background: none; font-family: var(--sans); font-weight: 700; font-size: .85rem;
    cursor: pointer; color: var(--muted); transition: all .25s;
    opacity: .4; pointer-events: none;
    white-space: nowrap;
}
.tab-btn.unlocked { opacity: 1; pointer-events: auto; }
.tab-btn.active { background: rgba(0,229,160,.1); color: var(--g1); border: 1px solid rgba(0,229,160,.2); opacity: 1; pointer-events: auto; }
.tab-btn.locked-dim::after { content: ' 🔒'; font-size: .7rem; }

/* NAV RIGHT */
.nav-right { display: flex; align-items: center; gap: 10px; }
.access-timer {
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,229,160,.07); border: 1px solid rgba(0,229,160,.2);
    border-radius: 10px; padding: 7px 14px;
    font-family: var(--mono); font-size: .72rem; color: var(--g1);
    white-space: nowrap;
}
.access-timer-label { color: var(--text2); font-size: .68rem; margin-left: 4px; }
#timerBox {
    display: flex; align-items: center; gap: 6px;
    background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
    color: var(--red); border-radius: 10px; padding: 7px 16px;
    font-family: var(--mono); font-size: .88rem; font-weight: 500;
}
#timerBox.urgent { background: rgba(239,68,68,.2); animation: pulseRed 1s infinite; }
@keyframes pulseRed { 0%,100%{border-color:rgba(239,68,68,.3)} 50%{border-color:rgba(239,68,68,.8)} }

/* ── MAIN ────────────────────────────── */
main {
    max-width: 1100px; margin: 0 auto;
    padding: 36px 28px 80px;
}

/* ── START SCREEN ────────────────────── */
#startScreen {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px; padding: 64px 40px;
    text-align: center; position: relative; overflow: hidden;
}
#startScreen::before {
    content: '';
    position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
    background: linear-gradient(to right, transparent, var(--g1), transparent);
}
.start-icon { font-size: 3rem; margin-bottom: 20px; display: block; }
.start-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; }
.start-sub { color: var(--text2); font-size: .95rem; margin-bottom: 10px; line-height: 1.7; }
.start-warn {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(239,68,68,.07); border: 1px solid rgba(239,68,68,.2);
    color: #fca5a5; font-size: .78rem; font-weight: 700;
    padding: 8px 16px; border-radius: 10px; margin-bottom: 36px;
    font-family: var(--mono);
}
.start-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--g1) 0%, var(--g2) 100%);
    color: #021a10; border: none; padding: 16px 48px;
    border-radius: 14px; font-family: var(--sans); font-size: 1.1rem;
    font-weight: 900; cursor: pointer; transition: all .3s;
    box-shadow: 0 8px 28px rgba(0,229,160,.25);
    position: relative; overflow: hidden;
}
.start-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
    transform: translateX(-100%); transition: transform .6s;
}
.start-btn:hover::before { transform: translateX(100%); }
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 35px rgba(0,229,160,.4); }

/* ── QUIZ ────────────────────────────── */
.quiz-wrap { display: flex; flex-direction: column; gap: 24px; }
/* progress */
.quiz-progress {
    display: flex; align-items: center; gap: 14px;
    font-family: var(--mono); font-size: .78rem; color: var(--text2);
}
.prog-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
.prog-bar-fill { height: 100%; background: linear-gradient(to left, var(--g1), var(--g2)); border-radius: 2px; transition: width .4s; }
.q-counter { color: var(--g1); font-weight: 500; white-space: nowrap; }

/* question card */
.q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px; padding: 36px;
    transition: border-color .3s;
}
.q-num {
    font-family: var(--mono); font-size: .7rem; letter-spacing: 1.5px;
    color: var(--g1); text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
}
.q-num::before { content: ''; width: 16px; height: 1px; background: var(--g1); }
.q-img { width: 100%; max-height: 260px; object-fit: contain; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
.q-text { font-size: 1.15rem; font-weight: 700; line-height: 1.65; margin-bottom: 24px; }

/* options */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-label {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
    border-radius: 12px; padding: 14px 18px; cursor: pointer;
    transition: all .22s;
}
.opt-label:hover { border-color: rgba(0,229,160,.3); background: rgba(0,229,160,.04); }
.opt-label:has(input:checked) { border-color: var(--g1); background: rgba(0,229,160,.08); }
.opt-label input[type=radio] { width: 18px; height: 18px; accent-color: var(--g1); flex-shrink: 0; }
.opt-key {
    font-family: var(--mono); font-size: .65rem; font-weight: 500;
    color: var(--muted); background: rgba(255,255,255,.05);
    border: 1px solid var(--border); width: 24px; height: 24px;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; text-transform: uppercase;
}
.opt-label:has(input:checked) .opt-key { background: rgba(0,229,160,.2); border-color: var(--g1); color: var(--g1); }
.opt-text { font-size: .95rem; font-weight: 600; flex: 1; }

/* nav row */
.quiz-nav {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.q-nav-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 11px 22px; border-radius: 12px; border: none;
    font-family: var(--sans); font-weight: 700; font-size: .88rem;
    cursor: pointer; transition: all .25s; white-space: nowrap;
}
.q-nav-btn.ghost { background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--text2); }
.q-nav-btn.ghost:hover { border-color: var(--g1); color: var(--g1); }
.q-nav-btn.primary { background: linear-gradient(135deg, var(--g1) 0%, var(--g2) 100%); color: #021a10; box-shadow: 0 4px 14px rgba(0,229,160,.2); }
.q-nav-btn.primary:hover { box-shadow: 0 8px 22px rgba(0,229,160,.35); transform: translateY(-1px); }
.q-nav-btn.finish { background: rgba(59,130,246,.12); border: 1px solid rgba(59,130,246,.3); color: #93c5fd; }
.q-nav-btn.finish:hover { background: rgba(59,130,246,.2); }

/* ── REVIEW ──────────────────────────── */
.score-banner {
    background: var(--card); border-radius: 24px; padding: 40px;
    text-align: center; border: 1px solid var(--border);
    position: relative; overflow: hidden; margin-bottom: 24px;
}
.score-banner::before {
    content: '';
    position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
    background: linear-gradient(to right, transparent, var(--g1), transparent);
}
.score-val { font-family: var(--mono); font-size: 3.5rem; font-weight: 500; color: var(--g1); line-height: 1; }
.score-of { font-family: var(--mono); font-size: 1.2rem; color: var(--muted); }
.score-msg { color: var(--text2); font-size: .9rem; margin-top: 8px; }
.score-unlock { display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; font-size: .82rem; font-weight: 700; color: var(--g1); background: rgba(0,229,160,.08); border: 1px solid rgba(0,229,160,.2); padding: 8px 18px; border-radius: 20px; font-family: var(--mono); }

/* review items */
.review-item {
    background: var(--card); border-radius: 20px; padding: 28px;
    border: 1px solid var(--border); margin-bottom: 14px;
    transition: border-color .25s;
}
.review-item.correct { border-color: rgba(0,229,160,.25); }
.review-item.wrong   { border-color: rgba(239,68,68,.25); }
.review-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
.review-q-label { font-family: var(--mono); font-size: .68rem; color: var(--g1); text-transform: uppercase; letter-spacing: 1px; }
.badge-correct { font-family: var(--mono); font-size: .65rem; font-weight: 700; padding: 4px 12px; border-radius: 8px; background: rgba(0,229,160,.12); color: var(--g1); border: 1px solid rgba(0,229,160,.25); }
.badge-wrong   { font-family: var(--mono); font-size: .65rem; font-weight: 700; padding: 4px 12px; border-radius: 8px; background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.25); }
.review-q-text { font-size: 1rem; font-weight: 700; margin-bottom: 12px; line-height: 1.55; }
.review-ans { font-size: .85rem; color: var(--text2); margin-bottom: 4px; }
.review-ans span { color: var(--text); font-weight: 700; }
.review-correct-ans { font-size: .85rem; color: var(--g1); font-weight: 700; margin-top: 6px; }

/* ── VIDEO ───────────────────────────── */
#tab-video { width: 100%; }
.video-wrap {
    border-radius: 20px; overflow: hidden;
    border: 1px solid var(--border);
    background: #000; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
/* watermark */
.watermark-container {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 40; overflow: hidden;
}
.watermark-text {
    position: absolute;
    font-family: var(--mono); font-size: 1.2rem; font-weight: 500;
    color: rgba(255,255,255,.22);
    text-shadow: 1px 1px 3px rgba(0,0,0,.8);
    animation: wmMove 25s linear infinite alternate;
    white-space: nowrap;
}
@keyframes wmMove {
    0%   { top:10%; left:10%; }
    25%  { top:75%; left:15%; }
    50%  { top:45%; left:65%; }
    75%  { top:20%; left:45%; }
    100% { top:65%; left:75%; }
}
/* plyr overrides */
.plyr__control--overlaid { z-index: 10 !important; }
.plyr__video-wrapper iframe { pointer-events: none !important; }
.plyr--video .plyr__controls { background: linear-gradient(transparent, rgba(0,0,0,.7)); }
.plyr__progress input[type=range]::-webkit-slider-thumb { background: var(--g1); }
.plyr__volume input[type=range]::-webkit-slider-thumb { background: var(--g1); }

/* ── PDF TAB ─────────────────────────── */
.pdf-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 24px; padding: 64px 40px;
    text-align: center; position: relative; overflow: hidden;
}
.pdf-section::before {
    content: '';
    position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
}
.pdf-icon {
    font-size: 3rem; margin-bottom: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    width: 72px; height: 72px;
    background: rgba(201,147,58,.08); border: 1px solid rgba(201,147,58,.2);
    border-radius: 18px;
}
.pdf-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
.pdf-sub { color: var(--text2); font-size: .9rem; margin-bottom: 32px; }
.pdf-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: #fff; border: none; padding: 15px 40px; border-radius: 14px;
    font-family: var(--sans); font-size: 1rem; font-weight: 900;
    cursor: pointer; text-decoration: none; transition: all .3s;
    box-shadow: 0 6px 24px rgba(201,147,58,.25);
}
.pdf-btn:hover { box-shadow: 0 12px 32px rgba(201,147,58,.4); transform: translateY(-2px); }

/* ── ANIM ────────────────────────────── */
@keyframes riseIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.rise { opacity: 0; animation: riseIn .5s forwards; }
</style>
</head>
<body oncontextmenu="return false;">

<!-- ── LOCK SCREEN ── -->
<div id="codeLockScreen">
    <div class="lock-card">
        <button class="back-btn-lock" onclick="window.history.back()">↩ رجوع</button>
        <div class="lock-icon">🎫</div>
        <div class="lock-title">تفعيل الحصة</div>
        <div class="lock-sub">أدخل الكود الذي حصلت عليه من الأستاذ لفتح هذه الحصة</div>
        <input id="accessCodeInput" class="lock-input" placeholder="XXXXXX" autocomplete="off" spellcheck="false">
        <button id="verifyBtn" class="lock-btn">تفعيل الحصة ←</button>
    </div>
</div>

<!-- ── LESSON CONTENT ── -->
<div id="lessonContent" class="hidden">

    <!-- NAV -->
    <nav>
        <div class="nav-w">
            <div class="nav-left">
                <button class="back-btn" onclick="window.history.back()">↩ رجوع</button>
                <div class="tabs-wrap">
                    <button id="btn-quiz-tab" class="tab-btn unlocked active" onclick="switchTab('quiz')">📝 الامتحان</button>
                    <button id="btn-video-tab" class="tab-btn locked-dim" onclick="switchTab('video')">📺 الشرح</button>
                    <button id="btn-pdf-tab" class="tab-btn locked-dim" onclick="switchTab('pdf')">📚 الملزمة</button>
                </div>
            </div>
            <div class="nav-right">
                <div id="accessTimerBox" class="access-timer hidden">
                    <span class="access-timer-label">صلاحية:</span>
                    <span id="accessCountdown">--:--:--</span>
                </div>
                <div id="timerBox" class="hidden">⏱ <span id="timerVal">40:00</span></div>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <main>

        <!-- QUIZ TAB -->
        <div id="tab-quiz">

            <!-- start -->
            <div id="startScreen" class="rise">
                <span class="start-icon">🚀</span>
                <div class="start-title">جاهز تبدأ الامتحان؟</div>
                <p class="start-sub">بعد إنهاء الامتحان هتفتح فيديو الشرح والملزمة تلقائياً</p>
                <div class="start-warn">⏱ مدة الامتحان: 40 دقيقة فقط</div>
                <button id="startBtn" class="start-btn">ابدأ الامتحان ←</button>
            </div>

            <!-- quiz app -->
            <div id="quizApp" class="hidden quiz-wrap">
                <!-- progress -->
                <div class="quiz-progress">
                    <span id="qCount" class="q-counter">1 / 10</span>
                    <div class="prog-bar-wrap"><div class="prog-bar-fill" id="progFill" style="width:10%"></div></div>
                </div>

                <!-- question -->
                <div class="q-card" id="qDisplay"></div>

                <!-- nav -->
                <div class="quiz-nav">
                    <button id="prevBtn" class="q-nav-btn ghost hidden">← السابق</button>
                    <button id="nextBtn" class="q-nav-btn primary">التالي →</button>
                    <button id="finishBtn" class="q-nav-btn finish hidden">إنهاء وتصحيح ✓</button>
                </div>
            </div>

            <!-- review -->
            <div id="reviewArea" class="hidden">
                <div class="score-banner" id="scoreBanner"></div>
                <div id="reviewList"></div>
            </div>

        </div>

        <!-- VIDEO TAB -->
        <div id="tab-video" class="hidden"></div>

        <!-- PDF TAB -->
        <div id="tab-pdf" class="hidden">
            <div class="pdf-section">
                <div class="pdf-icon">📚</div>
                <div class="pdf-title">ملزمة الحصة</div>
                <p class="pdf-sub">حمّل الملزمة بصيغة PDF واطبعها أو احتفظ بها على جهازك</p>
                <a id="pdfLink" href="#" target="_blank" class="pdf-btn">تحميل الملزمة ↓</a>
            </div>
        </div>

    </main>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({ apiKey:"AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo", authDomain:"math-e62c9.firebaseapp.com", projectId:"math-e62c9", appId:"1:271507842148:web:2907aad4caf67afd08ab71" });
const db = getFirestore(app), auth = getAuth(app);

let questions=[], curIdx=0, userAns={}, lessonData=null, timeLeft=40*60;
let plyrPlayer, examTimer, myStudentId="000000";

/* tabs */
window.switchTab = (tab) => {
    document.querySelectorAll('[id^="tab-"]').forEach(p=>p.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
    document.getElementById(`btn-${tab}-tab`).classList.add('active');
};

/* auth */
onAuthStateChanged(auth, async user => {
    if(!user) { window.location.href="index.html"; return; }
    const lessonId = new URLSearchParams(window.location.search).get('id');
    if(!lessonId) return;

    try {
        const uSnap = await getDoc(doc(db,"users",user.uid));
        if(uSnap.exists()) myStudentId = uSnap.data().studentId || user.uid.substring(0,6).toUpperCase();
    } catch(e){}

    const saved = localStorage.getItem(`access_${user.uid}_${lessonId}`);
    try {
        const qC = query(collection(db,"codes"), where("usedBy","==",user.email));
        const cSnap = await getDocs(qC);
        let hasAccess=false, validExpiry=null;
        const now = Date.now();
        cSnap.forEach(d => {
            const cd=d.data();
            if(cd.lessonId===lessonId && cd.expiryAt>now) { hasAccess=true; validExpiry=cd.expiryAt; }
        });
        if(hasAccess) { initLesson(); startAccessTimer(validExpiry); }
        else if(saved && Date.now()<JSON.parse(saved).expiry) { initLesson(); startAccessTimer(JSON.parse(saved).expiry); }
        else { document.getElementById('codeLockScreen').classList.remove('hidden'); }
    } catch(err) {
        if(saved && Date.now()<JSON.parse(saved).expiry) { initLesson(); startAccessTimer(JSON.parse(saved).expiry); }
        else { document.getElementById('codeLockScreen').classList.remove('hidden'); }
    }
});

function startAccessTimer(expiryTime) {
    document.getElementById('accessTimerBox').classList.remove('hidden');
    const tick = () => {
        const dist = expiryTime - Date.now();
        if(dist<=0) { clearInterval(iv); alert("انتهت صلاحية هذه الحصة."); location.reload(); return; }
        const d=Math.floor(dist/86400000), h=Math.floor((dist%86400000)/3600000);
        const m=Math.floor((dist%3600000)/60000), s=Math.floor((dist%60000)/1000);
        document.getElementById('accessCountdown').textContent = `${d}يوم ${h}س ${m}د ${s}ث`;
    };
    tick(); const iv = setInterval(tick, 1000);
}

/* verify */
document.getElementById('verifyBtn').onclick = async () => {
    const code = document.getElementById('accessCodeInput').value.trim();
    const lessonId = new URLSearchParams(window.location.search).get('id');
    if(!code) return alert("من فضلك أدخل الكود");
    document.getElementById('verifyBtn').textContent = "جاري التحقق...";
    try {
        const snap = await getDoc(doc(db,"codes",code));
        if(snap.exists()) {
            const d=snap.data(), now=Date.now();
            if(!d.used) {
                const exp = now + 7*24*60*60*1000;
                await updateDoc(doc(db,"codes",code), { used:true, usedBy:auth.currentUser.email, lessonId, expiryAt:exp });
                localStorage.setItem(`access_${auth.currentUser.uid}_${lessonId}`, JSON.stringify({expiry:exp}));
                location.reload();
            } else if(d.usedBy===auth.currentUser.email && d.lessonId===lessonId && d.expiryAt>now) {
                localStorage.setItem(`access_${auth.currentUser.uid}_${lessonId}`, JSON.stringify({expiry:d.expiryAt}));
                location.reload();
            } else if(d.expiryAt && d.expiryAt<=now) { alert("هذا الكود انتهت صلاحيته!"); }
            else { alert("هذا الكود مستخدم لحساب آخر!"); }
        } else { alert("الكود غير صحيح!"); }
    } catch(e) { alert("خطأ: "+e.message); }
    document.getElementById('verifyBtn').textContent = "تفعيل الحصة ←";
};

async function initLesson() {
    document.getElementById('codeLockScreen').classList.add('hidden');
    document.getElementById('lessonContent').classList.remove('hidden');
    const id = new URLSearchParams(window.location.search).get('id');
    const snap = await getDoc(doc(db,"lessons",id));
    if(!snap.exists()) return;
    lessonData = snap.data();
    questions = lessonData.questions||[];

    try {
        const qR = query(collection(db,"results"), where("email","==",auth.currentUser.email), where("lesson","==",lessonData.name));
        const rSnap = await getDocs(qR);
        if(!rSnap.empty) {
            const ed=rSnap.docs[0].data();
            userAns=ed.userAns||{};
            const msg=buildScoreMsg(ed.score, questions.length, true);
            generateReview(); unlockFeatures(msg);
        } else {
            const saved=localStorage.getItem(`exam_data_${auth.currentUser.uid}_${id}`);
            if(saved) {
                const pd=JSON.parse(saved); userAns=pd.userAns;
                const msg=buildScoreMsg(pd.score, questions.length, true);
                generateReview(); unlockFeatures(msg);
            }
        }
    } catch(e){ console.log(e); }
}

function buildScoreMsg(score, total, wasPrev) {
    const pct = total>0 ? Math.round(score/total*100) : 0;
    return { score, total, pct, wasPrev };
}

/* start exam */
document.getElementById('startBtn').onclick = () => {
    if(questions.length===0) return alert("لا توجد أسئلة في هذا الامتحان بعد.");
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('quizApp').classList.remove('hidden');
    document.getElementById('timerBox').classList.remove('hidden');
    renderQ(); startTimer();
};

function renderQ() {
    const q = questions[curIdx];
    const pct = Math.round((curIdx+1)/questions.length*100);
    document.getElementById('qCount').textContent = `${curIdx+1} / ${questions.length}`;
    document.getElementById('progFill').style.width = pct+'%';
    document.getElementById('qDisplay').innerHTML = `
        <div class="q-num">السؤال ${curIdx+1}</div>
        ${q.image?`<img src="${q.image}" class="q-img" alt="">`:''}
        <div class="q-text">${q.text||'اختر الإجابة الصحيحة:'}</div>
        <div class="options">
            ${['a','b','c','d'].map(opt=>`
                <label class="opt-label">
                    <input type="radio" name="math" value="${opt}" ${userAns[curIdx]===opt?'checked':''}>
                    <span class="opt-key">${opt}</span>
                    <span class="opt-text">${q[opt]||''}</span>
                </label>
            `).join('')}
        </div>
    `;
    document.getElementById('prevBtn').classList.toggle('hidden', curIdx===0);
    document.getElementById('nextBtn').classList.toggle('hidden', curIdx===questions.length-1);
    document.getElementById('finishBtn').classList.toggle('hidden', curIdx!==questions.length-1);
}

function saveAns(){ const s=document.querySelector('input[name="math"]:checked'); if(s) userAns[curIdx]=s.value; }
document.getElementById('nextBtn').onclick=()=>{ saveAns(); curIdx++; renderQ(); };
document.getElementById('prevBtn').onclick=()=>{ saveAns(); curIdx--; renderQ(); };

document.getElementById('finishBtn').onclick = async () => {
    saveAns(); clearInterval(examTimer);
    let score=0;
    questions.forEach((q,i)=>{ if(userAns[i]===q.correct) score++; });
    try {
        await addDoc(collection(db,"results"),{
            email:auth.currentUser.email, lesson:lessonData.name,
            score, total:questions.length, date:new Date(), userAns
        });
    } catch(e){}
    const id=new URLSearchParams(window.location.search).get('id');
    localStorage.setItem(`exam_data_${auth.currentUser.uid}_${id}`, JSON.stringify({userAns, score}));
    generateReview();
    unlockFeatures(buildScoreMsg(score, questions.length, false));
    window.scrollTo({top:0,behavior:'smooth'});
};

function generateReview() {
    const list = document.getElementById('reviewList');
    list.innerHTML = '';
    questions.forEach((q,i)=>{
        const ok=userAns[i]===q.correct;
        list.innerHTML+=`
            <div class="review-item ${ok?'correct':'wrong'}">
                <div class="review-meta">
                    <span class="review-q-label">سؤال ${i+1}</span>
                    <span class="${ok?'badge-correct':'badge-wrong'}">${ok?'صح ✓':'خطأ ✗'}</span>
                </div>
                ${q.image?`<img src="${q.image}" style="max-height:160px;border-radius:10px;margin-bottom:12px;border:1px solid var(--border);">`:''}
                <div class="review-q-text">${q.text||'اختر الإجابة الصحيحة:'}</div>
                <div class="review-ans">إجابتك: <span>${q[userAns[i]]||'لم تجب'}</span></div>
                ${!ok?`<div class="review-correct-ans">✓ الصحيحة: ${q[q.correct]}</div>`:''}
            </div>`;
    });
}

function unlockFeatures(msgObj) {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('quizApp').classList.add('hidden');
    document.getElementById('timerBox').classList.add('hidden');
    document.getElementById('reviewArea').classList.remove('hidden');

    const pct = msgObj.pct;
    const clr = pct>=70?'var(--g1)':pct>=50?'var(--gold)':'#f87171';
    document.getElementById('scoreBanner').innerHTML = `
        <div class="score-val" style="color:${clr}">${msgObj.score}</div>
        <div class="score-of">من ${msgObj.total} سؤال · ${pct}%</div>
        <div class="score-msg">${msgObj.wasPrev?'لقد أديت هذا الامتحان من قبل':'تم تسجيل درجتك بنجاح'}</div>
        <div class="score-unlock">✅ تم فتح فيديو الشرح والملزمة</div>
    `;

    document.getElementById('btn-video-tab').classList.add('unlocked');
    document.getElementById('btn-video-tab').classList.remove('locked-dim');
    document.getElementById('btn-pdf-tab').classList.add('unlocked');
    document.getElementById('btn-pdf-tab').classList.remove('locked-dim');

    if(lessonData.video && !plyrPlayer) {
        const vc = document.getElementById('tab-video');
        const getYtId=(url)=>{ const m=url.match(/(?:youtu.be\/|v\/|embed\/|watch\?v=)([^#&?]{11})/); return m?m[1]:null; };
        const vId=getYtId(lessonData.video);
        const wm=`<div class="watermark-container"><div class="watermark-text">ID: ${myStudentId}</div></div>`;
        vc.innerHTML=`<div class="video-wrap" oncontextmenu="return false;">${wm}${
            vId
                ?`<div id="player" data-plyr-provider="youtube" data-plyr-embed-id="${vId}"></div>`
                :`<video id="player" playsinline controlsList="nodownload"><source src="${lessonData.video}" type="video/mp4"/></video>`
        }</div>`;
        plyrPlayer=new Plyr('#player',{
            controls:['play-large','play','progress','current-time','mute','volume','fullscreen'],
            youtube:{rel:0,showinfo:0,modestbranding:1,disablekb:1}
        });
    }
    if(lessonData.pdf) document.getElementById('pdfLink').href=lessonData.pdf;
}

function startTimer() {
    examTimer = setInterval(()=>{
        const m=Math.floor(timeLeft/60), s=timeLeft%60;
        document.getElementById('timerVal').textContent=`${m}:${s<10?'0'+s:s}`;
        if(timeLeft<=120) document.getElementById('timerBox').classList.add('urgent');
        if(timeLeft--<=0){ clearInterval(examTimer); alert("انتهى وقت الامتحان!"); document.getElementById('finishBtn').click(); }
    },1000);
}
</script>
</body>
</html>
