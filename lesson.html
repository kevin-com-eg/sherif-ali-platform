<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Lesson Quiz</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100">


<div class="max-w-3xl mx-auto p-6">


<h1 class="text-2xl font-bold text-center mb-6">

Quiz

</h1>


<button id="startExam"
class="bg-green-600 text-white px-6 py-3 rounded">

Enter Exam

</button>


<div id="examBox"
class="hidden bg-white p-6 rounded shadow mt-6">


<img id="questionImage"
class="w-full mb-4">


<div id="answers"></div>


<button id="nextBtn"
class="bg-orange-500 text-white px-6 py-3 mt-4 rounded">

Next Question

</button>


</div>


</div>



<script>


let questions = [

{
image:"q1.png",
a:"2",
b:"4",
c:"6",
d:"8",
correct:"b"
},

{
image:"q2.png",
a:"5",
b:"7",
c:"9",
d:"10",
correct:"c"
}

]


let currentQuestion = 0
let answers = []



document.getElementById("startExam").onclick = () => {

document.getElementById("examBox")
.classList.remove("hidden")

loadQuestion()

}



function loadQuestion(){

let q = questions[currentQuestion]

document.getElementById("questionImage").src = q.image

document.getElementById("answers").innerHTML = `

<label class="block mb-2">
<input type="radio" name="answer" value="a"> ${q.a}
</label>

<label class="block mb-2">
<input type="radio" name="answer" value="b"> ${q.b}
</label>

<label class="block mb-2">
<input type="radio" name="answer" value="c"> ${q.c}
</label>

<label class="block mb-2">
<input type="radio" name="answer" value="d"> ${q.d}
</label>

`

}



document.getElementById("nextBtn").onclick = () => {

let selected =
document.querySelector("input[name='answer']:checked")

if(!selected){

alert("Choose answer")

return

}

answers.push(selected.value)

currentQuestion++


if(currentQuestion < questions.length){

loadQuestion()

}

else{

alert("Exam Finished")

}

}


</script>


</body>
</html>
