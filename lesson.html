<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | الدرس المحمي</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; user-select: none; background-color: #f3f4f6; }
        :root { --plyr-color-main: #f97316; }
        .video-container { position: relative; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 8px solid white; background: #000; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 85%; z-index: 10; background: transparent; }
        .option-card { cursor: pointer; transition: all 0.2s; border: 2px solid #f3f4f6; }
        .option-card:hover { border-color: #f97316; background-color: #fff7ed; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen">

    <div id="authArea" class="fixed inset-0 bg-gray-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md text-center shadow-2xl border-4 border-orange-500">
            <div class="text-6xl mb-4">🔑</div>
            <h2 class="text-2xl font-black mb-2 text-gray-800">ادخل كود تفعيل الحصة</h2>
            <p class="text-gray-500 mb-6 text-sm">بمجرد إدخال الكود، ستفتح الحصة لمدة <span class="text-orange-600 font-bold">7 أيام فقط</span>.</p>
            <input id="accessCode" type="text" placeholder="اكتب الكود هنا..." class="w-full p-4 border-2 border-gray-100 rounded-2xl mb-4 text-center font-bold text-xl uppercase focus:border-orange-500 outline-none transition">
            <button onclick="verifyCode()" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-orange-600 transition-all">تفعيل الآن</button>
            <p id="errorMsg" class="text-red-500 mt-4 font-bold hidden">⚠️ الكود غير صحيح!</p>
        </div>
    </div>

    <header class="glass-nav sticky top-0 z-40 p-4 border-b border-gray-200">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 id="lessonTitle" class="text-xl font-black text-gray-800">جاري التحميل...</h1>
            <a href="index.html" class="text-orange-600 font-bold text-sm bg-orange-50 px-4 py-2 rounded-xl">الرئيسية</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <section id="quizArea" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-white">
                <div class="flex justify-between items-center mb-6">
                    <span id="progressText" class="bg-orange-100 text-orange-600 px-4 py-1 rounded-full text-xs font-black tracking-widest uppercase">Question 1/0</span>
                    <div class="w-1/2 bg-gray-200 h-2 rounded-full overflow-hidden"><div id="progressBar" class="bg-orange-500 h-full transition-all duration-500" style="width: 0%"></div></div>
                </div>
                <img id="qImg" src="" class="w-full rounded-2xl mb-8 border-4 border-gray-50 shadow-sm">
                <div id="optionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <button id="nextBtn" class="w-full bg-gray-900 text-white py-5 mt-10 rounded-2xl font-black text-lg shadow-xl hover:bg-black transition-all">تأكيد الإجابة والانتقال التالي ←</button>
            </div>
        </section>

        <section id="resultsArea" class="hidden space-y-6">
            <div class="bg-orange-600 text-white p-10 rounded-[2.5rem] shadow-2xl text-center relative overflow-hidden">
                <h2 class="text-lg font-bold opacity-80 mb-2">درجتك في الامتحان</h2>
                <div id="scoreText" class="text-7xl font-black mb-2">0/0</div>
                <p id="feedback" class="font-bold text-orange-100">تم تفعيل الفيديو بنجاح، استمتع بالشرح!</p>
            </div>

            <div class="flex bg-white rounded-2xl shadow-sm p-1 border border-gray-200">
                <button id="tabVideoBtn" class="flex-1 py-4 font-black rounded-xl text-orange-600 border-b-4 border-orange-500">فيديو الشرح 📺</button>
                <button id="tabReviewBtn" class="flex-1 py-4 font-black text-gray-400 rounded-xl">مراجعة الأخطاء 📝</button>
            </div>

            <div id="videoTab" class="video-container">
                <div class="video-overlay"></div>
                <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
            </div>

            <div id="reviewTab" class="hidden space-y-4"></div>
        </section>
    </main>

    <footer class="text-center py-10 text-gray-400 text-xs font-bold uppercase tracking-widest">
        MathPro Protected Content &copy; 2024 | رمضان كريم
    </footer>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // 1. منع الـ DevTools وكليك يمين
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };

        // 2. إعدادات Firebase
        const firebaseConfig = { apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo", authDomain: "math-e62c9.firebaseapp.com", projectId: "math-e62c9", appId: "1:271507842148:web:2907aad4caf67afd08ab71" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const lessonId = new URLSearchParams(window.location.search).get("id");
        const SECRET_CODE = "MATH2024"; // الكود الموحد للحصة

        let lessonData, questions = [], current = 0, userAns = [];

        // 3. التحقق من الكود والوقت عند البدء
        window.verifyCode = () => {
            const input = document.getElementById("accessCode").value.toUpperCase();
            if (input === SECRET_CODE) {
                localStorage.setItem("activation_" + lessonId, new Date().getTime());
                document.getElementById("authArea").classList.add("hidden");
                initLesson();
            } else {
                document.getElementById("errorMsg").classList.remove("hidden");
            }
        };

        async function checkAccess() {
            if(!lessonId) return;
            const activationDate = localStorage.getItem("activation_" + lessonId);
            
            if (activationDate) {
                const now = new Date().getTime();
                if (now - activationDate > 7 * 24 * 60 * 60 * 1000) {
                    document.getElementById("authArea").innerHTML = `<div class='bg-white p-10 rounded-[2rem] text-center shadow-2xl'><h2 class='text-2xl font-black text-red-600 mb-2'>انتهت صلاحية الحصة ⏰</h2><p class='text-gray-500'>عذراً، انتهت مدة الـ 7 أيام المتاحة لك.</p></div>`;
                } else {
                    document.getElementById("authArea").classList.add("hidden");
                    initLesson();
                }
            }
        }

        // 4. تحميل بيانات الحصة
        async function initLesson() {
            const snap = await getDoc(doc(db, "lessons", lessonId));
            if(!snap.exists()) return;
            lessonData = snap.data();
            questions = lessonData.questions || [];
            document.getElementById("lessonTitle").innerText = lessonData.name;

            if(localStorage.getItem("done_" + lessonId)) {
                showFinalUI(JSON.parse(localStorage.getItem("ans_" + lessonId)));
            } else {
                document.getElementById("quizArea").classList.remove("hidden");
                renderQuestion();
            }
        }

        function renderQuestion() {
            const q = questions[current];
            document.getElementById("progressText").innerText = `Question ${current + 1} / ${questions.length}`;
            document.getElementById("progressBar").style.width = `${((current + 1) / questions.length) * 100}%`;
            document.getElementById("qImg").src = q.image;
            document.getElementById("optionsGrid").innerHTML = ['a','b','c','d'].map(opt => `
                <label class="option-card flex items-center p-5 bg-white rounded-2xl shadow-sm">
                    <input type="radio" name="choice" value="${opt}" class="w-6 h-6 ml-4 accent-orange-500">
                    <span class="font-bold text-gray-700 uppercase">${opt}: ${q[opt]}</span>
                </label>
            `).join('');
        }

        document.getElementById("nextBtn").onclick = () => {
            const sel = document.querySelector('input[name="choice"]:checked');
            if(!sel) return alert("اختار إجابة يا بطل!");
            userAns.push(sel.value);
            current++;
            if(current < questions.length) renderQuestion();
            else {
                localStorage.setItem("done_" + lessonId, "true");
                localStorage.setItem("ans_" + lessonId, JSON.stringify(userAns));
                showFinalUI(userAns);
            }
        };

        function showFinalUI(answers) {
            document.getElementById("quizArea").classList.add("hidden");
            document.getElementById("resultsArea").classList.remove("hidden");
            
            let score = 0;
            let revHtml = "";
            questions.forEach((q, i) => {
                const correct = answers[i] === q.correct;
                if(correct) score++;
                revHtml += `<div class="bg-white p-4 rounded-xl border-r-8 ${correct ? 'border-green-500':'border-red-500'} shadow-sm flex items-center gap-4">
                    <img src="${q.image}" class="w-20 h-12 rounded object-cover border">
                    <p class="font-bold text-sm">${correct ? '✅ صح':'❌ خطأ'} - الصح هو (${q.correct.toUpperCase()})</p>
                </div>`;
            });

            document.getElementById("scoreText").innerText = `${score} / ${questions.length}`;
            document.getElementById("reviewTab").innerHTML = revHtml;

            if(lessonData.video) {
                let vidId = lessonData.video.split('v=')[1]?.split('&')[0] || lessonData.video.split('/').pop();
                document.getElementById('player').setAttribute('data-plyr-embed-id', vidId);
                new Plyr('#player', { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'], youtube: { noCookie: true, rel: 0, modestbranding: 1 } });
            }
        }

        // التبديل بين التابات
        document.getElementById("tabVideoBtn").onclick = function() {
            document.getElementById("videoTab").classList.remove("hidden");
            document.getElementById("reviewTab").classList.add("hidden");
            this.className = "flex-1 py-4 font-black rounded-xl text-orange-600 border-b-4 border-orange-500";
            document.getElementById("tabReviewBtn").className = "flex-1 py-4 font-black text-gray-400 rounded-xl";
        };
        document.getElementById("tabReviewBtn").onclick = function() {
            document.getElementById("reviewTab").classList.remove("hidden");
            document.getElementById("videoTab").classList.add("hidden");
            this.className = "flex-1 py-4 font-black rounded-xl text-orange-600 border-b-4 border-orange-500";
            document.getElementById("tabVideoBtn").className = "flex-1 py-4 font-black text-gray-400 rounded-xl";
        };

        checkAccess();
    </script>
</body>
</html>
