<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathPro | منطقة الحصة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
:root{
  --bg:#f0f4f7;--white:#fff;--teal:#0d7a5f;--teal2:#0a6650;--teal3:#e8f5f1;--teal4:#c8e8e0;
  --border:#e2e8ed;--border2:#d0dae2;--text:#1a2332;--text2:#5a6a7a;--text3:#8a9aaa;
  --red:#dc2626;--gold:#d97706;--sans:'Tajawal',sans-serif;--mono:'DM Mono',monospace;
  --shadow:0 2px 12px rgba(0,0,0,.07);--shadow2:0 8px 32px rgba(0,0,0,.10);--nav-h:62px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--teal4);border-radius:2px;}
.hidden{display:none!important;}

/* ── LOADING ── */
#loadingScreen{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--white); transition: opacity 0.3s;}
.ld-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--teal),var(--teal2));display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;color:#fff;font-family:var(--mono);box-shadow:0 8px 24px rgba(13,122,95,.3);}
.ld-dots{display:flex;gap:7px;}
.ld-dot{width:8px;height:8px;border-radius:50%;background:var(--teal4);animation:ldp 1.2s ease-in-out infinite;}
.ld-dot:nth-child(2){animation-delay:.2s;}
.ld-dot:nth-child(3){animation-delay:.4s;}
@keyframes ldp{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1);background:var(--teal);}}
.ld-txt{font-size:.8rem;color:var(--text3);font-family:var(--mono);}

/* ── LOCK SCREEN ── */
#codeLockScreen{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);}
.lock-card{width:100%;max-width:420px;background:var(--white);border:1px solid var(--border2);border-radius:24px;padding:44px 34px 36px;text-align:center;position:relative;box-shadow:var(--shadow2);animation:riseIn .5s both;}
.lock-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:linear-gradient(to right,transparent,var(--teal),transparent);border-radius:1px;}
.lock-back{position:absolute;top:16px;right:16px;display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:.78rem;font-weight:700;color:var(--text2);cursor:pointer;transition:all .2s;}
.lock-back:hover{border-color:var(--teal);color:var(--teal);}
.lock-icon{width:72px;height:72px;margin:0 auto 20px;background:var(--teal3);border:1px solid var(--teal4);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
.lock-title{font-size:1.6rem;font-weight:900;color:var(--text);margin-bottom:7px;}
.lock-sub{font-size:.87rem;color:var(--text2);line-height:1.65;margin-bottom:28px;}
.lock-input{width:100%;background:var(--bg);border:1.5px solid var(--border2);color:var(--text);padding:14px 18px;border-radius:12px;font-family:var(--mono);font-size:1.05rem;letter-spacing:4px;text-align:center;outline:none;margin-bottom:14px;}
.lock-input:focus{border-color:var(--teal);background:var(--white);box-shadow:0 0 0 3px rgba(13,122,95,.1);}
.lock-btn{width:100%;background:var(--teal);color:#fff;border:none;padding:14px;border-radius:12px;font-family:var(--sans);font-size:.95rem;font-weight:900;cursor:pointer;transition:all .3s;box-shadow:0 6px 20px rgba(13,122,95,.25);min-height:50px;}
.lock-btn:hover{background:var(--teal2);box-shadow:0 10px 28px rgba(13,122,95,.35);transform:translateY(-1px);}

/* ── NAVBAR ── */
nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:var(--white);border-bottom:1px solid var(--border);box-shadow:0 1px 8px rgba(0,0,0,.05);}
.nav-inner{max-width:960px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.nav-left{display:flex;align-items:center;gap:10px;min-width:0;}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:8px 13px;flex-shrink:0;font-size:.8rem;font-weight:700;color:var(--text2);cursor:pointer;}
.back-btn:hover{border-color:var(--teal);color:var(--teal);}
.tabs{display:flex;gap:3px;background:var(--bg);border:1px solid var(--border2);border-radius:11px;padding:3px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:none;background:none;font-family:var(--sans);font-weight:700;font-size:.82rem;cursor:pointer;color:var(--text3);transition:all .22s;opacity:.45;pointer-events:none;white-space:nowrap;}
.tab-btn.unlocked{opacity:1;pointer-events:auto;color:var(--text2);}
.tab-btn.active{background:var(--teal)!important;color:#fff!important;opacity:1!important;pointer-events:auto!important;}
.tab-btn.locked-dim::after{content:' 🔒';font-size:.62rem;}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.access-pill{display:flex;align-items:center;gap:5px;background:var(--teal3);border:1px solid var(--teal4);border-radius:9px;padding:6px 11px;font-family:var(--mono);font-size:.67rem;color:var(--teal);white-space:nowrap;}
#timerBox{display:flex;align-items:center;gap:5px;background:#fee2e2;border:1px solid #fecaca;color:var(--red);border-radius:9px;padding:6px 13px;font-family:var(--mono);font-size:.83rem;}

/* ── MAIN ── */
main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:26px 20px 70px;}

/* ── QUIZ & HW ── */
.quiz-wrap{display:flex;flex-direction:column;gap:18px;}
.progress-row{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:.75rem;color:var(--text2);}
.prog-track{flex:1;height:5px;background:var(--border2);border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(to right,var(--teal),var(--teal2));border-radius:5px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.q-count{color:var(--teal);font-weight:700;white-space:nowrap;}
.q-card{background:var(--white);border:1px solid var(--border2);border-radius:20px;padding:26px;animation:riseIn .3s both;box-shadow:var(--shadow);}
.q-label{font-family:var(--mono);font-size:.65rem;color:var(--teal);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.q-img{width:100%;max-height:240px;object-fit:contain;border-radius:12px;margin-bottom:18px;border:1px solid var(--border);background:var(--bg);}
.q-text{font-size:clamp(.95rem,2.5vw,1.1rem);font-weight:800;line-height:1.7;margin-bottom:20px;color:var(--text);}
.options{display:flex;flex-direction:column;gap:8px;}
.opt-label{display:flex;align-items:center;gap:12px;background:var(--bg);border:1.5px solid var(--border2);border-radius:12px;padding:13px 15px;cursor:pointer;transition:all .2s;min-height:50px;}
.opt-label:has(input:checked){border-color:var(--teal);background:var(--teal3);}
.opt-label input[type=radio]{width:17px;height:17px;accent-color:var(--teal);flex-shrink:0;}
.opt-key{font-family:var(--mono);font-size:.6rem;font-weight:700;color:var(--text3);background:var(--white);border:1px solid var(--border2);width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-transform:uppercase;}
.opt-label:has(input:checked) .opt-key{background:var(--teal);border-color:var(--teal);color:#fff;}
.opt-text{font-size:.9rem;font-weight:700;flex:1;color:var(--text);}
.quiz-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.q-btn{display:flex;align-items:center;gap:6px;padding:11px 20px;border-radius:11px;border:none;font-family:var(--sans);font-weight:900;font-size:.87rem;cursor:pointer;}
.q-btn.ghost{background:var(--white);border:1.5px solid var(--border2);color:var(--text2);}
.q-btn.primary{background:var(--teal);color:#fff;}
.q-btn.finish{background:#eff6ff;border:1.5px solid #bfdbfe;color:#2563eb;}

/* ── SCORE ── */
.score-card{background:var(--white);border:1px solid var(--border2);border-radius:24px;padding:36px 28px;text-align:center;position:relative;overflow:hidden;margin-bottom:18px;}
.score-ring{width:110px;height:110px;margin:0 auto 18px;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.score-ring svg{position:absolute;inset:0;transform:rotate(-90deg);}
.score-ring-num{font-family:var(--mono);font-size:2.1rem;font-weight:700;line-height:1;}
.score-ring-pct{font-size:.63rem;color:var(--text3);font-family:var(--mono);}
.score-of{font-family:var(--mono);font-size:.83rem;color:var(--text2);margin-top:4px;}

/* ── REVIEW ── */
.review-item{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:10px;}
.review-item.correct{border-color:var(--teal4);}
.review-item.wrong{border-color:#fecaca;}
.review-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rbadge{font-family:var(--mono);font-size:.6rem;font-weight:900;padding:3px 10px;border-radius:7px;}
.rbadge.correct{background:var(--teal3);color:var(--teal);}
.rbadge.wrong{background:#fee2e2;color:var(--red);}

/* ── CUSTOM VIDEO PLAYER (THE ULTIMATE SHIELD) ── */
.vid-section-title{font-size:.7rem;font-weight:900;color:var(--text2);text-transform:uppercase;letter-spacing:2px;font-family:var(--mono);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.vid-section-title::before{content:'';width:3px;height:14px;background:var(--teal);border-radius:2px;}

.pro-player-wrap {
    position: relative; width: 100%; border-radius: 16px;
    overflow: hidden; background: #000; box-shadow: var(--shadow2);
    display: flex; flex-direction: column; justify-content: center;
    aspect-ratio: 16/9;
}
.pro-player-wrap:fullscreen, .pro-player-wrap:-webkit-full-screen { border-radius: 0; }

.vp-iframe-wrap { width: 100%; height: 100%; position: absolute; inset: 0; overflow: hidden; background: #000; }
.pro-video { width: 100%; height: 100%; display: block; object-fit: contain; }

/* درع حماية يوتيوب الفولاذي (يمنع الضغط نهائياً) */
.vp-iframe-wrap iframe {
    width: 100%; height: 100%; border: none; display: block;
    pointer-events: none !important; /* السر هنا: اليوتيوب مش هيحس بأي ضغطة */
}
.glass-shield {
    position: absolute; inset: 0; z-index: 30;
    background: transparent; cursor: pointer;
}

/* العلامة المائية */
.pro-watermark { position: absolute; inset: 0; z-index: 10; pointer-events: none; overflow: hidden; }
.pro-watermark span {
    position: absolute; font-family: var(--mono); font-size: 1.5rem; font-weight: 900;
    color: rgba(255,255,255,0.3); text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
    animation: wmMove 25s linear infinite alternate; white-space: nowrap;
}
@keyframes wmMove { 0% { top: 10%; left: 10%; } 25% { top: 70%; left: 20%; } 50% { top: 40%; left: 70%; } 75% { top: 20%; left: 50%; } 100% { top: 60%; left: 80%; } }

/* شريط التحكم السفلي الاحترافي */
.pro-controls {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 40;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
    padding: 10px 20px 15px; display: flex; flex-direction: column; gap: 8px;
    opacity: 0; transition: opacity 0.3s; direction: ltr;
}
.pro-player-wrap:hover .pro-controls, .pro-player-wrap.active-controls .pro-controls { opacity: 1; }

.pro-timeline-container { width: 100%; height: 20px; display: flex; align-items: center; cursor: pointer; position: relative; }
.pro-timeline-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; position: relative; transition: height 0.1s; }
.pro-timeline-container:hover .pro-timeline-bg { height: 8px; }
.pro-timeline-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--teal); border-radius: 3px; pointer-events: none; transition: width 0.1s linear; }
.pro-timeline-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 16px; height: 16px; background: var(--teal); border-radius: 50%; opacity: 0; pointer-events: none; transition: opacity 0.2s; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
.pro-timeline-container:hover .pro-timeline-thumb { opacity: 1; }

.pro-controls-bottom { display: flex; align-items: center; justify-content: space-between; }
.pro-ctrl-group { display: flex; align-items: center; gap: 15px; }

.pro-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.85; transition: all 0.2s; padding: 0; }
.pro-btn:hover { opacity: 1; transform: scale(1.15); color: var(--teal); }
.pro-btn svg { width: 22px; height: 22px; fill: currentColor; }

.pro-time { color: #fff; font-family: var(--mono); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px; text-shadow: 0 1px 3px #000;}
.pro-speed-btn { font-family: var(--sans); font-size: 0.9rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 5px; opacity: 0.85; cursor: pointer; border: none; background: none; text-shadow: 0 1px 3px #000;}
.pro-speed-btn:hover { opacity: 1; color: var(--teal); }

.vpc-popup-wrap{position:relative;}
.vpc-popup{position:absolute;bottom:calc(100% + 15px);left:50%;transform:translateX(-50%);background:rgba(15,20,32,.98);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:6px;min-width:90px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.8);}
.vpc-popup.open{display:block;animation:riseIn .2s ease-out;}
.vpc-popup-item{display:block;width:100%;padding:8px 12px;font-family:var(--mono);font-size:.8rem;color:rgba(255,255,255,.8);background:none;border:none;cursor:pointer;text-align:center;border-radius:8px;transition:all .15s;margin-bottom:2px;font-weight:700;}
.vpc-popup-item:hover{background:rgba(255,255,255,.1);color:#fff;}
.vpc-popup-item.active{color:#fff;background:var(--teal);}

.pro-player-wrap:fullscreen .pro-controls { z-index: 9999; position: absolute; bottom: 0; }
.pro-player-wrap:fullscreen .vp-iframe-wrap iframe { height: 100vh; }

/* زرار التشغيل في المنتصف */
.pro-center-play {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 75px; height: 55px; background: rgba(13,122,95,0.9);
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 35; transition: all 0.2s; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.pro-center-play:hover { background: var(--teal); transform: translate(-50%, -50%) scale(1.1); }
.pro-center-play svg { width: 32px; height: 32px; fill: #fff; margin-left: 5px; }
.pro-center-play.hidden { display: none; }

@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){ :root{--nav-h:56px;} main{padding:18px 14px 70px;} .back-btn span{display:none;} }
</style>
</head>

<script>
/* ════════════════════════════════════
   SECURITY & DEV TOOLS PROTECTION
   ملحوظة هامة: لو عايز تفتح الـ Inspect عشان تبرمج وتجرب براحتك
   اعمل (Comment) للكود اللي تحت ده مؤقتاً عشان ميقفلش الصفحة في وشك!
════════════════════════════════════ */
(function() {
    document.addEventListener('contextmenu', e => e.preventDefault());

    window.addEventListener('keydown', (e) => {
        if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
            e.preventDefault(); alert("⚠️ غير مسموح بفتح أدوات المطور للحفاظ على خصوصية المحتوى."); return false;
        }
        if (e.key === 'PrintScreen' || e.keyCode === 44) {
            navigator.clipboard.writeText('⚠️ غير مسموح بأخذ لقطات شاشة.');
            alert("⚠️ غير مسموح بأخذ لقطات شاشة لحماية المحتوى.");
        }
    });

    const detectDevTools = () => {
        const widthThreshold = window.outerWidth - window.innerWidth > 160;
        const heightThreshold = window.outerHeight - window.innerHeight > 160;
        if (widthThreshold || heightThreshold) {
            alert("⚠️ غير مسموح بفتح أدوات المطور (Developer Tools).\nيرجى إغلاقها فوراً للمتابعة.");
            window.location.reload(); 
        }
    };
    setInterval(detectDevTools, 1000);
})();
/* ════════════════════════════════════ */

const SUPABASE_URL="https://kspfjzewkpfoeyocbzbm.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_4RiANbDn7lrulIbcXHS_3A_ANMSwaYp";
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const OPT_LETTERS = ['a','b','c','d','e','f','g','h','i','j'];

let currentUser=null,questions=[],curIdx=0,userAns={},lessonData=null,timeLeft=40*60;
let examTimer,myStudentId="000000",vidPlayerInited=false;
let hwData=null, hwUserAns={}, hwCurIdx=0, hwDone=false, hwQuestions=[];

function showLoader(t="جاري التحميل..."){const e=document.getElementById('loadingScreen');if(e){document.getElementById('ldText').textContent=t;e.style.display='flex';e.style.opacity='1';}}
function hideLoader(){const e=document.getElementById('loadingScreen');if(e){e.style.opacity='0';setTimeout(()=>e.style.display='none',300);}}
window.switchTab=(t)=>{showLoader();setTimeout(()=>{document.querySelectorAll('[id^="tab-"]').forEach(p=>p.classList.add('hidden'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById(`tab-${t}`).classList.remove('hidden');document.getElementById(`btn-${t}-tab`).classList.add('active');hideLoader();},400);};

/* ── AUTH & INIT ── */
async function initLessonPage(){
  const lessonId=new URLSearchParams(window.location.search).get('id');
  if(!lessonId){hideLoader();return;}
  const{data:{session}}=await supabaseClient.auth.getSession();
  if(!session){hideLoader();window.location.href="index.html";return;}
  currentUser=session.user;
  const savedLocal=localStorage.getItem(`access_${currentUser.id}_${lessonId}`);
  if(savedLocal && JSON.parse(savedLocal).expiry > Date.now()){
      myStudentId=JSON.parse(savedLocal).studentId||currentUser.id.substring(0,6).toUpperCase();
      await initLesson(); hideLoader(); return;
  }
  try{
    const[{data:uData},{data:cData}]=await Promise.all([ supabaseClient.from('users').select('studentid').eq('id',currentUser.id).single(), supabaseClient.from('codes').select('*').eq('usedby',currentUser.email) ]);
    myStudentId=uData?.studentid||currentUser.id.substring(0,6).toUpperCase();
    let hasAccess=false, validExp=null;
    if(cData) cData.forEach(c=>{if(c.lessonid===lessonId&&c.expiryat>Date.now()){hasAccess=true;validExp=c.expiryat;}});
    if(hasAccess){ localStorage.setItem(`access_${currentUser.id}_${lessonId}`,JSON.stringify({expiry:validExp,studentId:myStudentId})); await initLesson(); hideLoader(); }
    else{ hideLoader(); document.getElementById('codeLockScreen').classList.remove('hidden'); }
  }catch(e){hideLoader(); document.getElementById('codeLockScreen').classList.remove('hidden');}
}

document.getElementById('verifyBtn').onclick=async()=>{
  const code=document.getElementById('accessCodeInput').value.trim();
  const lessonId=new URLSearchParams(window.location.search).get('id');
  if(!code) return alert("أدخل الكود");
  showLoader();
  try{
    const{data:cArr}=await supabaseClient.from('codes').select('*').eq('code',code);
    if(cArr&&cArr.length>0){
      const cd=cArr[0], now=Date.now();
      const{data:lArr}=await supabaseClient.from('lessons').select('*').eq('id',lessonId);
      let vd=7; if(lArr&&lArr.length>0&&lArr[0].validitydays) vd=lArr[0].validitydays;
      if(!cd.used || (cd.usedby===currentUser.email && cd.lessonid===lessonId && cd.expiryat>now)){
        const exp = cd.used ? cd.expiryat : now+vd*24*60*60*1000;
        if(!cd.used) await supabaseClient.from('codes').update({used:true,usedby:currentUser.email,lessonid:lessonId,expiryat:exp}).eq('code',code);
        localStorage.setItem(`access_${currentUser.id}_${lessonId}`,JSON.stringify({expiry:exp,studentId:myStudentId}));
        location.reload();
      }else alert("كود غير صالح أو مستخدم");
    }else alert("كود خاطئ");
  }catch(e){}
  hideLoader();
};

/* ── THE ULTIMATE CUSTOM VIDEO PLAYER ── */
let ytPlayer=null, ytDur=0, ytCur=0, ytPlaying=false, ytTimer=null;

function initVideoPlayer() {
  if(lessonData.video && !vidPlayerInited){
    vidPlayerInited = true;
    const vc = document.getElementById('tab-video');
    const url = lessonData.video;
    
    if(url.includes('youtube.com') || url.includes('youtu.be')){
      const m = url.match(/(?:youtu.be\/|v\/|embed\/|watch\?v=)([^#&?]{11})/);
      const vId = m ? m[1] : null;
      vc.innerHTML = buildYTPlayer(vId); loadYTApi();
    } else {
      vc.innerHTML = buildMP4Player(url); initMP4Player();
    }
  }
}

          </div>
      </div>
      <div class="pro-controls-bottom">
          <div class="pro-ctrl-group">

              <button class="pro-btn" onclick="ytSeek(-10)"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button>
              <button class="pro-btn" onclick="ytSeek(10)"><svg viewBox="0 0 24 24"><path d="M12 5c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8H4c0 3.31 2.69 6 6 6v4l5-5-5-5V7z"/></svg></button>

// بناء مشغل يوتيوب النظيف (بالعازل الزجاجي)
function buildYTPlayer(vId){
  return `
  <div class="pro-player-wrap" id="vpWrap" oncontextmenu="return false;">
      <div class="pro-watermark"><span>ID: ${myStudentId}</span></div>
      <div class="vp-iframe-wrap">
          <div class="glass-shield" onclick="toggleYtPlay()"></div>
          
          <div id="ytFrame"></div>
      </div>
      <div id="centerPlayBtn" class="pro-center-play" onclick="toggleYtPlay()"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="pro-controls" id="vpControls">${getControlsHTML()}</div>
  </div>`;
}

function loadYTApi(){
  if(window.YT&&window.YT.Player){initYTPlayer();return;}
  const tag=document.createElement('script');tag.src="https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
}

window.onYouTubeIframeAPIReady = () => initYTPlayer();

function initYTPlayer(){
  const frameContainer = document.getElementById('ytFrame'); 
  if(!frameContainer) return;
  const m = lessonData.video.match(/(?:youtu.be\/|v\/|embed\/|watch\?v=)([^#&?]{11})/);
  if(!m) return;

  ytPlayer = new YT.Player('ytFrame', {
    videoId: m[1],
    playerVars: {
      'playsinline': 1,
      'controls': 0,           // إخفاء زراير يوتيوب الأساسية
      'rel': 0,                // منع الفيديوهات المقترحة
      'modestbranding': 1,     // تقليل اللوجو
      'disablekb': 1,          
      'iv_load_policy': 3
    },
    events: {
      'onReady': e => {
          ytDur = ytPlayer.getDuration() || 0;
          document.getElementById('vpDur').textContent = fmtTime(ytDur);
          if(ytTimer) clearInterval(ytTimer);
          ytTimer = setInterval(updateYTTime, 500);
      },
      'onStateChange': e => {
          ytPlaying = (e.data === YT.PlayerState.PLAYING);
          const w = document.getElementById('vpWrap');
          const bPlay = document.getElementById('bottomPlayBtn');
          const cPlay = document.getElementById('centerPlayBtn');
          
          if(w){ ytPlaying ? w.classList.add('active-controls') : w.classList.remove('active-controls'); }
          if(bPlay) bPlay.innerHTML = ytPlaying ? `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>` : `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
          if(cPlay) ytPlaying ? cPlay.classList.add('hidden') : cPlay.classList.remove('hidden');
      }
    }
  });

  const prog=document.getElementById('vpProg');
  let isDragging = false;
  const updateProgress = (e) => { const r = prog.getBoundingClientRect(); const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)); ytPlayer.seekTo(pct * ytDur, true); };
  prog.addEventListener('mousedown', (e) => { isDragging = true; updateProgress(e); });
  document.addEventListener('mousemove', (e) => { if(isDragging) updateProgress(e); });
  document.addEventListener('mouseup', () => { isDragging = false; });
  prog.addEventListener('touchstart', (e) => { isDragging = true; updateProgress(e.touches[0]); }, {passive: true});
  document.addEventListener('touchmove', (e) => { if(isDragging) updateProgress(e.touches[0]); }, {passive: true});
  document.addEventListener('touchend', () => { isDragging = false; });
}

function updateYTTime(){
    if(!ytPlayer||!ytPlayer.getCurrentTime)return;
    ytCur=ytPlayer.getCurrentTime()||0; ytDur=ytPlayer.getDuration()||0;
    document.getElementById('vpDur').textContent=fmtTime(ytDur); document.getElementById('vpCur').textContent=fmtTime(ytCur);
    const pct=ytDur?(ytCur/ytDur*100):0;
    document.getElementById('vpFill').style.width=pct+'%'; document.getElementById('vpThumb').style.left=pct+'%';
}

window.toggleYtPlay = () => {
  if(ytPlayer && ytPlayer.getPlayerState){
      if (ytPlayer.getPlayerState()===YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
      else ytPlayer.playVideo();
  }
  const vid = document.getElementById('vpVid');
  if(vid) { if(!vid.paused) vid.pause(); else vid.play(); }
};

window.ytSeek = (s) => {
    if(ytPlayer && ytPlayer.seekTo){ ytCur=Math.max(0,Math.min(ytDur,ytCur+s)); ytPlayer.seekTo(ytCur,true); } 
    else { const vid = document.getElementById('vpVid'); if(vid) vid.currentTime = Math.max(0, vid.currentTime + s); }
};

// بناء مشغل MP4 / Bunny
function buildMP4Player(src){
  return `
  <div class="pro-player-wrap" id="vpWrap" oncontextmenu="return false;">
      <div class="pro-watermark"><span>ID: ${myStudentId}</span></div>
      <video class="pro-video" id="vpVid" playsinline disablePictureInPicture><source src="${src}" type="video/mp4"></video>
      <div class="glass-shield" onclick="toggleYtPlay()"></div>
      <div id="centerPlayBtn" class="pro-center-play" onclick="toggleYtPlay()"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="pro-controls" id="vpControls">${getControlsHTML()}</div>
  </div>`;
}

function initMP4Player(){
  const vid = document.getElementById('vpVid');
  const wrap = document.getElementById('vpWrap');
  const bPlay = document.getElementById('bottomPlayBtn');
  const cPlay = document.getElementById('centerPlayBtn');
  if(!vid) return;

  vid.onplay = () => { bPlay.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`; cPlay.classList.add('hidden'); wrap.classList.add('active-controls'); };
  vid.onpause = () => { bPlay.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`; cPlay.classList.remove('hidden'); wrap.classList.add('active-controls'); };

  let ht;
  wrap.addEventListener('mousemove', () => { wrap.classList.add('active-controls'); clearTimeout(ht); ht = setTimeout(() => { if(!vid.paused) wrap.classList.remove('active-controls'); }, 2500); });
  wrap.addEventListener('mouseleave', () => { if(!vid.paused) wrap.classList.remove('active-controls'); });

  vid.ontimeupdate = () => {
      const p = vid.duration ? (vid.currentTime / vid.duration * 100) : 0;
      document.getElementById('vpFill').style.width = p + '%'; document.getElementById('vpThumb').style.left = p + '%';
      document.getElementById('vpCur').textContent = fmtTime(vid.currentTime);
  };
  vid.onloadedmetadata = () => { document.getElementById('vpDur').textContent = fmtTime(vid.duration); };

  const prog = document.getElementById('vpProg');
  let isDragging = false;
  const updateProgress = (e) => { const r = prog.getBoundingClientRect(); const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)); vid.currentTime = pct * vid.duration; };
  prog.addEventListener('mousedown', (e) => { isDragging = true; updateProgress(e); });
  document.addEventListener('mousemove', (e) => { if(isDragging) updateProgress(e); });
  document.addEventListener('mouseup', () => { isDragging = false; });
  prog.addEventListener('touchstart', (e) => { isDragging = true; updateProgress(e.touches[0]); }, {passive: true});
  document.addEventListener('touchmove', (e) => { if(isDragging) updateProgress(e.touches[0]); }, {passive: true});
  document.addEventListener('touchend', () => { isDragging = false; });
}

window.setSpeed=(s)=>{
    document.querySelectorAll('.vpc-popup-item').forEach(i=>i.classList.toggle('active',parseFloat(i.textContent)===s));
    document.getElementById('vpSpeedLbl').textContent=s+'x';
    const v=document.getElementById('vpVid');
    if(v) v.playbackRate=s; else if(ytPlayer?.setPlaybackRate) ytPlayer.setPlaybackRate(s);
    closeAllPopups();
};

window.togglePopup=(id)=>{const p=document.getElementById(id);const was=p.classList.contains('open');closeAllPopups();if(!was)p.classList.add('open');};
function closeAllPopups(){document.querySelectorAll('.vpc-popup').forEach(p=>p.classList.remove('open'));}
document.addEventListener('click',e=>{if(!e.target.closest('.vpc-popup-wrap'))closeAllPopups();});

window.toggleFullscreen=()=>{
  const w=document.getElementById('vpWrap');
  if(!w)return;
  if(!document.fullscreenElement) w.requestFullscreen();
  else document.exitFullscreen();
};
function fmtTime(s){s=Math.floor(s||0);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${m}:${String(sc).padStart(2,'0')}`;}

/* ── LESSON & QUIZ LOGIC ── */
async function initLesson(){
  document.getElementById('codeLockScreen').classList.add('hidden'); document.getElementById('lessonContent').classList.remove('hidden');
  const id=new URLSearchParams(window.location.search).get('id');
  const[{data:snap},{data:rSnap}]=await Promise.all([ supabaseClient.from('lessons').select('*').eq('id',id).single(), supabaseClient.from('results').select('*').eq('email',currentUser?.email).order('date',{ascending:false}) ]);
  if(!snap) return;
  lessonData=snap; questions=lessonData.questions||[];

  if (questions.length === 0) {
    document.getElementById('tab-quiz').innerHTML = `<div class="q-card" style="text-align:center;"><h2>🎓 لا يوجد امتحان لهذه الحصة</h2></div>`;
    ['video','pdf'].forEach(t=>{ document.getElementById(`btn-${t}-tab`).classList.add('unlocked'); document.getElementById(`btn-${t}-tab`).classList.remove('locked-dim'); });
    initVideoPlayer();
    if(lessonData.pdf) document.getElementById('pdfLink').href = lessonData.pdf;
    setTimeout(()=>switchTab('video'), 100); return;
  }
  
  const prev=rSnap?.find(r=>r.lesson===lessonData.name);
  if(prev){ userAns=prev.userans||{}; generateReview(); unlockFeatures(prev.score, questions.length); }
  else { const saved=localStorage.getItem(`exam_data_${currentUser.id}_${id}`); if(saved){const pd=JSON.parse(saved);userAns=pd.userAns;generateReview();unlockFeatures(pd.score, questions.length);} }
}

document.getElementById('startBtn').onclick=()=>{
  if(questions.length===0) return;
  showLoader(); setTimeout(() => { document.getElementById('startScreen').classList.add('hidden'); document.getElementById('quizApp').classList.remove('hidden'); renderQ(); hideLoader(); }, 400);
};

function renderQ(){
  const q=questions[curIdx];
  const letters = OPT_LETTERS.slice(0, q.optionsCount||4);
  document.getElementById('qCount').textContent=`${curIdx+1} / ${questions.length}`;
  document.getElementById('qDisplay').innerHTML=`<div class="q-label">السؤال ${curIdx+1}</div>${q.image?`<img src="${q.image}" class="q-img">`:''}<div class="q-text">${q.text||'اختر الإجابة:'}</div><div class="options">${letters.map(opt=>`<label class="opt-label"><input type="radio" name="math" value="${opt}" ${userAns[curIdx]===opt?'checked':''}><span class="opt-key">${opt.toUpperCase()}</span><span class="opt-text">${q[opt]||''}</span></label>`).join('')}</div>`;
  document.getElementById('prevBtn').classList.toggle('hidden',curIdx===0);
  document.getElementById('nextBtn').classList.toggle('hidden',curIdx===questions.length-1);
  document.getElementById('finishBtn').classList.toggle('hidden',curIdx!==questions.length-1);
}

function saveAns(){const s=document.querySelector('input[name="math"]:checked');if(s)userAns[curIdx]=s.value;}
document.getElementById('nextBtn').onclick=()=>{saveAns();curIdx++;renderQ();};
document.getElementById('prevBtn').onclick=()=>{saveAns();curIdx--;renderQ();};
document.getElementById('finishBtn').onclick=()=>{
  saveAns(); showLoader("جاري التصحيح...");
  let score=0; questions.forEach((q,i)=>{if(userAns[i]===q.correct)score++;});
  supabaseClient.from('results').insert([{ email:currentUser.email, lesson:lessonData.name, score, total:questions.length, userans:userAns }]);
  setTimeout(() => { generateReview(); unlockFeatures(score,questions.length); hideLoader(); }, 500);
};

function generateReview(){
  const list=document.getElementById('reviewList'); list.innerHTML='';
  questions.forEach((q,i)=>{
    const ok=userAns[i]===q.correct, ansL=userAns[i]?userAns[i].toUpperCase():'لم تجب', corrL=q.correct?q.correct.toUpperCase():'';
    list.innerHTML+=`<div class="review-item ${ok?'correct':'wrong'}"><div class="review-meta"><span class="review-q-label">سؤال ${i+1}</span><span class="rbadge ${ok?'correct':'wrong'}">${ok?'✓ صح':'✗ خطأ'}</span></div>${q.image?`<img src="${q.image}" style="max-height:150px;border-radius:10px;margin-bottom:10px;">`:''}<div class="review-ans">إجابتك: <b>${ansL}</b> | الصحيحة: <b>${corrL}</b></div></div>`;
  });
}

function unlockFeatures(score, total){
  document.getElementById('startScreen').classList.add('hidden'); document.getElementById('quizApp').classList.add('hidden'); document.getElementById('reviewArea').classList.remove('hidden');
  document.getElementById('scoreBanner').innerHTML=`<h2>نتيجتك: ${score} / ${total}</h2>`;
  ['video','pdf'].forEach(t=>{ document.getElementById(`btn-${t}-tab`).classList.add('unlocked'); document.getElementById(`btn-${t}-tab`).classList.remove('locked-dim'); });
  initVideoPlayer(); if(lessonData.pdf) document.getElementById('pdfLink').href=lessonData.pdf;
}
