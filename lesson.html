<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | منطقة المذاكرة ✍️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #05070a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gold-gradient { background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .q-card { transition: all 0.3s ease; border: 2px solid transparent; }
        .q-card:hover { border-color: #f97316; background: rgba(249, 115, 22, 0.05); }
        input[type="radio"]:checked + label { background-color: #f97316; color: white; border-color: #f97316; }
    </style>
</head>
<body class="p-4 md:p-8">

    <main class="max-w-5xl mx-auto space-y-10">
        <div class="flex justify-between items-center">
            <h1 id="lessonTitle" class="text-3xl font-black gold-gradient">جاري تحميل الدرس...</h1>
            <a href="dashboard.html" class="bg-white/5 px-6 py-2 rounded-full font-bold hover:bg-white/10 transition">خروج</a>
        </div>

        <div class="video-container glass">
            <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
        </div>

        <div id="pdfArea" class="hidden flex justify-center">
            <a id="pdfLink" href="#" target="_blank" class="flex items-center gap-3 bg-orange-600 hover:bg-orange-700 px-8 py-4 rounded-2xl font-black shadow-xl transition-all">
                <span>⬇️ تحميل ملزمة الحصة (PDF)</span>
            </a>
        </div>

        <hr class="border-white/5">

        <section id="quizSection" class="space-y-8 pb-20">
            <div class="text-center space-y-2">
                <h2 class="text-3xl font-black">الاختبار القبلي 📝</h2>
                <p class="text-gray-500 font-medium">أجب على الأسئلة التالية لتسجيل درجتك في سجل المستر</p>
            </div>

            <div id="questionsList" class="space-y-12">
                </div>

            <button id="submitQuizBtn" class="w-full bg-white text-black font-black py-6 rounded-[2rem] text-2xl shadow-2xl hover:bg-orange-500 hover:text-white transition-all transform active:scale-95">
                إرسال الإجابات وإنهاء الحصة 🚀
            </button>
        </section>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
        authDomain: "math-e62c9.firebaseapp.com",
        projectId: "math-e62c9",
        appId: "1:271507842148:web:2907aad4caf67afd08ab71"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentStudent = null;
    let lessonData = null;
    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('id');

    // 1. التحقق من هوية الطالب
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            currentStudent = { uid: user.uid, email: user.email, name: userSnap.exists() ? userSnap.data().name : user.email.split('@')[0] };
            loadLessonDetails();
        } else {
            window.location.href = "index.html";
        }
    });

    // 2. تحميل بيانات الحصة من Firestore
    async function loadLessonDetails() {
        if (!lessonId) return;
        const lessonSnap = await getDoc(doc(db, "lessons", lessonId));
        if (lessonSnap.exists()) {
            lessonData = lessonSnap.data();
            document.getElementById('lessonTitle').innerText = lessonData.name;
            document.getElementById('videoFrame').src = lessonData.video.replace("watch?v=", "embed/");
            
            if (lessonData.pdf) {
                document.getElementById('pdfArea').classList.remove('hidden');
                document.getElementById('pdfLink').href = lessonData.pdf;
            }

            renderQuestions(lessonData.questions);
        }
    }

    // 3. عرض الأسئلة
    function renderQuestions(questions) {
        const list = document.getElementById('questionsList');
        list.innerHTML = "";
        questions.forEach((q, index) => {
            list.innerHTML += `
                <div class="q-card glass p-8 rounded-[2.5rem] space-y-6" data-correct="${q.correct}">
                    <p class="text-orange-500 font-black tracking-widest text-sm uppercase">السؤال ${index + 1}</p>
                    ${q.image ? `<img src="${q.image}" class="rounded-xl w-full border border-white/10">` : ''}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${['a', 'b', 'c', 'd'].map(opt => `
                            <div>
                                <input type="radio" name="q${index}" id="q${index}${opt}" value="${opt}" class="hidden">
                                <label for="q${index}${opt}" class="flex items-center p-4 rounded-2xl border border-white/10 cursor-pointer hover:bg-white/5 transition font-bold">
                                    <span class="w-8 h-8 rounded-full border border-orange-500 flex items-center justify-center ml-3 text-sm">${opt.toUpperCase()}</span>
                                    ${q[opt]}
                                </label>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
    }

    // 4. تصحيح الامتحان وإرسال النتيجة للمدرس
    document.getElementById('submitQuizBtn').onclick = async () => {
        const questions = document.querySelectorAll('.q-card');
        let score = 0;
        let total = questions.length;
        let allAnswered = true;

        questions.forEach((qCard, index) => {
            const selected = qCard.querySelector(`input[name="q${index}"]:checked`);
            if (selected) {
                if (selected.value === qCard.dataset.correct) score++;
            } else {
                allAnswered = false;
            }
        });

        if (!allAnswered) {
            if (!confirm("لم تجب على جميع الأسئلة، هل تريد الاستمرار؟")) return;
        }

        const btn = document.getElementById('submitQuizBtn');
        btn.innerText = "جاري حفظ النتيجة... ⏳";
        btn.disabled = true;

        try {
            // إرسال النتيجة لمجموعة results اللي بيقرأ منها المدرس
            await addDoc(collection(db, "results"), {
                studentName: currentStudent.name,
                studentEmail: currentStudent.email,
                lessonName: lessonData.name,
                score: score,
                totalQuestions: total,
                submittedAt: new Date()
            });

            alert(`أحسنت يا ${currentStudent.name}! درجتك هي: ${score} من ${total}\nتم إرسال نتيجتك لمستر كيفين هاني.`);
            window.location.href = "dashboard.html";
        } catch (e) {
            alert("حدث خطأ أثناء حفظ النتيجة، حاول مرة أخرى.");
            btn.disabled = false;
            btn.innerText = "إرسال الإجابات وإنهاء الحصة 🚀";
        }
    };
</script>
</body>
</html>
