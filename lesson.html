<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | مستر كيفين 🎓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #05070a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-btn { opacity: 0.3; pointer-events: none; transition: 0.3s; border-bottom: 4px solid transparent; }
        .tab-btn.unlocked { opacity: 1; pointer-events: auto; }
        .tab-btn.active { border-bottom: 4px solid #f97316; color: #f97316; }
        .hidden { display: none !important; }
        .q-card { transition: all 0.3s ease; }
        
        /* حماية الفيديو من نسخ الرابط ومنع كليك يمين على يوتيوب */
        .plyr__video-wrapper iframe { pointer-events: none !important; }
        .plyr__control--overlaid { z-index: 10 !important; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="codeLockScreen" class="fixed inset-0 z-[100] bg-[#05070a] flex items-center justify-center p-6 hidden">
        <div class="glass p-10 rounded-[3rem] w-full max-w-md text-center space-y-6 border-orange-500/20 shadow-2xl">
            <button onclick="window.history.back()" class="absolute top-6 right-6 text-gray-400 hover:text-white transition font-bold bg-white/5 px-4 py-2 rounded-xl">↩️ رجوع</button>
            <h2 class="text-3xl font-black text-white mt-4">تفعيل الحصة 🎫</h2>
            <input id="accessCodeInput" type="text" placeholder="أدخل الكود" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-white text-xl outline-none focus:border-orange-500">
            <button id="verifyBtn" class="w-full bg-orange-600 font-black py-5 rounded-2xl text-xl hover:bg-orange-700 transition shadow-lg shadow-orange-600/20">تفعيل الحصة</button>
        </div>
    </div>

    <div id="lessonContent" class="hidden">
        <nav class="glass sticky top-0 z-50 p-4 mb-6">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                
                <div class="flex items-center gap-4 flex-wrap justify-center">
                    <button onclick="window.history.back()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2">
                        ↩️ رجوع
                    </button>
                    <div class="flex gap-2 sm:gap-6">
                        <button id="btn-quiz-tab" onclick="switchTab('quiz')" class="tab-btn unlocked active px-4 py-2 font-black text-lg">📝 الامتحان</button>
                        <button id="btn-video-tab" onclick="switchTab('video')" class="tab-btn px-4 py-2 font-black text-lg">📺 الشرح</button>
                        <button id="btn-pdf-tab" onclick="switchTab('pdf')" class="tab-btn px-4 py-2 font-black text-lg">📚 الملزمة</button>
                    </div>
                </div>
                
                <div class="flex flex-col items-end gap-2">
                    <div id="accessTimerBox" class="hidden bg-orange-600/20 text-orange-400 border border-orange-500/50 px-4 py-1 rounded-full text-sm font-bold">
                        صلاحية الحصة: <span id="accessCountdown" class="font-mono">--:--:--:--</span>
                    </div>
                    <div id="timerBox" class="bg-red-600 px-6 py-2 rounded-full font-black font-mono shadow-lg shadow-red-600/20 hidden">40:00</div>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto px-6 pb-20">
            <div id="tab-quiz" class="tab-pane">
                <div id="startScreen" class="text-center py-20 glass rounded-[3rem] border border-white/5">
                    <h2 class="text-3xl font-black mb-6">جاهز تبدأ الامتحان؟</h2>
                    <p class="text-gray-400 mb-8">لن يفتح فيديو الشرح والملزمة إلا بعد إنهاء هذا الامتحان</p>
                    <button id="startBtn" class="bg-orange-600 px-16 py-5 rounded-2xl text-2xl font-black hover:scale-105 transition">ابدأ الآن 🚀</button>
                </div>

                <div id="quizApp" class="hidden">
                    <div id="qDisplay" class="glass p-10 rounded-[3rem] q-card border border-white/10 min-h-[400px]">
                    </div>
                    <div class="flex justify-between items-center mt-8">
                        <button id="prevBtn" class="bg-white/10 px-10 py-4 rounded-2xl font-bold hover:bg-white/20 transition hidden">السابق</button>
                        <span id="qCount" class="text-2xl font-black text-orange-500">1 / 10</span>
                        <button id="nextBtn" class="bg-orange-600 px-10 py-4 rounded-2xl font-bold hover:bg-orange-700 transition">التالي</button>
                        <button id="finishBtn" class="hidden bg-green-600 px-10 py-4 rounded-2xl font-black hover:bg-green-700 transition">إنهاء وتصحيح 🔓</button>
                    </div>
                </div>

                <div id="reviewArea" class="hidden space-y-8 mt-10">
                    <div id="scoreBanner" class="glass p-10 rounded-[3rem] text-center border-2 border-orange-500"></div>
                    <h3 class="text-2xl font-black text-center mt-8 mb-4">مراجعة إجاباتك 🔍</h3>
                    <div id="reviewList" class="space-y-6"></div>
                </div>
            </div>

            <div id="tab-video" class="tab-pane hidden w-full">
            </div>

            <div id="tab-pdf" class="tab-pane hidden text-center p-20 glass rounded-[3rem] border border-white/5">
                <h3 class="text-3xl font-black mb-10">ملزمة الحصة بصيغة PDF 📚</h3>
                <a id="pdfLink" href="#" target="_blank" class="bg-white text-black px-16 py-6 rounded-2xl font-black text-2xl hover:bg-orange-600 hover:text-white transition shadow-xl">تحميل الملزمة الآن</a>
            </div>
        </main>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
            authDomain: "math-e62c9.firebaseapp.com",
            projectId: "math-e62c9",
            appId: "1:271507842148:web:2907aad4caf67afd08ab71"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let questions = [], curIdx = 0, userAns = {}, lessonData = null, timeLeft = 40 * 60;
        let plyrPlayer, examTimerInterval;

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}-tab`).classList.add('active');
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const lessonId = new URLSearchParams(window.location.search).get('id');
                const saved = localStorage.getItem(`access_${lessonId}`);
                
                if (saved) {
                    const expiry = JSON.parse(saved).expiry;
                    if (new Date().getTime() < expiry) {
                        initLesson();
                        startAccessTimer(expiry);
                    } else {
                        localStorage.removeItem(`access_${lessonId}`);
                        document.getElementById('codeLockScreen').classList.remove('hidden');
                    }
                } else {
                    document.getElementById('codeLockScreen').classList.remove('hidden');
                }
            } else { window.location.href = "index.html"; } // العودة لتسجيل الدخول إذا لم يكن مسجلاً
        });

        function startAccessTimer(expiryTime) {
            document.getElementById('accessTimerBox').classList.remove('hidden');
            const interval = setInterval(() => {
                const now = new Date().getTime();
                const distance = expiryTime - now;

                if (distance <= 0) {
                    clearInterval(interval);
                    alert("انتهت صلاحية هذه الحصة (مرت 7 أيام).");
                    localStorage.removeItem(`access_${new URLSearchParams(window.location.search).get('id')}`);
                    location.reload();
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('accessCountdown').innerText = `${days}يوم ${hours}س ${minutes}د ${seconds}ث`;
            }, 1000);
        }

        document.getElementById('verifyBtn').onclick = async () => {
            const code = document.getElementById('accessCodeInput').value.trim();
            if(!code) return alert("من فضلك أدخل الكود");
            
            try {
                const snap = await getDoc(doc(db, "codes", code));
                if (snap.exists() && (!snap.data().used || snap.data().usedBy === auth.currentUser.email)) {
                    const expiry = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);
                    await updateDoc(doc(db, "codes", code), { used: true, usedBy: auth.currentUser.email, expiryAt: expiry });
                    localStorage.setItem(`access_${new URLSearchParams(window.location.search).get('id')}`, JSON.stringify({ expiry }));
                    location.reload();
                } else { 
                    alert("هذا الكود غير صالح أو تم استخدامه مسبقاً!"); 
                }
            } catch (error) {
                console.error("خطأ: ", error);
            }
        };

        async function initLesson() {
            document.getElementById('lessonContent').classList.remove('hidden');
            const id = new URLSearchParams(window.location.search).get('id');
            const snap = await getDoc(doc(db, "lessons", id));
            if (snap.exists()) {
                lessonData = snap.data();
                questions = lessonData.questions || [];

                const savedExamData = localStorage.getItem(`exam_data_${id}`);
                if (savedExamData) {
                    const parsedData = JSON.parse(savedExamData);
                    userAns = parsedData.userAns; 
                    generateReviewList(); 
                    
                    const msg = `
                        <h2 class="text-4xl font-black mb-2 text-green-500">لقد حصلت مسبقاً على: ${parsedData.score} من ${questions.length} ✅</h2>
                        <p class="text-gray-400 font-bold mt-2">فيديو الشرح والملزمة متاحين لك الآن بالأعلى.</p>
                    `;
                    unlockLessonFeatures(msg);
                }
            }
        }

        function generateReviewList() {
            const reviewList = document.getElementById('reviewList');
            reviewList.innerHTML = '';

            questions.forEach((q, i) => {
                const isCorrect = userAns[i] === q.correct;
                reviewList.innerHTML += `
                    <div class="glass p-8 rounded-[2rem] border-2 ${isCorrect ? 'border-green-500/50' : 'border-red-500/50'}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-black text-orange-500 italic underline">السؤال ${i+1}</span>
                            <span class="px-4 py-1 rounded-full text-sm font-bold ${isCorrect ? 'bg-green-600' : 'bg-red-600'}">${isCorrect ? 'إجابة صحيحة' : 'إجابة خاطئة'}</span>
                        </div>
                        ${q.image ? `<img src="${q.image}" class="max-h-48 mb-4 rounded-xl mx-auto">` : ''}
                        <h3 class="text-xl font-bold mb-4">${q.text || 'اختر الإجابة الصحيحة:'}</h3>
                        <p class="text-lg opacity-70 mb-2">إجابتك كانت: <span class="font-bold text-white">${q[userAns[i]] || 'لم تجب'}</span></p>
                        ${!isCorrect ? `<p class="text-lg font-bold text-green-400">الإجابة الصحيحة: ${q[q.correct]}</p>` : ''}
                    </div>
                `;
            });
        }

        function unlockLessonFeatures(scoreMessage = null) {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizApp').classList.add('hidden');
            document.getElementById('timerBox').classList.add('hidden');
            document.getElementById('reviewArea').classList.remove('hidden');
            
            if (scoreMessage) {
                document.getElementById('scoreBanner').innerHTML = scoreMessage;
            }

            document.getElementById('btn-video-tab').classList.add('unlocked');
            document.getElementById('btn-pdf-tab').classList.add('unlocked');
            
            if (lessonData.video && !plyrPlayer) {
                const videoContainer = document.getElementById('tab-video');
                const getYouTubeId = (url) => {
                    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
                    const match = url.match(regExp);
                    return (match && match[2].length === 11) ? match[2] : null;
                };
                const vId = getYouTubeId(lessonData.video);

                if (vId) {
                    videoContainer.innerHTML = `<div class="rounded-[3rem] overflow-hidden shadow-2xl border-4 border-white/5 bg-black" oncontextmenu="return false;"><div id="player" data-plyr-provider="youtube" data-plyr-embed-id="${vId}"></div></div>`;
                } else {
                    videoContainer.innerHTML = `<div class="rounded-[3rem] overflow-hidden shadow-2xl border-4 border-white/5 bg-black" oncontextmenu="return false;"><video id="player" playsinline controlsList="nodownload"><source src="${lessonData.video}" type="video/mp4" /></video></div>`;
                }
                
                // إعدادات مخصصة لـ Plyr لإخفاء أزرار يوتيوب والمقترحات
                plyrPlayer = new Plyr('#player', {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    youtube: { 
                        rel: 0, 
                        showinfo: 0, 
                        modestbranding: 1, 
                        disablekb: 1 
                    }
                });
            }
            
            if(lessonData.pdf) { document.getElementById('pdfLink').href = lessonData.pdf; }
        }

        document.getElementById('startBtn').onclick = () => {
            if(questions.length === 0) return alert("لا يوجد أسئلة في هذا الامتحان بعد.");
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizApp').classList.remove('hidden');
            document.getElementById('timerBox').classList.remove('hidden');
            renderQ();
            startTimer();
        };

        function renderQ() {
            const q = questions[curIdx];
            document.getElementById('qDisplay').innerHTML = `
                <p class="text-orange-500 font-black mb-4 underline">السؤال ${curIdx + 1}</p>
                ${q.image ? `<div class="mb-6 rounded-2xl overflow-hidden border border-white/10 shadow-lg"><img src="${q.image}" class="w-full object-contain max-h-80 mx-auto"></div>` : ''}
                <h3 class="text-2xl font-bold mb-8">${q.text || 'اختر الإجابة الصحيحة من الخيارات التالية:'}</h3>
                <div class="grid gap-4">
                    ${['a','b','c','d'].map(opt => `
                        <label class="p-6 glass rounded-2xl flex items-center gap-4 cursor-pointer border-2 border-transparent transition-all hover:bg-white/5 has-[:checked]:border-orange-500 has-[:checked]:bg-orange-500/10">
                            <input type="radio" name="math" value="${opt}" ${userAns[curIdx] === opt ? 'checked' : ''} class="w-6 h-6 accent-orange-500">
                            <span class="text-xl font-bold">${q[opt]}</span>
                        </label>
                    `).join('')}
                </div>
            `;
            
            document.getElementById('qCount').innerText = `${curIdx + 1} / ${questions.length}`;
            document.getElementById('prevBtn').classList.toggle('hidden', curIdx === 0);
            document.getElementById('nextBtn').classList.toggle('hidden', curIdx === questions.length - 1);
            document.getElementById('finishBtn').classList.toggle('hidden', curIdx !== questions.length - 1);
        }

        document.getElementById('nextBtn').onclick = () => { saveAns(); curIdx++; renderQ(); };
        document.getElementById('prevBtn').onclick = () => { saveAns(); curIdx--; renderQ(); };
        
        function saveAns() { 
            const sel = document.querySelector('input[name="math"]:checked'); 
            if(sel) userAns[curIdx] = sel.value; 
        }

        document.getElementById('finishBtn').onclick = async () => {
            saveAns();
            clearInterval(examTimerInterval);
            
            let score = 0;
            questions.forEach((q, i) => { if(userAns[i] === q.correct) score++; });

            try {
                await addDoc(collection(db, "results"), { email: auth.currentUser.email, lesson: lessonData.name, score, total: questions.length, date: new Date() });
            } catch(e) { console.log("نتيجة غير مسجلة مؤقتاً"); }

            const lessonId = new URLSearchParams(window.location.search).get('id');
            localStorage.setItem(`exam_data_${lessonId}`, JSON.stringify({ userAns: userAns, score: score }));

            generateReviewList(); 

            const msg = `
                <h2 class="text-4xl font-black mb-2">درجتك النهائية: ${score} من ${questions.length}</h2>
                <p class="text-green-400 font-bold mt-2 animate-pulse">✅ تم فتح فيديو الشرح والملزمة الآن بنجاح بالأعلى</p>
            `;
            unlockLessonFeatures(msg);

            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function startTimer() {
            examTimerInterval = setInterval(() => {
                const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('timerBox').innerText = `${m}:${s < 10 ? '0' + s : s}`;
                if (timeLeft-- <= 0) { 
                    clearInterval(examTimerInterval); 
                    alert("انتهى وقت الامتحان!");
                    document.getElementById('finishBtn').click(); 
                }
            }, 1000);
        }
    </script>
</body>
</html>
