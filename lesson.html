<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | الحصة الذكية</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; user-select: none; background-color: #f8fafc; }
        :root { --plyr-color-main: #f97316; }
        .video-container { border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); border: 8px solid white; background: #000; }
        .option-card { cursor: pointer; transition: all 0.2s; border: 2px solid #e2e8f0; background: white; }
        .option-card:hover { border-color: #f97316; background-color: #fff7ed; }
        #quizTimer { background: #fee2e2; color: #ef4444; padding: 8px 20px; border-radius: 999px; font-weight: 900; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .shake-error { animation: shake 0.4s ease-in-out; border-color: #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="timerBar" class="hidden sticky top-0 z-50 bg-gray-900 text-white py-2 px-4 flex justify-center items-center gap-3 border-b border-orange-500 shadow-lg">
        <span class="text-orange-500 animate-pulse">⏳</span>
        <span class="text-xs font-bold opacity-80">صلاحية الحصة لحسابك:</span>
        <span id="countdownDisplay" class="font-black text-orange-500 text-sm">-- : -- : --</span>
    </div>

    <div id="authArea" class="hidden fixed inset-0 bg-gray-900/95 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div id="authContent" class="bg-white p-8 rounded-[2.5rem] w-full max-w-md text-center shadow-2xl border-t-8 border-orange-500">
            <h2 class="text-2xl font-black mb-2 text-gray-800">تفعيل الوصول</h2>
            <p class="text-gray-400 mb-6 text-sm italic">اربط الحصة بحسابك الآن</p>
            <input id="accessCode" type="text" placeholder="أدخل الكود هنا" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl mb-4 text-center font-black text-xl uppercase outline-none focus:border-orange-500">
            <button id="verifyBtn" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-orange-600 transition-all">تفعيل الحصة</button>
            <div id="errorMsg" class="hidden mt-4 text-red-500 font-bold text-sm">⚠️ الكود غير صحيح!</div>
        </div>
    </div>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 p-4 border-b border-gray-100">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 id="lessonTitle" class="text-lg font-black text-gray-800 tracking-tight">جاري التحميل...</h1>
            <a href="dashboard.html" class="text-gray-400 font-bold text-xs hover:text-red-500 transition-colors">خروج</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <section id="startScreen" class="hidden text-center py-12 space-y-6 bg-white rounded-[3rem] shadow-xl border border-gray-50">
            <div class="text-7xl">⏱️</div>
            <h2 class="text-3xl font-black text-gray-800">اختبار مستوى سريع</h2>
            <p class="text-gray-500 px-6">يجب اجتياز الاختبار لفتح فيديو الشرح. <br> الوقت المحدد: <span id="limitText" class="text-orange-600 font-black">--</span> دقيقة.</p>
            <button id="startQuizBtn" class="bg-gray-900 text-white px-12 py-4 rounded-2xl font-black text-lg shadow-xl hover:scale-105 active:scale-95 transition-all">بدء الامتحان الآن</button>
        </section>

        <section id="quizArea" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
                <div id="quizTimer" class="flex items-center gap-2">⏳ <span id="timerMinutes">00</span>:<span id="timerSeconds">00</span></div>
                <span id="progressText" class="text-xs font-black text-orange-500">Question 1/0</span>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white text-center">
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden mb-8">
                    <div id="progressBar" class="bg-orange-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <img id="qImg" src="" class="w-full max-h-80 object-contain rounded-2xl mb-8 border border-gray-50">
                <div id="optionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <button id="nextBtn" class="w-full bg-orange-500 text-white py-5 mt-10 rounded-2xl font-black text-lg shadow-xl hover:bg-orange-600 transition-all">تأكيد الإجابة</button>
            </div>
        </section>

        <section id="resultsArea" class="hidden space-y-8">
            <div class="bg-gray-900 text-white p-10 rounded-[3rem] shadow-2xl text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-orange-500/10 rounded-full -mr-16 -mt-16"></div>
                <h2 class="text-lg font-bold opacity-60 mb-2">درجتك النهائية</h2>
                <div id="scoreText" class="text-7xl font-black text-orange-500">0/0</div>
            </div>

            <div class="flex bg-gray-100 rounded-2xl p-1">
                <button id="tabVideoBtn" class="flex-1 py-4 font-black rounded-xl text-orange-600 bg-white shadow-sm transition-all">فيديو الشرح 📺</button>
                <button id="tabReviewBtn" class="flex-1 py-4 font-black text-gray-400 transition-all">مراجعة الأخطاء 📝</button>
            </div>

            <div id="videoTab" class="video-container">
                <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
            </div>
            <div id="reviewTab" class="hidden space-y-4"></div>
        </section>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo", 
            authDomain: "math-e62c9.firebaseapp.com", 
            projectId: "math-e62c9", 
            appId: "1:271507842148:web:2907aad4caf67afd08ab71" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const lessonId = new URLSearchParams(window.location.search).get("id");

        let currentUser, lessonData, questions = [], current = 0, userAns = [], examTimer, timeLeft;

        onAuthStateChanged(auth, async (user) => {
            if (user) { currentUser = user; await checkAccess(); } 
            else { window.location.href = "index.html"; }
        });

        async function checkAccess() {
            const enrollSnap = await getDoc(doc(db, "enrollments", `${currentUser.uid}_${lessonId}`));
            if (enrollSnap.exists()) {
                const data = enrollSnap.data();
                if (new Date().getTime() - data.activatedAt > 7 * 24 * 60 * 60 * 1000) {
                    showLockScreen("انتهت صلاحية الحصة ⏰", "يجب استخدام كود تفعيل جديد.");
                } else {
                    document.getElementById("authArea").classList.add("hidden");
                    startLifeTimer(data.activatedAt);
                    initLesson();
                }
            } else { document.getElementById("authArea").classList.remove("hidden"); }
        }

        document.getElementById("verifyBtn").onclick = async () => {
            const code = document.getElementById("accessCode").value.trim().toUpperCase();
            if (!code) return;
            const btn = document.getElementById("verifyBtn");
            btn.innerText = "جاري التحقق..."; btn.disabled = true;
            try {
                const codeRef = doc(db, "codes", code);
                const snap = await getDoc(codeRef);
                if (snap.exists() && !snap.data().used) {
                    const now = new Date().getTime();
                    await updateDoc(codeRef, { used: true, usedBy: currentUser.email, uid: currentUser.uid });
                    await setDoc(doc(db, "enrollments", `${currentUser.uid}_${lessonId}`), {
                        uid: currentUser.uid, email: currentUser.email, lessonId: lessonId, activatedAt: now
                    });
                    location.reload();
                } else { throw new Error(); }
            } catch (e) {
                document.getElementById("authContent").classList.add("shake-error");
                document.getElementById("errorMsg").classList.remove("hidden");
                setTimeout(() => document.getElementById("authContent").classList.remove("shake-error"), 500);
            }
            btn.disabled = false; btn.innerText = "تفعيل الحصة";
        };

        async function initLesson() {
            const snap = await getDoc(doc(db, "lessons", lessonId));
            lessonData = snap.data();
            questions = lessonData.questions || [];
            document.getElementById("lessonTitle").innerText = lessonData.name;
            document.getElementById("limitText").innerText = lessonData.duration || 10;

            const storageKey = `done_${currentUser.uid}_${lessonId}`;
            if(localStorage.getItem(storageKey)) {
                showFinalUI(JSON.parse(localStorage.getItem(`ans_${currentUser.uid}_${lessonId}`)));
            } else {
                document.getElementById("startScreen").classList.remove("hidden");
            }
        }

        // --- نظام التايمر الخاص بالامتحان ---
        document.getElementById("startQuizBtn").onclick = () => {
            document.getElementById("startScreen").classList.add("hidden");
            document.getElementById("quizArea").classList.remove("hidden");
            startExamTimer(lessonData.duration || 10);
            renderQuestion();
        };

        function startExamTimer(minutes) {
            timeLeft = minutes * 60;
            examTimer = setInterval(() => {
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                document.getElementById("timerMinutes").innerText = m.toString().padStart(2, '0');
                document.getElementById("timerSeconds").innerText = s.toString().padStart(2, '0');
                if (timeLeft <= 0) { finishExam(); }
                timeLeft--;
            }, 1000);
        }

        function finishExam() {
            clearInterval(examTimer);
            while(userAns.length < questions.length) userAns.push("no_answer");
            localStorage.setItem(`done_${currentUser.uid}_${lessonId}`, "true");
            localStorage.setItem(`ans_${currentUser.uid}_${lessonId}`, JSON.stringify(userAns));
            showFinalUI(userAns);
        }

        function renderQuestion() {
            const q = questions[current];
            document.getElementById("progressText").innerText = `السؤال ${current + 1} / ${questions.length}`;
            document.getElementById("progressBar").style.width = `${((current + 1) / questions.length) * 100}%`;
            document.getElementById("qImg").src = q.image;
            document.getElementById("optionsGrid").innerHTML = ['a','b','c','d'].map(opt => `
                <label class="option-card flex items-center p-5 rounded-2xl shadow-sm border-2 border-transparent">
                    <input type="radio" name="choice" value="${opt}" class="w-5 h-5 ml-4 accent-orange-500">
                    <span class="font-bold text-gray-700 uppercase">${opt}: ${q[opt]}</span>
                </label>
            `).join('');
        }

        document.getElementById("nextBtn").onclick = () => {
            const sel = document.querySelector('input[name="choice"]:checked');
            if(!sel) return alert("اختار إجابة أولاً!");
            userAns.push(sel.value);
            current++;
            if(current < questions.length) renderQuestion();
            else finishExam();
        };

        function showFinalUI(answers) {
            document.getElementById("startScreen").classList.add("hidden");
            document.getElementById("quizArea").classList.add("hidden");
            document.getElementById("resultsArea").classList.remove("hidden");
            let score = 0;
            let revHtml = "";
            questions.forEach((q, i) => {
                const correct = answers[i] === q.correct;
                if(correct) score++;
                revHtml += `<div class="bg-white p-4 rounded-xl border-r-8 ${correct ? 'border-green-500':'border-red-500'} shadow-sm flex items-center gap-4">
                    <img src="${q.image}" class="w-16 h-10 rounded object-cover border">
                    <p class="font-bold text-xs text-gray-500">${correct ? '✅':'❌'} س${i+1}: الحل (${q.correct.toUpperCase()})</p>
                </div>`;
            });
            document.getElementById("scoreText").innerText = `${score} / ${questions.length}`;
            document.getElementById("reviewTab").innerHTML = revHtml;
            if(lessonData.video) {
                let vidId = lessonData.video.split('v=')[1]?.split('&')[0] || lessonData.video.split('/').pop();
                document.getElementById('player').setAttribute('data-plyr-embed-id', vidId);
                new Plyr('#player', { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] });
            }
        }

        function startLifeTimer(startTime) {
            const display = document.getElementById("countdownDisplay");
            document.getElementById("timerBar").classList.remove("hidden");
            const expiry = parseInt(startTime) + (7 * 24 * 60 * 60 * 1000);
            setInterval(() => {
                const diff = expiry - new Date().getTime();
                if (diff <= 0) location.reload();
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                display.innerText = `${d} يوم و ${h}:${m}`;
            }, 60000);
        }

        function showLockScreen(title, msg) {
            document.getElementById("authArea").classList.remove("hidden");
            document.getElementById("authContent").innerHTML = `<h2 class='text-red-500 font-black text-2xl'>${title}</h2><p class='mt-4'>${msg}</p>`;
        }

        // تبديل التابات
        document.getElementById("tabVideoBtn").onclick = () => {
            document.getElementById("videoTab").classList.remove("hidden");
            document.getElementById("reviewTab").classList.add("hidden");
            document.getElementById("tabVideoBtn").className = "flex-1 py-4 font-black rounded-xl text-orange-600 bg-white shadow-sm transition-all";
            document.getElementById("tabReviewBtn").className = "flex-1 py-4 font-black text-gray-400 transition-all";
        };
        document.getElementById("tabReviewBtn").onclick = () => {
            document.getElementById("reviewTab").classList.remove("hidden");
            document.getElementById("videoTab").classList.add("hidden");
            document.getElementById("tabReviewBtn").className = "flex-1 py-4 font-black rounded-xl text-orange-600 bg-white shadow-sm transition-all";
            document.getElementById("tabVideoBtn").className = "flex-1 py-4 font-black text-gray-400 transition-all";
        };
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
