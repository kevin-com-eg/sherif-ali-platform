<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Lesson</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">


<div class="max-w-4xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-6">

Lesson Quiz

</h1>


<div id="timer" class="text-red-500 font-bold mb-4"></div>


<div id="quiz"></div>


<button id="finishBtn"
class="bg-orange-500 text-white px-6 py-3 mt-6 rounded">

Finish Exam

</button>


<div id="resultBox" class="hidden mt-6"></div>


<div id="videoBox" class="hidden mt-10">

<h2 class="text-xl font-bold mb-4">

Lesson Video

</h2>

<iframe id="lessonVideo"
width="100%"
height="400"
allowfullscreen>

</iframe>

</div>


</div>


<script type="module">

import { db } from "./firebase.js"

import {
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"



const lessonId = new URLSearchParams(window.location.search).get("id")

const lessonRef = doc(db,"lessons",lessonId)

const lessonSnap = await getDoc(lessonRef)

const lesson = lessonSnap.data()


const quizDiv = document.getElementById("quiz")



let answers = []



lesson.questions.forEach((q,i)=>{

quizDiv.innerHTML += `

<div class="bg-white p-4 mb-4 rounded shadow">

<img src="${q.image}" class="mb-4 w-full">

<label><input type="radio" name="q${i}" value="A"> ${q.a}</label><br>

<label><input type="radio" name="q${i}" value="B"> ${q.b}</label><br>

<label><input type="radio" name="q${i}" value="C"> ${q.c}</label><br>

<label><input type="radio" name="q${i}" value="D"> ${q.d}</label>

</div>

`

})



/* TIMER */

let time = 600

const timer = document.getElementById("timer")

setInterval(()=>{

let minutes = Math.floor(time/60)
let seconds = time%60

timer.innerText = minutes + ":" + seconds

time--

},1000)



/* FINISH EXAM */

document.getElementById("finishBtn").onclick=()=>{

if(!confirm("Are you sure?")) return

let score = 0

lesson.questions.forEach((q,i)=>{

const selected = document.querySelector(`input[name="q${i}"]:checked`)

if(selected && selected.value === q.correct){

score++

}

answers.push(selected ? selected.value : null)

})


localStorage.setItem("lesson_"+lessonId,JSON.stringify({

score,
answers

}))


showResult(score)

}



function showResult(score){

document.getElementById("resultBox").classList.remove("hidden")

document.getElementById("resultBox").innerHTML =

`Score: ${score}/${lesson.questions.length}`


document.getElementById("videoBox").classList.remove("hidden")


/* hide youtube branding */

const videoId = lesson.video.split("v=")[1]

document.getElementById("lessonVideo").src =

`https://www.youtube.com/embed/${videoId}?modestbranding=1&rel=0`

}



/* IF USER ALREADY DID EXAM */

const saved = localStorage.getItem("lesson_"+lessonId)

if(saved){

const data = JSON.parse(saved)

showResult(data.score)

}

</script>


</body>
</html>
