<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | الحصة الذكية</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; user-select: none; background: #f1f5f9; min-height: 100vh; }
        :root { --plyr-color-main: #f97316; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .video-container { border-radius: 1.5rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 4px solid white; background: #0f172a; position: relative; }
        
        /* منع التفاعل المباشر مع طبقة يوتيوب لمنع نسخ الرابط */
        .plyr__video-embed iframe { pointer-events: none !important; }
        
        .btn-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); transition: all 0.2s; }
        .pdf-btn { background: #ef4444; border-bottom: 4px solid #b91c1c; }
    </style>
</head>
<body class="text-slate-800">

    <div id="authArea" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-lg z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md text-center shadow-2xl">
            <div class="text-5xl mb-4">🔑</div>
            <h2 class="text-2xl font-black mb-2">تفعيل الحصة</h2>
            <p class="text-slate-500 mb-6 text-sm">برجاء إدخال كود التفعيل الخاص بك</p>
            <input id="accessCode" type="text" placeholder="XXXX-XXXX" class="w-full p-4 bg-slate-100 border-2 border-slate-200 rounded-2xl mb-6 text-center font-black text-2xl uppercase outline-none focus:border-orange-500">
            <button id="verifyBtn" class="w-full btn-gradient text-white font-black py-4 rounded-2xl text-lg">تفعيل الآن</button>
            <p id="authError" class="hidden text-red-500 mt-4 font-bold text-sm">⚠️ الكود غير صحيح أو مستخدم!</p>
        </div>
    </div>

    <header class="glass-card sticky top-0 z-40 p-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 id="lessonTitle" class="text-lg font-black text-slate-800">جاري تحميل الدرس...</h1>
            <a href="dashboard.html" class="text-sm font-bold text-slate-400 hover:text-red-500 transition-colors">خروج</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <section id="quizScreen" class="hidden space-y-6">
            <div class="glass-card p-10 rounded-[3rem] text-center shadow-xl">
                <div class="text-6xl mb-4">📝</div>
                <h2 class="text-2xl font-black mb-10">امتحان سريع لفتح الحصة</h2>
                <div id="qBox" class="space-y-6">
                    <img id="qImg" src="" class="w-full max-h-80 object-contain rounded-2xl border-2 border-slate-100 bg-slate-50">
                    <div id="options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    <button id="nextBtn" class="w-full btn-gradient text-white py-5 rounded-2xl font-black text-xl shadow-lg mt-6">تأكيد الإجابة</button>
                </div>
            </div>
        </section>

        <section id="contentScreen" class="hidden space-y-8">
            <div class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl text-center relative overflow-hidden">
                <div id="scoreDisplay" class="text-5xl font-black text-orange-400 mb-4">0 / 0</div>
                <p class="text-slate-400 font-bold mb-6">درجتك في امتحان الدخول</p>
                
                <a id="pdfLink" href="#" target="_blank" class="hidden pdf-btn inline-flex items-center gap-3 text-white px-8 py-4 rounded-2xl font-black hover:scale-105 transition-transform">
                    <span>تحميل الملزمة PDF</span> 📥
                </a>
            </div>

            <div class="video-container">
                <video id="player" playsinline controls></video>
            </div>
        </section>

    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = { 
            apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo", 
            authDomain: "math-e62c9.firebaseapp.com", 
            projectId: "math-e62c9", 
            appId: "1:271507842148:web:2907aad4caf67afd08ab71" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const lessonId = new URLSearchParams(window.location.search).get("id");

        let currentUser, lessonData, currentQ = 0, answers = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) { 
                currentUser = user; 
                await checkEnrollment(); 
            } else { 
                window.location.href = "login.html"; 
            }
        });

        // التأكد إذا كان الطالب مفعل الحصة
        async function checkEnrollment() {
            const enrollRef = doc(db, "enrollments", `${currentUser.uid}_${lessonId}`);
            const snap = await getDoc(enrollRef);
            
            if (snap.exists()) {
                loadLessonData();
            } else {
                document.getElementById("authArea").classList.remove("hidden");
            }
        }

        // تفعيل الكود
        document.getElementById("verifyBtn").onclick = async () => {
            const code = document.getElementById("accessCode").value.trim().toUpperCase();
            const btn = document.getElementById("verifyBtn");
            if(!code) return;

            btn.innerText = "جاري التحقق..."; btn.disabled = true;

            const codeRef = doc(db, "codes", code);
            const codeSnap = await getDoc(codeRef);

            if (codeSnap.exists() && !codeSnap.data().used) {
                // تفعيل الحصة للطالب وتعطيل الكود
                await updateDoc(codeRef, { used: true, usedBy: currentUser.email });
                await setDoc(doc(db, "enrollments", `${currentUser.uid}_${lessonId}`), {
                    activatedAt: new Date(),
                    email: currentUser.email
                });
                location.reload();
            } else {
                document.getElementById("authError").classList.remove("hidden");
                btn.innerText = "تفعيل الآن"; btn.disabled = false;
            }
        };

        // تحميل بيانات الدرس من Firestore
        async function loadLessonData() {
            const lessonSnap = await getDoc(doc(db, "lessons", lessonId));
            lessonData = lessonSnap.data();
            document.getElementById("lessonTitle").innerText = lessonData.name;

            // إذا كان الطالب حل الامتحان من قبل
            if (localStorage.getItem(`done_${currentUser.uid}_${lessonId}`)) {
                showFinalContent();
            } else {
                document.getElementById("quizScreen").classList.remove("hidden");
                renderQuestion();
            }
        }

        function renderQuestion() {
            const q = lessonData.questions[currentQ];
            document.getElementById("qImg").src = q.image;
            document.getElementById("options").innerHTML = ['a','b','c','d'].map(opt => `
                <label class="p-4 border-2 rounded-2xl flex items-center gap-3 cursor-pointer bg-white hover:border-orange-500 transition-all">
                    <input type="radio" name="ans" value="${opt}" class="w-5 h-5 accent-orange-500">
                    <span class="font-bold text-slate-700 uppercase">${opt}: ${q[opt]}</span>
                </label>
            `).join('');
        }

        document.getElementById("nextBtn").onclick = () => {
            const selected = document.querySelector('input[name="ans"]:checked');
            if(!selected) return alert("اختار إجابة أولاً!");

            answers.push(selected.value);
            currentQ++;

            if(currentQ < lessonData.questions.length) {
                renderQuestion();
            } else {
                localStorage.setItem(`done_${currentUser.uid}_${lessonId}`, "true");
                localStorage.setItem(`ans_${currentUser.uid}_${lessonId}`, JSON.stringify(answers));
                showFinalContent();
            }
        };

        function showFinalContent() {
            document.getElementById("quizScreen").classList.add("hidden");
            document.getElementById("authArea").classList.add("hidden");
            document.getElementById("contentScreen").classList.remove("hidden");

            // عرض الدرجة
            const savedAns = JSON.parse(localStorage.getItem(`ans_${currentUser.uid}_${lessonId}`)) || [];
            let score = 0;
            lessonData.questions.forEach((q, i) => { if(savedAns[i] === q.correct) score++; });
            document.getElementById("scoreDisplay").innerText = `${score} / ${lessonData.questions.length}`;

            // رابط الـ PDF
            if (lessonData.pdf) {
                const pdfBtn = document.getElementById("pdfLink");
                pdfBtn.href = lessonData.pdf;
                pdfBtn.classList.remove("hidden");
            }

            // تشغيل فيديو يوتيوب المحمي
            if (lessonData.video) {
                const vidId = lessonData.video.split('v=')[1]?.split('&')[0] || lessonData.video.split('/').pop();
                const player = new Plyr('#player', {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                    settings: ['quality', 'speed'],
                    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
                    youtube: { noCookie: true, rel: 0, showinfo: 0, modestbranding: 1 }
                });
                player.source = { type: 'video', sources: [{ src: vidId, provider: 'youtube' }] };
            }
        }

        // حماية إضافية
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
