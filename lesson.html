<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | عرض الدرس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .tab-active { border-bottom: 4px solid #f97316; color: #f97316; }
        .option-card:hover { border-color: #f97316; background-color: #fff7ed; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <header class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 id="lessonTitle" class="text-xl font-black text-gray-800 tracking-tighter">جاري التحميل...</h1>
            <a href="index.html" class="text-gray-500 hover:text-orange-500 text-sm font-bold">الرجوع للرئيسية</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto mt-6 px-4">
        
        <section id="quizArea" class="space-y-6">
            <div class="glass p-6 rounded-3xl shadow-xl border border-white">
                <div class="flex justify-between items-center mb-6">
                    <span id="progressText" class="bg-orange-100 text-orange-600 px-4 py-1 rounded-full text-xs font-black tracking-widest">QUESTION 1/0</span>
                    <div class="w-2/3 bg-gray-200 h-2 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-orange-500 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <div class="relative group mb-8">
                    <img id="qImg" src="" alt="سؤال" class="w-full rounded-2xl shadow-md border-4 border-white transition-transform group-hover:scale-[1.01]">
                </div>

                <div id="optionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>

                <button id="nextBtn" class="w-full bg-orange-500 text-white py-5 mt-10 rounded-2xl font-black text-lg shadow-lg shadow-orange-200 hover:bg-orange-600 transition-all flex justify-center items-center gap-2">
                    السؤال التالي
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
                </button>
            </div>
        </section>

        <section id="resultsArea" class="hidden animate-fade-in space-y-6">
            <div class="bg-orange-600 text-white p-10 rounded-3xl shadow-2xl text-center relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-lg font-bold opacity-80 mb-2">درجتك النهائية</h2>
                    <div id="scoreText" class="text-7xl font-black mb-2">0/0</div>
                    <p id="feedbackText" class="font-bold text-orange-100">عمل رائع! استمر في التقدم</p>
                </div>
                <div class="absolute top-[-20px] right-[-20px] w-40 h-40 bg-orange-500 rounded-full opacity-50"></div>
            </div>

            <div class="flex bg-white rounded-2xl shadow-sm p-1 border border-gray-200">
                <button id="tabReviewBtn" class="flex-1 py-4 font-black rounded-xl tab-active transition-all">مراجعة الإجابات</button>
                <button id="tabVideoBtn" class="flex-1 py-4 font-black text-gray-400 rounded-xl transition-all">شرح الفيديو</button>
            </div>

            <div id="reviewTab" class="space-y-4"></div>

            <div id="videoTab" class="hidden">
                <div id="vidContainer" class="aspect-video w-full bg-black rounded-3xl shadow-2xl overflow-hidden border-8 border-white">
                    </div>
            </div>
        </section>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
        authDomain: "math-e62c9.firebaseapp.com",
        projectId: "math-e62c9",
        appId: "1:271507842148:web:2907aad4caf67afd08ab71"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lessonId = new URLSearchParams(window.location.search).get("id");
    let lessonData, questions = [], current = 0, userAnswers = [];

    async function loadLesson() {
        if(!lessonId) return;
        const snap = await getDoc(doc(db, "lessons", lessonId));
        if(snap.exists()) {
            lessonData = snap.data();
            questions = lessonData.questions || [];
            document.getElementById("lessonTitle").innerText = lessonData.name;
            if(questions.length > 0) renderQuestion();
        }
    }

    function renderQuestion() {
        const q = questions[current];
        // تحديث التقدم
        document.getElementById("progressText").innerText = `QUESTION ${current + 1} / ${questions.length}`;
        document.getElementById("progressBar").style.width = `${((current + 1) / questions.length) * 100}%`;
        
        // عرض الصورة
        document.getElementById("qImg").src = q.image;
        
        // عرض الاختيارات
        document.getElementById("optionsGrid").innerHTML = ['a','b','c','d'].map(opt => `
            <label class="option-card flex items-center p-5 border-2 border-gray-100 rounded-2xl cursor-pointer transition-all bg-white shadow-sm">
                <input type="radio" name="choice" value="${opt}" class="w-6 h-6 ml-4 accent-orange-500">
                <span class="font-bold text-gray-700 text-lg">${opt.toUpperCase()}: ${q[opt]}</span>
            </label>
        `).join('');
    }

    document.getElementById("nextBtn").onclick = () => {
        const selected = document.querySelector('input[name="choice"]:checked');
        if(!selected) return alert("اختار إجابة الأول يا بطل!");

        userAnswers.push(selected.value);
        current++;

        if(current < questions.length) {
            renderQuestion();
        } else {
            showResults();
        }
    };

    function showResults() {
        document.getElementById("quizArea").classList.add("hidden");
        document.getElementById("resultsArea").classList.remove("hidden");

        let score = 0;
        let revHtml = "";

        questions.forEach((q, i) => {
            const correct = userAnswers[i] === q.correct;
            if(correct) score++;
            revHtml += `
                <div class="bg-white p-5 rounded-2xl border-r-8 ${correct ? 'border-green-500':'border-red-500'} shadow-sm flex items-center gap-4">
                    <img src="${q.image}" class="w-24 h-16 rounded object-cover border">
                    <div>
                        <p class="font-black ${correct ? 'text-green-600':'text-red-600'}">${correct ? 'إجابة صحيحة ✓' : 'إجابة خاطئة ✗'}</p>
                        <p class="text-sm font-bold text-gray-500 uppercase">الصح: ${q.correct} | إجابتك: ${userAnswers[i]}</p>
                    </div>
                </div>`;
        });

        document.getElementById("scoreText").innerText = `${score} / ${questions.length}`;
        document.getElementById("reviewTab").innerHTML = revHtml;

        // تشغيل الفيديو بصيغة Embed لضمان العمل
        if(lessonData.video) {
            let vidId = lessonData.video.split('v=')[1]?.split('&')[0] || lessonData.video.split('/').pop();
            document.getElementById("vidContainer").innerHTML = `
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/${vidId}" frameborder="0" allowfullscreen></iframe>`;
        }
    }

    // تبديل التابات
    const btnRev = document.getElementById("tabReviewBtn");
    const btnVid = document.getElementById("tabVideoBtn");

    btnRev.onclick = () => {
        document.getElementById("reviewTab").classList.remove("hidden");
        document.getElementById("videoTab").classList.add("hidden");
        btnRev.className = "flex-1 py-4 font-black rounded-xl tab-active transition-all";
        btnVid.className = "flex-1 py-4 font-black text-gray-400 rounded-xl transition-all";
    };

    btnVid.onclick = () => {
        document.getElementById("videoTab").classList.remove("hidden");
        document.getElementById("reviewTab").classList.add("hidden");
        btnVid.className = "flex-1 py-4 font-black rounded-xl tab-active transition-all";
        btnRev.className = "flex-1 py-4 font-black text-gray-400 rounded-xl transition-all";
    };

    loadLesson();
</script>
</body>
</html>
