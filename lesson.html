<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Lesson Quiz</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-3xl mx-auto p-6">

<h1 class="text-2xl font-bold text-center mb-6">
Quiz
</h1>

<button id="startExam"
class="bg-green-600 text-white px-6 py-3 rounded">
Enter Exam
</button>

<div id="examBox"
class="hidden bg-white p-6 rounded shadow mt-6">

<img id="questionImage"
class="w-full mb-4">

<div id="answers"></div>

<button id="nextBtn"
class="bg-orange-500 text-white px-6 py-3 mt-4 rounded">
Next Question
</button>

</div>

<div id="result"
class="mt-6 text-xl font-bold"></div>

</div>


<script type="module">

import { db, auth } from "./firebase.js"

import {
doc,
getDoc,
collection,
addDoc,
query,
where,
getDocs
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"



/* LESSON ID FROM URL */

const lessonId =
new URLSearchParams(location.search).get("id")



/* LOAD LESSON FROM FIREBASE */

const lessonRef = doc(db,"lessons",lessonId)

const snap = await getDoc(lessonRef)

const lesson = snap.data()

let questions = lesson.questions



let currentQuestion = 0
let answers = []



/* CHECK IF STUDENT DID EXAM BEFORE */

const q = query(
collection(db,"results"),
where("student","==",auth.currentUser.email),
where("lesson","==",lessonId)
)

const resultSnap = await getDocs(q)

if(!resultSnap.empty){

const data = resultSnap.docs[0].data()

showResult(data)

}



/* START EXAM */

startExam.onclick = () => {

examBox.classList.remove("hidden")

loadQuestion()

}



/* LOAD QUESTION */

function loadQuestion(){

let q = questions[currentQuestion]

questionImage.src = q.image

answers.innerHTML = `

<label>
<input type="radio" name="answer" value="a"> ${q.a}
</label><br>

<label>
<input type="radio" name="answer" value="b"> ${q.b}
</label><br>

<label>
<input type="radio" name="answer" value="c"> ${q.c}
</label><br>

<label>
<input type="radio" name="answer" value="d"> ${q.d}
</label>

`

if(currentQuestion === questions.length-1){

nextBtn.innerText = "Finish Exam"

}

}



/* NEXT QUESTION */

nextBtn.onclick = () => {

let selected =
document.querySelector("input[name='answer']:checked")

if(!selected){

alert("Choose answer")
return

}

answers.push(selected.value)

currentQuestion++

if(currentQuestion < questions.length){

loadQuestion()

}
else{

finishExam()

}

}



/* FINISH EXAM */

async function finishExam(){

if(!confirm("Finish exam?"))
return

let score = 0
let review = ""

questions.forEach((q,i)=>{

let user = answers[i]

if(user === q.correct){

score++

review += `<p style="color:green">
Question ${i+1}: Correct
</p>`

}
else{

review += `<p style="color:red">
Question ${i+1}: Wrong
Correct: ${q.correct}
</p>`

}

})


await addDoc(collection(db,"results"),{

student: auth.currentUser.email,

lesson: lessonId,

score: score,

answers: answers,

date: Date.now()

})


examBox.innerHTML =
`<h2>Score ${score}/${questions.length}</h2>${review}`

}



/* SHOW RESULT IF DONE BEFORE */

function showResult(data){

examBox.innerHTML =
`<h2>Your Score ${data.score}</h2>`

}

</script>

</body>
</html>
