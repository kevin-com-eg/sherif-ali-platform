<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Lesson Quiz</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">


<div class="max-w-3xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-6 text-center">

Quiz

</h1>


<button id="startExam"
class="bg-green-600 text-white px-6 py-3 rounded">

Enter Exam

</button>


<div id="examBox"
class="hidden bg-white p-6 rounded shadow mt-6">


<img id="questionImage"
class="w-full mb-4">


<div id="answers"></div>


<button id="nextBtn"
class="bg-orange-500 text-white px-6 py-3 mt-4 rounded">

Next Question

</button>


</div>


</div>


<script type="module">

import { db } from "./firebase.js"

import {
doc,
getDoc
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const lessonId =
new URLSearchParams(location.search).get("id")


const lessonRef = doc(db,"lessons",lessonId)

const snap = await getDoc(lessonRef)

const lesson = snap.data()

let questions = lesson.questions



let current = 0

let answers = []



startExam.onclick = ()=>{

examBox.classList.remove("hidden")

loadQuestion()

}



function loadQuestion(){

let q = questions[current]

questionImage.src = q.image


answers.innerHTML = `

<label class="block border p-3 mb-2">
<input type="radio" name="answer" value="a"> ${q.a}
</label>

<label class="block border p-3 mb-2">
<input type="radio" name="answer" value="b"> ${q.b}
</label>

<label class="block border p-3 mb-2">
<input type="radio" name="answer" value="c"> ${q.c}
</label>

<label class="block border p-3 mb-2">
<input type="radio" name="answer" value="d"> ${q.d}
</label>

`

}



nextBtn.onclick = ()=>{

let selected =
document.querySelector("input[name='answer']:checked")

if(!selected){

alert("Choose answer")

return

}

answers.push(selected.value)

current++


if(current < questions.length){

loadQuestion()

}
else{

alert("Exam Finished")

}

}


</script>

</body>
</html>
