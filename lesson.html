<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathPro | منطقة الحصة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f0f4f7; --white: #fff; --teal: #0d7a5f; --teal2: #0a6650;
            --border: #e2e8ed; --text: #1a2332; --text2: #5a6a7a;
            --sans: 'Tajawal', sans-serif; --mono: 'DM Mono', monospace;
        }
        body { font-family: var(--sans); background: var(--bg); color: var(--text); margin: 0; }
        
        /* Loading Screen */
        #loadingScreen { position: fixed; inset: 0; z-index: 9999; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        
        /* Timer Bar */
        #timerBar { background: #1a2332; color: #fff; text-align: center; padding: 10px; position: sticky; top: 0; z-index: 1000; font-family: var(--mono); font-weight: bold; display: none; }

        /* Navbar & Tabs */
        nav { background: #fff; border-bottom: 1px solid var(--border); padding: 10px; }
        .nav-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: center; }
        .tabs { display: flex; gap: 10px; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; border: none; background: #eee; cursor: pointer; font-weight: bold; opacity: 0.5; pointer-events: none; transition: 0.3s; }
        .tab-btn.unlocked { opacity: 1; pointer-events: auto; background: #ddd; }
        .tab-btn.active { background: var(--teal) !important; color: #fff; }

        /* Video Player & Watermark */
        .pro-player-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; }
        .vp-iframe-wrap iframe { width: 100%; height: 100%; border: none; }
        .pro-watermark { position: absolute; inset: 0; z-index: 10; pointer-events: none; overflow: hidden; }
        .pro-watermark span { position: absolute; font-family: var(--mono); font-size: 1.2rem; color: rgba(255,255,255,0.2); font-weight: 900; animation: wmMove 15s linear infinite alternate; }
        @keyframes wmMove { 0% { top: 5%; left: 5%; } 100% { top: 85%; left: 75%; } }

        /* General UI */
        main { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hidden { display: none !important; }
        .btn-main { background: var(--teal); color: #fff; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .opt-label { display: block; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loadingScreen">
        <div style="font-size: 2rem; font-weight: 900; color: var(--teal);">MathPro</div>
        <p id="ldText">جاري التحميل...</p>
    </div>

    <div id="timerBar">⏱️ المتبقي للحصة: <span id="timerDisplay">--:--:--</span></div>

    <div id="codeLockScreen" class="hidden">
        <div style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
            <div class="card" style="width: 350px; text-align: center;">
                <h2>🎫 تفعيل الحصة</h2>
                <input id="accessCodeInput" type="text" placeholder="أدخل كود التفعيل" style="width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; text-align: center;">
                <button onclick="verifyCode()" class="btn-main">بدء الدراسة الآن</button>
            </div>
        </div>
    </div>

    <div id="lessonContent" class="hidden">
        <nav>
            <div class="nav-inner">
                <div class="tabs">
                    <button id="btn-quiz-tab" class="tab-btn unlocked active" onclick="switchTab('quiz')">📝 الامتحان</button>
                    <button id="btn-video-tab" class="tab-btn" onclick="switchTab('video')">📺 الشرح</button>
                    <button id="btn-pdf-tab" class="tab-btn" onclick="switchTab('pdf')">📚 الملزمة</button>
                </div>
            </div>
        </nav>

        <main>
            <div id="tab-quiz">
                <div id="quizContainer">
                    <div id="startQuizView" class="card" style="text-align: center;">
                        <h3>جاهز للامتحان القبلي؟</h3>
                        <p>يجب حل الامتحان لفتح فيديو الشرح.</p>
                        <button onclick="startQuiz()" class="btn-main" style="width: auto;">ابدأ الآن</button>
                    </div>
                    <div id="quizApp" class="hidden">
                        <div id="qDisplay"></div>
                        <button onclick="nextQuestion()" class="btn-main" id="nextBtn">السؤال التالي</button>
                    </div>
                </div>
            </div>

            <div id="tab-video" class="hidden">
                <div class="pro-player-wrap">
                    <div class="pro-watermark"><span>STUDENT ID: <span id="sid_label">0000</span></span></div>
                    <div class="vp-iframe-wrap">
                        <iframe id="dmFrame" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
                    </div>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <h3>📺 فيديو الشرح</h3>
                    <p>شاهد الفيديو بتركيز، يمكنك العودة لمراجعة أخطاء الامتحان في تبويب الامتحان.</p>
                </div>
            </div>

            <div id="tab-pdf" class="hidden">
                <div class="card" style="text-align: center;">
                    <h3>📚 تحميل ملزمة الحصة</h3>
                    <a id="pdfLink" href="#" target="_blank" class="btn-main" style="display: inline-block; text-decoration: none; width: auto; margin-top: 15px;">تحميل PDF</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://kspfjzewkpfoeyocbzbm.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_4RiANbDn7lrulIbcXHS_3A_ANMSwaYp";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser, lessonData, questions = [], curIdx = 0, userAns = {};

        async function init() {
            const lessonId = new URLSearchParams(window.location.search).get('id');
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (!session) { window.location.href = "login.html"; return; }
            currentUser = session.user;

            const { data: ls } = await supabaseClient.from('lessons').select('*').eq('id', lessonId).single();
            if (ls) {
                lessonData = ls;
                questions = ls.questions || [];
                document.getElementById('sid_label').innerText = currentUser.id.substring(0, 6).toUpperCase();

                const { data: access } = await supabaseClient.from('codes')
                    .select('*').eq('usedby', currentUser.email).eq('lessonid', lessonId).single();

                if (access) {
                    showMainUI(access.updated_at);
                    const { data: res } = await supabaseClient.from('results')
                        .select('*').eq('email', currentUser.email).eq('lesson', ls.name).single();
                    if (res) { showReview(res.userans, res.score); unlockTabs(); }
                } else {
                    document.getElementById('codeLockScreen').classList.remove('hidden');
                }
            }
            hideLoading();
        }

        function showMainUI(startTime) {
            document.getElementById('lessonContent').classList.remove('hidden');
            document.getElementById('timerBar').style.display = 'block';
            startTimer(startTime);
        }

        async function verifyCode() {
            const code = document.getElementById('accessCodeInput').value.trim();
            const { data: check } = await supabaseClient.from('codes').select('*').eq('code', code).eq('used', false).single();
            if (check) {
                await supabaseClient.from('codes').update({ used: true, usedby: currentUser.email, lessonid: lessonData.id }).eq('code', code);
                location.reload();
            } else { alert("الكود خاطئ!"); }
        }

        function startTimer(startTime) {
            const endTime = new Date(startTime).getTime() + (3 * 60 * 60 * 1000); // 3 ساعات
            setInterval(() => {
                const now = new Date().getTime();
                const diff = endTime - now;
                if (diff < 0) { document.body.innerHTML = "<h1>انتهت صلاحية الحصة</h1>"; return; }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function startQuiz() {
            document.getElementById('startQuizView').classList.add('hidden');
            document.getElementById('quizApp').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[curIdx];
            document.getElementById('qDisplay').innerHTML = `
                <div class="card">
                    <h4>سؤال ${curIdx + 1} من ${questions.length}</h4>
                    <p style="font-size: 1.2rem; margin: 15px 0;">${q.text}</p>
                    ${['a', 'b', 'c', 'd'].map(opt => q[opt] ? `
                        <label class="opt-label">
                            <input type="radio" name="quiz" value="${opt}"> ${q[opt]}
                        </label>
                    ` : '').join('')}
                </div>`;
        }

        async function nextQuestion() {
            const selected = document.querySelector('input[name="quiz"]:checked');
            if (!selected) return alert("اختر إجابة!");
            userAns[curIdx] = selected.value;

            if (curIdx < questions.length - 1) {
                curIdx++; renderQuestion();
            } else {
                finishQuiz();
            }
        }

        async function finishQuiz() {
            let score = 0;
            questions.forEach((q, i) => { if (userAns[i] === q.correct) score++; });
            await supabaseClient.from('results').insert([{ email: currentUser.email, lesson: lessonData.name, score, total: questions.length, userans: userAns }]);
            showReview(userAns, score);
            unlockTabs();
            switchTab('video');
        }

        function showReview(ans, score) {
            let html = `<div class="card"><h3>نتيجتك: ${score} من ${questions.length}</h3></div>`;
            questions.forEach((q, i) => {
                const correct = ans[i] === q.correct;
                html += `<div class="card" style="border-right: 5px solid ${correct ? 'green' : 'red'}">
                    <p><b>${i+1}. ${q.text}</b></p>
                    <p style="color: ${correct ? 'green' : 'red'}">إجابتك: ${q[ans[i]] || 'لم تجب'}</p>
                    ${!correct ? `<p style="color: green">الصح: ${q[q.correct]}</p>` : ''}
                </div>`;
            });
            document.getElementById('tab-quiz').innerHTML = html;
        }

        function unlockTabs() {
            document.getElementById('btn-video-tab').classList.add('unlocked');
            document.getElementById('btn-pdf-tab').classList.add('unlocked');
            if(lessonData.pdf) document.getElementById('pdfLink').href = lessonData.pdf;
        }

        function switchTab(t) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.getElementById('btn-' + t + '-tab').classList.add('active');
            if (t === 'video') runVideo();
        }

        function runVideo() {
            const vId = lessonData.video.match(/(?:video\/|dai\.ly\/)([a-zA-Z0-9]+)/)?.[1] || lessonData.video;
            document.getElementById('dmFrame').src = `https://www.dailymotion.com/embed/video/${vId}?autoplay=1`;
        }

        function hideLoading() { document.getElementById('loadingScreen').style.display = 'none'; }

        init();
    </script>
</body>
</html>
