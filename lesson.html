<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | Protected Lesson</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; user-select: none; }
        :root { --plyr-color-main: #f97316; }
        .video-container { position: relative; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 8px solid white; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 80%; z-index: 10; background: transparent; }
        .option-card:hover { border-color: #f97316; background-color: #fff7ed; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="bg-white shadow-sm p-4 mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 id="lessonTitle" class="text-xl font-black text-gray-800 tracking-tighter">جاري التحميل...</h1>
            <span id="statusLabel" class="text-xs font-bold text-gray-400 uppercase tracking-widest">المحتوى محمي</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-20">
        
        <section id="quizArea" class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-white">
                <div class="flex justify-between items-center mb-6">
                    <span id="progressText" class="text-orange-600 px-4 py-1 rounded-full text-xs font-black">QUESTION 1/0</span>
                    <div class="w-2/3 bg-gray-200 h-2 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-orange-500 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <img id="qImg" src="" class="w-full rounded-2xl mb-8 shadow-sm border-4 border-gray-50">
                <div id="optionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <button id="nextBtn" class="w-full bg-orange-500 text-white py-5 mt-10 rounded-2xl font-black text-lg shadow-lg hover:bg-orange-600 transition-all">السؤال التالي</button>
            </div>
        </section>

        <section id="resultsArea" class="hidden space-y-6 animate-fade-in">
            <div class="bg-orange-600 text-white p-8 rounded-3xl shadow-2xl text-center">
                <h2 class="text-lg font-bold opacity-80 mb-2 font-bold">نتيجتك النهائية</h2>
                <div id="scoreText" class="text-6xl font-black mb-2">0/0</div>
                <p id="feedback" class="font-bold text-orange-100">تم حفظ نتيجتك بنجاح</p>
            </div>

            <div class="flex bg-white rounded-2xl shadow-sm p-1 border">
                <button id="tabVideoBtn" class="flex-1 py-4 font-black text-orange-600 border-b-4 border-orange-500 rounded-xl">مشاهدة الشرح</button>
                <button id="tabReviewBtn" class="flex-1 py-4 font-black text-gray-400 rounded-xl">مراجعة الأسئلة</button>
            </div>

            <div id="videoTab" class="video-container bg-black">
                <div class="video-overlay"></div>
                <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
            </div>

            <div id="reviewTab" class="hidden space-y-4"></div>
        </section>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // منع الـ DevTools
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };

    const firebaseConfig = { apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo", authDomain: "math-e62c9.firebaseapp.com", projectId: "math-e62c9", appId: "1:271507842148:web:2907aad4caf67afd08ab71" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const lessonId = new URLSearchParams(window.location.search).get("id");

    let lessonData, questions = [], current = 0, userAns = [];

    async function init() {
        if(!lessonId) return;
        const snap = await getDoc(doc(db, "lessons", lessonId));
        if(!snap.exists()) return;
        
        lessonData = snap.data();
        questions = lessonData.questions || [];
        document.getElementById("lessonTitle").innerText = lessonData.name;

        // فحص: هل الطالب حل الامتحان ده قبل كده؟
        if(localStorage.getItem("done_" + lessonId)) {
            showFinalUI(JSON.parse(localStorage.getItem("ans_" + lessonId)));
        } else {
            renderQuestion();
        }
    }

    function renderQuestion() {
        const q = questions[current];
        document.getElementById("progressText").innerText = `QUESTION ${current + 1} / ${questions.length}`;
        document.getElementById("progressBar").style.width = `${((current + 1) / questions.length) * 100}%`;
        document.getElementById("qImg").src = q.image;
        
        document.getElementById("optionsGrid").innerHTML = ['a','b','c','d'].map(opt => `
            <label class="option-card flex items-center p-5 border-2 border-gray-100 rounded-2xl cursor-pointer transition-all bg-white shadow-sm">
                <input type="radio" name="choice" value="${opt}" class="w-6 h-6 ml-4 accent-orange-500">
                <span class="font-bold text-gray-700 text-lg uppercase">${opt}: ${q[opt]}</span>
            </label>
        `).join('');
    }

    document.getElementById("nextBtn").onclick = () => {
        const sel = document.querySelector('input[name="choice"]:checked');
        if(!sel) return alert("اختار إجابة يا بطل!");
        userAns.push(sel.value);
        current++;
        if(current < questions.length) renderQuestion();
        else {
            // حفظ الحالة لمنع إعادة الامتحان
            localStorage.setItem("done_" + lessonId, "true");
            localStorage.setItem("ans_" + lessonId, JSON.stringify(userAns));
            showFinalUI(userAns);
        }
    };

    function showFinalUI(answers) {
        document.getElementById("quizArea").classList.add("hidden");
        document.getElementById("resultsArea").classList.remove("hidden");
        
        let score = 0;
        let revHtml = "";
        questions.forEach((q, i) => {
            if(answers[i] === q.correct) score++;
            revHtml += `<div class="bg-white p-4 rounded-xl border-r-4 ${answers[i] === q.correct ? 'border-green-500':'border-red-500'} shadow-sm">
                <p class="font-bold">سؤال ${i+1}: الإجابة الصحيحة ${q.correct.toUpperCase()}</p>
            </div>`;
        });

        document.getElementById("scoreText").innerText = `${score} / ${questions.length}`;
        document.getElementById("reviewTab").innerHTML = revHtml;

        // تشغيل المشغل المحمي (Plyr)
        if(lessonData.video) {
            let vidId = lessonData.video.split('v=')[1]?.split('&')[0] || lessonData.video.split('/').pop();
            document.getElementById('player').setAttribute('data-plyr-embed-id', vidId);
            new Plyr('#player', { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'], youtube: { noCookie: true, rel: 0, modestbranding: 1 } });
        }
    }

    // تبديل التابات
    document.getElementById("tabVideoBtn").onclick = () => {
        document.getElementById("videoTab").classList.remove("hidden");
        document.getElementById("reviewTab").classList.add("hidden");
        document.getElementById("tabVideoBtn").className = "flex-1 py-4 font-black text-orange-600 border-b-4 border-orange-500 rounded-xl";
        document.getElementById("tabReviewBtn").className = "flex-1 py-4 font-black text-gray-400 rounded-xl";
    };
    document.getElementById("tabReviewBtn").onclick = () => {
        document.getElementById("reviewTab").classList.remove("hidden");
        document.getElementById("videoTab").classList.add("hidden");
        document.getElementById("tabReviewBtn").className = "flex-1 py-4 font-black text-orange-600 border-b-4 border-orange-500 rounded-xl";
        document.getElementById("tabVideoBtn").className = "flex-1 py-4 font-black text-gray-400 rounded-xl";
    };

    init();
</script>
</body>
</html>
