<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | الحصة الذكية</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            user-select: none; 
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
        }
        :root { --plyr-color-main: #f97316; }
        
        /* تحسينات التصميم */
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .video-container { border-radius: 1.5rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 4px solid white; background: #0f172a; position: relative; }
        .option-card { cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid #e2e8f0; background: white; }
        .option-card:hover { border-color: #f97316; transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.1); }
        .option-card input:checked + span { color: #ea580c; }
        .btn-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); transition: all 0.2s; }
        .btn-gradient:hover { transform: scale(1.02); box-shadow: 0 15px 25px -5px rgba(234, 88, 12, 0.4); }
        .btn-gradient:active { transform: scale(0.98); }
        
        #quizTimer { background: #fee2e2; color: #dc2626; padding: 8px 24px; border-radius: 999px; font-weight: 900; border: 2px solid #fecaca; }
        
        .shake-error { animation: shake 0.4s ease-in-out; border-color: #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* ----- الخدعة الأمنية لمنع التفاعل مع يوتيوب ----- */
        .plyr__video-embed iframe {
            pointer-events: none !important; /* يمنع الكليك يمين أو الضغط على اسم الفيديو */
        }
        .plyr--youtube.plyr--paused.plyr__poster-enabled:hover .plyr__poster {
            opacity: 1;
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="timerBar" class="hidden sticky top-0 z-50 bg-slate-900 text-white py-2.5 px-4 flex justify-center items-center gap-3 border-b border-orange-500 shadow-lg">
        <span class="text-orange-400 animate-pulse text-lg">⏳</span>
        <span class="text-xs font-bold opacity-90 tracking-wide">صلاحية الحصة:</span>
        <span id="countdownDisplay" class="font-black text-orange-400 text-sm tracking-widest drop-shadow-md">-- : -- : -- : --</span>
    </div>

    <div id="authArea" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div id="authContent" class="bg-white p-10 rounded-[2.5rem] w-full max-w-md text-center shadow-2xl border-t-8 border-orange-500 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-orange-100 rounded-full blur-3xl -z-10 -mr-10 -mt-10"></div>
            <h2 class="text-3xl font-black mb-2 text-slate-800">تفعيل الوصول 🔐</h2>
            <p class="text-slate-500 mb-8 text-sm font-bold">اربط الحصة بحسابك لتستمتع بها لمدة 7 أيام</p>
            <input id="accessCode" type="text" placeholder="أدخل الكود هنا" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl mb-6 text-center font-black text-2xl uppercase outline-none focus:border-orange-500 transition-colors shadow-inner">
            <button id="verifyBtn" class="w-full btn-gradient text-white font-black py-4 rounded-2xl shadow-lg text-lg">تفعيل الحصة الآن</button>
            <div id="errorMsg" class="hidden mt-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm font-bold">⚠️ الكود غير صحيح أو مستخدم مسبقاً!</div>
        </div>
    </div>

    <header class="glass-card sticky top-0 z-40 p-4 border-b border-white/50 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 id="lessonTitle" class="text-xl font-black text-slate-800 tracking-tight flex items-center gap-2">
                <span class="w-2 h-8 bg-orange-500 rounded-full inline-block"></span>
                جاري التحميل...
            </h1>
            <a href="dashboard.html" class="bg-slate-100 hover:bg-red-100 text-slate-500 hover:text-red-600 font-bold text-xs px-4 py-2 rounded-xl transition-all">خروج</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <section id="startScreen" class="hidden text-center py-16 px-6 bg-white rounded-[3rem] shadow-xl border border-white relative overflow-hidden">
            <div class="absolute -top-20 -left-20 w-64 h-64 bg-orange-50 rounded-full blur-3xl opacity-60"></div>
            <div class="text-8xl mb-6 drop-shadow-xl animate-bounce">📝</div>
            <h2 class="text-4xl font-black text-slate-800 mb-4">اختبار مستوى سريع</h2>
            <p class="text-slate-500 text-lg mb-10 font-bold">يجب اجتياز الاختبار لفتح فيديو الشرح. <br> الوقت المحدد: <span id="limitText" class="text-orange-600 font-black text-xl bg-orange-50 px-3 py-1 rounded-lg">--</span> دقيقة.</p>
            <button id="startQuizBtn" class="bg-slate-900 text-white px-14 py-5 rounded-2xl font-black text-xl shadow-2xl hover:bg-black transition-all hover:scale-105 active:scale-95 border-b-4 border-slate-700 hover:border-black">🚀 بدء الامتحان الآن</button>
        </section>

        <section id="quizArea" class="hidden space-y-6">
            <div class="flex justify-between items-center glass-card p-4 rounded-2xl shadow-sm border border-white">
                <div id="quizTimer" class="flex items-center gap-2 tracking-widest drop-shadow-sm">⏳ <span id="timerMinutes">00</span>:<span id="timerSeconds">00</span></div>
                <span id="progressText" class="text-sm font-black text-orange-500 bg-orange-50 px-4 py-2 rounded-xl">السؤال 1 / 0</span>
            </div>
            
            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl text-center">
                <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden mb-8 shadow-inner">
                    <div id="progressBar" class="btn-gradient h-full transition-all duration-500 rounded-full" style="width: 0%"></div>
                </div>
                <img id="qImg" src="" class="w-full max-h-96 object-contain rounded-2xl mb-8 border-4 border-white shadow-sm bg-slate-50">
                <div id="optionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
                <button id="nextBtn" class="w-full btn-gradient text-white py-5 mt-10 rounded-2xl font-black text-xl shadow-lg">تأكيد الإجابة والانتقال ←</button>
            </div>
        </section>

        <section id="resultsArea" class="hidden space-y-8">
            <div class="bg-slate-900 text-white p-12 rounded-[3rem] shadow-2xl text-center relative overflow-hidden border-4 border-slate-800">
                <div class="absolute top-0 right-0 w-64 h-64 bg-orange-500/20 rounded-full blur-3xl -mr-20 -mt-20"></div>
                <div class="absolute bottom-0 left-0 w-64 h-64 bg-blue-500/20 rounded-full blur-3xl -ml-20 -mb-20"></div>
                <h2 class="text-xl font-bold text-slate-300 mb-4 z-10 relative">درجتك النهائية في الاختبار</h2>
                <div id="scoreText" class="text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-400 drop-shadow-lg z-10 relative">0/0</div>
            </div>

            <div class="flex bg-slate-200/50 rounded-2xl p-1.5 backdrop-blur-sm">
                <button id="tabVideoBtn" class="flex-1 py-4 font-black rounded-xl text-orange-600 bg-white shadow-md transition-all text-lg">فيديو الشرح 📺</button>
                <button id="tabReviewBtn" class="flex-1 py-4 font-black text-slate-500 hover:text-slate-800 transition-all text-lg">مراجعة الأخطاء 📝</button>
            </div>

            <div id="videoTab" class="video-container hidden">
                <video id="player" playsinline controls></video>
            </div>
            
            <div id="reviewTab" class="hidden space-y-4"></div>
        </section>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo", 
            authDomain: "math-e62c9.firebaseapp.com", 
            projectId: "math-e62c9", 
            appId: "1:271507842148:web:2907aad4caf67afd08ab71" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const lessonId = new URLSearchParams(window.location.search).get("id");

        let currentUser, lessonData, questions = [], current = 0, userAns = [], examTimer, timeLeft;

        onAuthStateChanged(auth, async (user) => {
            if (user) { currentUser = user; await checkAccess(); } 
            else { window.location.href = "index.html"; }
        });

        async function checkAccess() {
            const enrollSnap = await getDoc(doc(db, "enrollments", `${currentUser.uid}_${lessonId}`));
            if (enrollSnap.exists()) {
                const data = enrollSnap.data();
                if (new Date().getTime() - data.activatedAt > 7 * 24 * 60 * 60 * 1000) {
                    showLockScreen("انتهت صلاحية الحصة ⏰", "يجب استخدام كود تفعيل جديد لتجديد الباقة.");
                } else {
                    document.getElementById("authArea").classList.add("hidden");
                    startLifeTimer(data.activatedAt);
                    initLesson();
                }
            } else { document.getElementById("authArea").classList.remove("hidden"); }
        }

        document.getElementById("verifyBtn").onclick = async () => {
            const code = document.getElementById("accessCode").value.trim().toUpperCase();
            if (!code) return;
            const btn = document.getElementById("verifyBtn");
            btn.innerHTML = "جاري التحقق... ⏳"; btn.disabled = true;
            try {
                const codeRef = doc(db, "codes", code);
                const snap = await getDoc(codeRef);
                if (snap.exists() && !snap.data().used) {
                    const now = new Date().getTime();
                    await updateDoc(codeRef, { used: true, usedBy: currentUser.email, uid: currentUser.uid });
                    await setDoc(doc(db, "enrollments", `${currentUser.uid}_${lessonId}`), {
                        uid: currentUser.uid, email: currentUser.email, lessonId: lessonId, activatedAt: now
                    });
                    location.reload();
                } else { throw new Error(); }
            } catch (e) {
                document.getElementById("authContent").classList.add("shake-error");
                document.getElementById("errorMsg").classList.remove("hidden");
                setTimeout(() => document.getElementById("authContent").classList.remove("shake-error"), 500);
            }
            btn.disabled = false; btn.innerHTML = "تفعيل الحصة الآن";
        };

        async function initLesson() {
            const snap = await getDoc(doc(db, "lessons", lessonId));
            lessonData = snap.data();
            questions = lessonData.questions || [];
            document.getElementById("lessonTitle").innerHTML = `<span class="w-2 h-8 bg-orange-500 rounded-full inline-block"></span> ${lessonData.name}`;
            document.getElementById("limitText").innerText = lessonData.duration || 10;

            const storageKey = `done_${currentUser.uid}_${lessonId}`;
            if(localStorage.getItem(storageKey)) {
                showFinalUI(JSON.parse(localStorage.getItem(`ans_${currentUser.uid}_${lessonId}`)));
            } else {
                document.getElementById("startScreen").classList.remove("hidden");
            }
        }

        document.getElementById("startQuizBtn").onclick = () => {
            document.getElementById("startScreen").classList.add("hidden");
            document.getElementById("quizArea").classList.remove("hidden");
            startExamTimer(lessonData.duration || 10);
            renderQuestion();
        };

        function startExamTimer(minutes) {
            timeLeft = minutes * 60;
            examTimer = setInterval(() => {
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                document.getElementById("timerMinutes").innerText = m.toString().padStart(2, '0');
                document.getElementById("timerSeconds").innerText = s.toString().padStart(2, '0');
                if (timeLeft <= 0) { finishExam(); }
                timeLeft--;
            }, 1000);
        }

        function finishExam() {
            clearInterval(examTimer);
            while(userAns.length < questions.length) userAns.push("no_answer");
            localStorage.setItem(`done_${currentUser.uid}_${lessonId}`, "true");
            localStorage.setItem(`ans_${currentUser.uid}_${lessonId}`, JSON.stringify(userAns));
            showFinalUI(userAns);
        }

        function renderQuestion() {
            const q = questions[current];
            document.getElementById("progressText").innerText = `السؤال ${current + 1} من ${questions.length}`;
            document.getElementById("progressBar").style.width = `${((current + 1) / questions.length) * 100}%`;
            document.getElementById("qImg").src = q.image;
            document.getElementById("optionsGrid").innerHTML = ['a','b','c','d'].map(opt => `
                <label class="option-card flex items-center p-5 rounded-2xl text-lg">
                    <input type="radio" name="choice" value="${opt}" class="w-6 h-6 ml-4 accent-orange-600 cursor-pointer">
                    <span class="font-bold text-slate-700 uppercase transition-colors">${opt}: ${q[opt]}</span>
                </label>
            `).join('');
        }

        document.getElementById("nextBtn").onclick = () => {
            const sel = document.querySelector('input[name="choice"]:checked');
            if(!sel) return alert("يرجى اختيار إجابة أولاً!");
            userAns.push(sel.value);
            current++;
            if(current < questions.length) renderQuestion();
            else finishExam();
        };

        function showFinalUI(answers) {
            document.getElementById("startScreen").classList.add("hidden");
            document.getElementById("quizArea").classList.add("hidden");
            document.getElementById("resultsArea").classList.remove("hidden");
            
            let score = 0;
            let revHtml = "";
            questions.forEach((q, i) => {
                const correct = answers[i] === q.correct;
                if(correct) score++;
                revHtml += `<div class="bg-white p-5 rounded-2xl border-r-8 ${correct ? 'border-green-500':'border-red-500'} shadow-sm flex items-center gap-5">
                    <img src="${q.image}" class="w-24 h-16 rounded-lg object-contain bg-slate-50 border border-slate-100">
                    <div>
                        <p class="font-black text-lg ${correct ? 'text-green-600':'text-red-600'}">${correct ? 'إجابة صحيحة ✅':'إجابة خاطئة ❌'}</p>
                        <p class="font-bold text-sm text-slate-500 mt-1">السؤال ${i+1}: الحل الصحيح هو (${q.correct.toUpperCase()})</p>
                    </div>
                </div>`;
            });
            document.getElementById("scoreText").innerText = `${score} / ${questions.length}`;
            document.getElementById("reviewTab").innerHTML = revHtml;

            if(lessonData.video) {
                document.getElementById("videoTab").classList.remove("hidden");
                let vidId = lessonData.video.split('v=')[1]?.split('&')[0] || lessonData.video.split('/').pop();
                
                // إعدادات صارمة لمنع التفاعل مع يوتيوب وإخفاء أدواته
                const player = new Plyr('#player', { 
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'], // شيلنا الـ settings
                    youtube: { 
                        noCookie: true,      // منع التتبع
                        rel: 0,              // منع الفيديوهات المقترحة من قنوات تانية
                        showinfo: 0,         // إخفاء المعلومات واسم الفيديو
                        iv_load_policy: 3,   // إخفاء التعليقات التوضيحية
                        modestbranding: 1,   // إخفاء اللوجو قدر الإمكان
                        disablekb: 1,        // منع اختصارات الكيبورد
                        controls: 0          // إخفاء زراير يوتيوب الأصلية
                    }
                });
                
                player.source = {
                    type: 'video',
                    sources: [{ src: vidId, provider: 'youtube' }]
                };
            } else {
                document.getElementById("tabVideoBtn").classList.add("hidden");
                document.getElementById("reviewTab").classList.remove("hidden");
            }
        }

        function startLifeTimer(startTime) {
            const display = document.getElementById("countdownDisplay");
            document.getElementById("timerBar").classList.remove("hidden");
            const expiry = parseInt(startTime) + (7 * 24 * 60 * 60 * 1000);
            
            function updateTimer() {
                const diff = expiry - new Date().getTime();
                if (diff <= 0) return location.reload();
                
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                
                display.innerText = `${d} يوم و ${h}:${m}:${s}`;
            }
            
            updateTimer();
            setInterval(updateTimer, 1000);
        }

        function showLockScreen(title, msg) {
            document.getElementById("authArea").classList.remove("hidden");
            document.getElementById("authContent").innerHTML = `
                <div class="text-6xl mb-4">⏳</div>
                <h2 class='text-red-500 font-black text-3xl'>${title}</h2>
                <p class='mt-4 font-bold text-slate-500'>${msg}</p>`;
        }

        document.getElementById("tabVideoBtn").onclick = () => {
            document.getElementById("videoTab").classList.remove("hidden");
            document.getElementById("reviewTab").classList.add("hidden");
            document.getElementById("tabVideoBtn").className = "flex-1 py-4 font-black rounded-xl text-orange-600 bg-white shadow-md transition-all text-lg";
            document.getElementById("tabReviewBtn").className = "flex-1 py-4 font-black text-slate-500 hover:text-slate-800 transition-all text-lg";
        };
        document.getElementById("tabReviewBtn").onclick = () => {
            document.getElementById("reviewTab").classList.remove("hidden");
            document.getElementById("videoTab").classList.add("hidden");
            document.getElementById("tabReviewBtn").className = "flex-1 py-4 font-black rounded-xl text-orange-600 bg-white shadow-md transition-all text-lg";
            document.getElementById("tabVideoBtn").className = "flex-1 py-4 font-black text-slate-500 hover:text-slate-800 transition-all text-lg";
        };
        
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
