<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | منطقة التعلم الذكي 🧠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #05070a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .timer-box { background: linear-gradient(135deg, #f97316, #ea580c); box-shadow: 0 0 20px rgba(249, 115, 22, 0.4); }
        .tab-btn.active { border-bottom: 4px solid #f97316; color: #f97316; }
        .plyr--full-ui.plyr--video .plyr__control--overlaid { background: #f97316; }
        .plyr--video .plyr__controls { border-radius: 0 0 2rem 2rem; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="codeLockScreen" class="fixed inset-0 z-[100] bg-[#05070a] flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[3rem] w-full max-w-md text-center space-y-6">
            <h2 class="text-3xl font-black">أدخل كود الحصة</h2>
            <input id="accessCodeInput" type="text" placeholder="SA-000000" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-xl outline-none focus:border-orange-500">
            <button onclick="verifyCode()" id="verifyBtn" class="w-full bg-orange-600 font-black py-5 rounded-2xl text-xl transition-all active:scale-95">تفعيل الحصة ✨</button>
        </div>
    </div>

    <div id="lessonContent" class="hidden">
        <nav class="glass sticky top-0 z-50 p-4 mb-8">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 id="lessonTitle" class="text-xl font-black text-orange-500">جاري التحميل...</h1>
                
                <div class="timer-box px-6 py-2 rounded-full flex items-center gap-3 animate-pulse">
                    <span class="text-sm font-bold">الوقت المتبقي:</span>
                    <span id="examTimer" class="text-xl font-black font-mono">40:00</span>
                </div>

                <div class="flex gap-2">
                    <button onclick="switchTab('video')" id="btn-video" class="tab-btn active px-4 py-2 font-black transition-all">📺 الشرح</button>
                    <button onclick="switchTab('quiz')" id="btn-quiz" class="tab-btn px-4 py-2 font-black text-gray-500 transition-all">📝 الامتحان</button>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-6">
            <div id="tab-video" class="tab-pane space-y-6">
                <div class="rounded-[2rem] overflow-hidden shadow-2xl border border-white/5">
                    <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
                </div>
                <div class="flex justify-center mt-4">
                    <a id="pdfLink" href="#" target="_blank" class="bg-white/5 border border-white/10 px-8 py-3 rounded-full hover:bg-white/10 transition flex items-center gap-2">
                        <span>📚 تحميل ملزمة الحصة (PDF)</span>
                    </a>
                </div>
            </div>

            <div id="tab-quiz" class="tab-pane hidden pb-20">
                <div id="questionsList" class="grid grid-cols-1 gap-6">
                    </div>
                <button id="submitQuizBtn" class="w-full mt-10 bg-orange-600 text-white font-black py-6 rounded-[2.5rem] text-2xl shadow-2xl hover:bg-orange-700 transition-all">إرسال الإجابات الآن 🚀</button>
            </div>
        </main>
    </div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script type="module">
    // ... (Firebase Imports) ...
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = { /* تنظیمات شما */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let timerInterval;
    let timeLeft = 40 * 60; // ۴۰ دقیقه به ثانیه
    let player;

    // تفعيل المديا پلير
    function initPlayer(videoId) {
        player = new Plyr('#player');
        player.source = {
            type: 'video',
            sources: [{ src: videoId, provider: 'youtube' }],
        };
    }

    // تایمر معکوس
    function startTimer() {
        timerInterval = setInterval(() => {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('examTimer').innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                finishExam(); // ارسال خودکار در صورت اتمام وقت
            }
            timeLeft--;
        }, 1000);
    }

    // تحقق الكود والدخول
    window.verifyCode = async () => {
        const code = document.getElementById('accessCodeInput').value;
        const codeRef = doc(db, "codes", code);
        const snap = await getDoc(codeRef);

        if (snap.exists() && !snap.data().used) {
            await updateDoc(codeRef, { used: true, usedBy: auth.currentUser.email });
            document.getElementById('codeLockScreen').classList.add('hidden');
            document.getElementById('lessonContent').classList.remove('hidden');
            loadLesson();
            startTimer(); // شروع تایمر ۴۰ دقیقه‌ای
        } else {
            alert("الكود غير صالح!");
        }
    };

    async function loadLesson() {
        const lessonId = new URLSearchParams(window.location.search).get('id');
        const snap = await getDoc(doc(db, "lessons", lessonId));
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('lessonTitle').innerText = data.name;
            document.getElementById('pdfLink').href = data.pdf;
            initPlayer(data.video); // راه‌اندازی پلیر با لینک یوتیوب
            renderQuiz(data.questions);
        }
    }

    async function finishExam() {
        // ... (کد محاسبه امتیاز که قبلاً نوشتیم) ...
        alert("انتهى الوقت! تم إرسال إجاباتك تلقائياً.");
        // ارسال نتيجه به Firebase
    }

    // ... (بقية دوال التبديل بين التبوابات والأسئلة) ...
</script>
</body>
</html>
