<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | Video Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; }
        /* تخصيص لون المشغل ليكون متماشي مع براند الموقع */
        :root { --plyr-color-main: #f97316; } 
        .video-wrapper {
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border-radius: 24px;
            overflow: hidden;
            border: 8px solid white;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-5xl mx-auto">
        <h1 id="lessonTitle" class="text-2xl font-black text-center mb-6 text-gray-800">تحميل الفيديو...</h1>

        <div class="video-wrapper bg-black">
            <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
        </div>

        <div class="mt-8 flex justify-center">
            <a href="index.html" class="bg-white text-gray-700 px-8 py-3 rounded-xl font-bold shadow-sm hover:shadow-md transition">العودة للرئيسية</a>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
        authDomain: "math-e62c9.firebaseapp.com",
        projectId: "math-e62c9",
        appId: "1:271507842148:web:2907aad4caf67afd08ab71"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const lessonId = new URLSearchParams(window.location.search).get("id");

    async function initPlayer() {
        if(!lessonId) return;
        const snap = await getDoc(doc(db, "lessons", lessonId));
        
        if(snap.exists()) {
            const data = snap.data();
            document.getElementById("lessonTitle").innerText = data.name;

            // استخراج الـ ID من الرابط المخزن في Firebase
            let vidUrl = data.video;
            let vidId = vidUrl.split('v=')[1]?.split('&')[0] || vidUrl.split('/').pop();

            // إعداد المشغل
            const playerElement = document.getElementById('player');
            playerElement.setAttribute('data-plyr-embed-id', vidId);

            // تشغيل المشغل مع إعدادات إخفاء اليوتيوب
            const player = new Plyr('#player', {
                controls: [
                    'play-large', 'play', 'progress', 'current-time', 
                    'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'
                ],
                settings: ['quality', 'speed'],
                youtube: { 
                    noCookie: true, 
                    rel: 0, 
                    showinfo: 0, 
                    iv_load_policy: 3, 
                    modestbranding: 1 // هذا يقلل من ظهور لوجو يوتيوب
                }
            });
        }
    }

    initPlayer();
</script>
</body>
</html>
