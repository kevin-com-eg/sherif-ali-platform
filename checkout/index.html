<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MathPro | Checkout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="../assets/css/shared.css">
</head>
<body class="page-checkout">

<div id="loader">
  <div class="ld-logo">MP</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div class="ld-txt" id="ldTxt">جاري التحميل…</div>
</div>

<nav>
  <div class="nav-in">
    <button class="back-btn" onclick="history.back()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      رجوع
    </button>
    <span class="nav-title">🛒 إتمام الشراء</span>
  </div>
</nav>

<main>
  <div class="checkout-grid">
    <div><div class="course-card" id="courseCard"></div></div>
    <div>
      <div class="summary-card">
        <div class="summary-header">ملخص الطلب</div>
        <div class="summary-body">
          <div class="cart-item" id="cartItem"></div>
          <div class="coupon-section">
            <div class="coupon-label">كوبون خصم</div>
            <div class="coupon-row">
              <input id="couponInput" class="coupon-input" placeholder="أدخل كود الخصم" autocomplete="off" spellcheck="false">
              <button id="couponBtn" class="coupon-btn" onclick="applyCoupon()">تطبيق</button>
            </div>
            <div id="couponMsg" class="coupon-msg"></div>
          </div>
          <div class="price-breakdown" id="priceBreakdown"></div>
          <div class="pay-section">
            <button id="payBtn" class="pay-btn" onclick="startPayment()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
              تأكيد الدفع
            </button>
            <div class="pay-note">الدفع آمن ومشفر بالكامل</div>
            <div class="secure-badge">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              SSL Encrypted
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="processingOverlay" class="processing-overlay hidden">
  <div class="processing-card" id="processingCard"></div>
</div>

<script>
(function(){
  document.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('copy',e=>{e.clipboardData.setData('text/plain','⚠️');e.preventDefault();});
  window.addEventListener('keydown',e=>{if(e.keyCode===123||(e.ctrlKey&&e.shiftKey&&[73,74,67].includes(e.keyCode))||(e.ctrlKey&&e.keyCode===85)){e.preventDefault();return false;}});
})();

const SUPABASE_URL="https://kspfjzewkpfoeyocbzbm.supabase.co";
const SUPABASE_ANON="sb_publishable_4RiANbDn7lrulIbcXHS_3A_ANMSwaYp";
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

let currentUser=null, lessonData=null, lessonId=null;
let appliedCoupon=null, orderId=null, pollInterval=null;
const CURRENCY='ج.م';

function showLoader(t){document.getElementById('ldTxt').textContent=t;document.getElementById('loader').style.display='flex';}
function hideLoader(){const l=document.getElementById('loader');l.style.opacity='0';setTimeout(()=>l.style.display='none',300);}

async function init(){
  lessonId=new URLSearchParams(location.search).get('lesson_id');
  if(!lessonId){hideLoader();document.querySelector('main').innerHTML='<div style="text-align:center;padding:80px 20px;color:var(--muted)"><div style="font-size:3rem;margin-bottom:12px">⚠️</div><div style="font-size:1.1rem;font-weight:700">لم يتم تحديد كورس</div></div>';return;}
  const{data:{session}}=await db.auth.getSession();
  if(!session){hideLoader();window.location.href='/home';return;}
  currentUser=session.user;
  try{
    const{data:snap}=await db.from('lessons').select('*').eq('id',lessonId).single();
    if(!snap) throw new Error('الكورس غير موجود');
    lessonData=snap;
    renderCourseCard();renderCartItem();renderPrices();hideLoader();
  }catch(e){
    hideLoader();
    document.querySelector('main').innerHTML=`<div style="text-align:center;padding:80px 20px;color:var(--red)"><div style="font-size:3rem;margin-bottom:12px">❌</div><div style="font-size:1.1rem;font-weight:700">حدث خطأ</div><div style="font-size:.82rem;margin-top:6px">${e.message}</div></div>`;
  }
}

function renderCourseCard(){
  const p=lessonData.price||0;
  const hasDiscount=appliedCoupon&&appliedCoupon.discount>0;
  const finalPrice=hasDiscount?p-appliedCoupon.discount:p;
  const qCount=lessonData.questions?lessonData.questions.length:0;
  const vCount=lessonData.videos?lessonData.videos.length:0;

  document.getElementById('courseCard').innerHTML=`
    ${lessonData.image?`<img src="${lessonData.image}" class="course-img" alt="">`:`<div class="course-img" style="display:flex;align-items:center;justify-content:center;font-size:3rem;background:var(--bg2)">📚</div>`}
    <div class="course-body">
      <div class="course-name">${lessonData.name||'كورس'}</div>
      <div class="course-desc">${lessonData.description||'وصف الكورس غير متاح'}</div>
      <div class="course-features">
        ${qCount>0?`<div class="course-feat"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${qCount} سؤال امتحان</div>`:''}
        ${vCount>0?`<div class="course-feat"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${vCount} فيديو شرح</div>`:''}
        <div class="course-feat"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> وصول مدى الحياة</div>
        <div class="course-feat"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ملف PDF للمراجعة</div>
      </div>
      <div class="course-price-row" style="margin-top:18px">
        <span class="course-price">${finalPrice} ${CURRENCY}</span>
        ${hasDiscount?`<span class="course-price-old">${p} ${CURRENCY}</span>`:''}
        ${hasDiscount?`<span class="course-badge">-${appliedCoupon.discountPercent||0}%</span>`:''}
      </div>
    </div>`;
}

function renderCartItem(){
  document.getElementById('cartItem').innerHTML=`
    <div class="cart-item-icon">📚</div>
    <div class="cart-item-info">
      <div class="cart-item-name">${lessonData.name||'كورس'}</div>
      <div class="cart-item-type">دورة تعليمية × 1</div>
    </div>
    <div class="cart-item-price">${lessonData.price||0} ${CURRENCY}</div>`;
}

function renderPrices(){
  const p=lessonData.price||0;
  const disc=appliedCoupon?appliedCoupon.discount:0;
  const final=Math.max(0,p-disc);
  let html=`<div class="price-row"><span class="label">المجموع الفرعي</span><span class="val">${p} ${CURRENCY}</span></div>`;
  if(disc>0){
    html+=`<div class="price-row discount"><span class="label">الخصم ${appliedCoupon.discountPercent?`(${appliedCoupon.discountPercent}%)`:''}</span><span class="val">- ${disc} ${CURRENCY}</span></div>`;
  }
  html+=`<div class="price-row total"><span class="label">الإجمالي</span><span class="val">${final} ${CURRENCY}</span></div>`;
  document.getElementById('priceBreakdown').innerHTML=html;
}

/* ══════════ COUPON ══════════ */
async function applyCoupon(){
  const input=document.getElementById('couponInput');
  const btn=document.getElementById('couponBtn');
  const msg=document.getElementById('couponMsg');
  const code=input.value.trim().toUpperCase();

  if(!code){input.classList.add('error');msg.className='coupon-msg err';msg.textContent='أدخل كود الخصم';return;}

  if(appliedCoupon){
    appliedCoupon=null;
    input.classList.remove('success','error');input.disabled=false;
    msg.className='coupon-msg';msg.textContent='';
    btn.textContent='تطبيق';btn.classList.remove('remove-mode');
    renderCourseCard();renderPrices();return;
  }

  btn.disabled=true;btn.textContent='جاري التحقق…';
  input.classList.remove('error','success');
  msg.className='coupon-msg';msg.textContent='';

  try{
    const{data:coupon}=await db.from('coupons').select('*').eq('code',code).single();
    if(!coupon) throw new Error('كوبون غير صالح');
    if(!coupon.is_active) throw new Error('هذا الكوبون غير مفعل');
    if(coupon.expires_at&&new Date(coupon.expires_at)<new Date()) throw new Error('هذا الكوبون منتهي الصلاحية');
    if(coupon.max_uses!==null&&coupon.used_count>=coupon.max_uses) throw new Error('تم استنفاد عدد مرات استخدام هذا الكوبون');
    if(coupon.lesson_id&&coupon.lesson_id!==lessonId) throw new Error('هذا الكوبون لا ينطبق على هذا الكورس');

    const price=lessonData.price||0;
    let discount=0,discountPercent=0;
    if(coupon.discount_percent>0){discountPercent=coupon.discount_percent;discount=Math.round(price*discountPercent/100*100)/100;}
    if(coupon.discount_amount>0) discount+=coupon.discount_amount;
    discount=Math.min(discount,price);
    if(discount<=0) throw new Error('هذا الكوبون لا يوفر خصم على هذا الكورس');

    appliedCoupon={id:coupon.id,code,discount,discountPercent};
    input.classList.add('success');input.disabled=true;
    msg.className='coupon-msg ok';
    msg.textContent=`✓ تم تطبيق الكوبون — وفرت ${discount} ${CURRENCY}`;
    btn.textContent='إزالة';btn.classList.add('remove-mode');
    renderCourseCard();renderPrices();
  }catch(e){
    input.classList.add('error');
    msg.className='coupon-msg err';msg.textContent='✗ '+e.message;
    btn.textContent='تطبيق';
  }
  btn.disabled=false;
}

document.getElementById('couponInput').addEventListener('keydown',e=>{if(e.key==='Enter') applyCoupon();});

/* ══════════ PAYMENT ══════════ */
async function startPayment(){
  const price=lessonData.price||0;
  const disc=appliedCoupon?appliedCoupon.discount:0;
  const finalAmount=Math.max(0,price-disc);

  if(finalAmount<=0){await completePurchase(null);return;}

  const payBtn=document.getElementById('payBtn');
  payBtn.disabled=true;
  payBtn.innerHTML='<div style="width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite"></div> جاري إنشاء الطلب…';

  try{
    const orderData={
      email:currentUser.email,lesson_id:lessonId,amount:price,
      discount_amount:disc,coupon_code:appliedCoupon?appliedCoupon.code:null,
      final_amount:finalAmount,status:'pending',payment_method:'card'
    };
    const{data:order}=await db.from('orders').insert([orderData]).select().single();
    if(!order) throw new Error('فشل إنشاء الطلب');
    orderId=order.id;

    showProcessing(order.id,finalAmount);

    if(appliedCoupon){
      await db.from('coupons').update({used_count:db.raw('used_count + 1')}).eq('id',appliedCoupon.id);
    }

    await initPayment(order.id,finalAmount);
    startPolling(order.id);
  }catch(e){
    payBtn.disabled=false;
    payBtn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> تأكيد الدفع';
    alert('خطأ: '+e.message);
  }
}

async function initPayment(orderId,amount){
  /*
  ══════════════════════════════════════════
  📌 ضع كود بوابة الدفع هنا
  ══════════════════════════════════════════

  === مثال Paymob ===
  const res = await fetch('https://accept.paymob.com/api/v1/intention/',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      amount: amount*100, currency:'EGP',
      payment_methods:['card','wallet'],
      items:[{name:lessonData.name,amount:amount*100,quantity:1}],
      billing_data:{first_name:currentUser.user_metadata?.name||'',last_name:'',email:currentUser.email,phone:''},
      extras:{order_id:orderId}
    })
  });
  const data=await res.json();
  await db.from('orders').update({payment_ref:data.id}).eq('id',orderId);
  window.location.href=`https://accept.paymob.com/api/v1/intention/${data.id}/payment`;

  ══════════════════════════════════════════
  */

  // 🧪 وضع اختبار — احذف ده في الإنتاج
  console.log('🧪 TEST: Auto-pay in 5s');
  setTimeout(async()=>{
    try{
      await db.from('orders').update({status:'paid',paid_at:new Date().toISOString(),payment_ref:'test_'+Date.now()}).eq('id',orderId);
    }catch(e){console.error(e);}
  },5000);
}

function startPolling(oid){
  let attempts=0;
  pollInterval=setInterval(async()=>{
    attempts++;
    try{
      const{data:order}=await db.from('orders').select('status,paid_at').eq('id',oid).single();
      if(!order){if(attempts>=100){clearInterval(pollInterval);paymentFailed('انتهت مهلة التحقق');}return;}
      if(order.status==='paid'){clearInterval(pollInterval);await completePurchase(order);return;}
      if(order.status==='failed'){clearInterval(pollInterval);paymentFailed('فشلت عملية الدفع');return;}
      if(attempts>=100){clearInterval(pollInterval);paymentFailed('انتهت مهلة التحقق');}
    }catch(e){if(attempts>=100){clearInterval(pollInterval);paymentFailed('خطأ في التحقق');}}
  },3000);
}

async function completePurchase(order){
  try{
    const validityDays=lessonData.validitydays||90;
    const expiry=Date.now()+validityDays*24*60*60*1000;
    const accessCode='AUTO_'+Date.now()+'_'+Math.random().toString(36).substring(2,8);
    await db.from('codes').insert([{code:accessCode,used:true,usedby:currentUser.email,lessonid:lessonId,expiryat:expiry}]);
    const{data:u}=await db.from('users').select('studentid').eq('id',currentUser.id).single().catch(()=>({data:null}));
    const sid=u?.studentid||currentUser.id.substring(0,6).toUpperCase();
    localStorage.setItem(`access_${currentUser.id}_${lessonId}`,JSON.stringify({expiry,studentId:sid}));
  }catch(e){console.error(e);}
  showSuccess(order);
}

function showProcessing(oid,amount){
  document.getElementById('processingOverlay').classList.remove('hidden');
  document.getElementById('processingCard').innerHTML=`
    <div class="proc-spinner"></div>
    <div class="proc-title">جاري معالجة الدفع…</div>
    <div class="proc-sub">يرجى الانتظار ولا تغلق هذه الصفحة.<br>سيتم التحقق تلقائيًا من حالة الدفع.</div>
    <div class="proc-order">طلب # ${oid.substring(0,8)} — ${amount} ${CURRENCY}</div>`;
}

function showSuccess(order){
  const disc=appliedCoupon?appliedCoupon.discount:0;
  const final=order?order.final_amount:(lessonData.price||0)-disc;
  document.getElementById('processingCard').innerHTML=`
    <div class="success-icon">✓</div>
    <div class="proc-title" style="color:var(--green)">تم الدفع بنجاح!</div>
    <div class="success-amount">${final} ${CURRENCY}</div>
    <div class="success-label">المبلغ المدفوع</div>
    <div class="success-details">
      <div class="success-row"><span class="sl">رقم الطلب</span><span class="sv"># ${(order?.id||'').substring(0,8)}</span></div>
      <div class="success-row"><span class="sl">الكورس</span><span class="sv">${lessonData.name||'—'}</span></div>
      ${disc>0?`<div class="success-row"><span class="sl">الخصم</span><span class="sv" style="color:var(--green)">- ${disc} ${CURRENCY}</span></div>`:''}
      <div class="success-row"><span class="sl">الحالة</span><span class="sv" style="color:var(--green)">مدفوع ✓</span></div>
    </div>
    <button class="go-lesson-btn" onclick="window.location.href='/lesson?id=${lessonId}'">
      ابدأ الكورس الآن
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;
}

function paymentFailed(reason){
  document.getElementById('processingCard').innerHTML=`
    <div class="error-icon">✗</div>
    <div class="proc-title" style="color:var(--red)">فشلت عملية الدفع</div>
    <div class="proc-sub">${reason}<br>يمكنك المحاولة مرة أخرى.</div>
    <button class="retry-btn" onclick="retryPayment()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      إعادة المحاولة
    </button>
    <button style="display:block;margin:10px auto 0;background:none;border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-family:var(--sans);font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer" onclick="cancelPayment()">إلغاء</button>`;
}

function retryPayment(){
  document.getElementById('processingOverlay').classList.add('hidden');
  const payBtn=document.getElementById('payBtn');
  payBtn.disabled=false;
  payBtn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> تأكيد الدفع';
}

function cancelPayment(){
  if(pollInterval) clearInterval(pollInterval);
  document.getElementById('processingOverlay').classList.add('hidden');
  history.back();
}

init();
</script>
</body>
</html>
