<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MathPro · Checkout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════
   MATHPRO UNIFIED DESIGN SYSTEM
   ═══════════════════════════════ */
:root{
  --bg:#F5F0E8;--bg2:#EDE7DB;--surface:#FAF7F2;--surface2:#EDE7DB;
  --border:rgba(44,36,24,.1);--border2:rgba(44,36,24,.22);
  --text:#2C2418;--muted:#9B8E7A;--muted2:#6B5E4E;
  --accent:#2D5A3D;--accent2:#3A7550;--accent3:#4A9060;
  --accent-glow:rgba(45,90,61,.12);--accent-light:rgba(45,90,61,.08);
  --amber:#C4654A;--amber-bg:rgba(196,101,74,.08);--amber-border:rgba(196,101,74,.2);
  --red:#A33B2E;--red-bg:rgba(163,59,46,.08);--red-border:rgba(163,59,46,.2);
  --gold:#C4A882;--gold-bg:rgba(196,168,130,.1);
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Cormorant Garamond',serif;
  --radius:12px;--radius-sm:8px;--radius-lg:20px;
  --shadow:0 2px 16px rgba(44,36,24,.07);--shadow2:0 8px 32px rgba(44,36,24,.1);
  --nav-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px 256px}
.hidden{display:none!important}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── LOADING ── */
#loadingScreen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .35s}
.ld-mark{width:58px;height:58px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:1.4rem;color:#fff;animation:float 2.5s ease infinite}
.ld-bar{width:120px;height:2px;background:var(--bg2);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--accent2);border-radius:2px;animation:loadAnim 1.2s ease infinite}
.ld-txt{font-size:.78rem;color:var(--muted);font-family:var(--mono)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes loadAnim{0%{width:0;margin-left:0}50%{width:80%;margin-left:0}100%{width:0;margin-left:100%}}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:500;height:var(--nav-h);background:rgba(250,247,242,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);box-shadow:0 1px 12px rgba(44,36,24,.06)}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:.9rem;color:#fff}
.logo-name{font-family:var(--display);font-weight:600;font-size:1.2rem;color:var(--text)}.logo-name em{color:var(--accent2);font-style:normal}
.back-btn{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 16px;font-size:.82rem;font-weight:700;color:var(--muted2);cursor:pointer;transition:all .2s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-tag{font-family:var(--mono);font-size:.68rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:5px 12px;border-radius:20px}

/* ── MAIN ── */
main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:36px 24px 100px}

/* ── SECTION HEADER ── */
.page-header{margin-bottom:32px}
.page-kicker{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:4px}
.page-title{font-family:var(--display);font-size:clamp(1.7rem,3vw,2.3rem);font-weight:600}

/* ── GRID ── */
.checkout-grid{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);animation:cardIn .4s both}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ── COURSE CARD ── */
.course-img{position:relative;height:220px;overflow:hidden}
.course-img img{width:100%;height:100%;object-fit:cover}
.course-img-ph{width:100%;height:100%;background:linear-gradient(135deg,var(--bg2),var(--surface2));display:flex;align-items:center;justify-content:center;font-size:4rem}
.course-img-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(44,36,24,.6))}
.disc-badge{position:absolute;top:14px;left:14px;background:var(--accent);color:#fff;font-family:var(--mono);font-size:.62rem;font-weight:800;padding:4px 11px;border-radius:6px}
.course-body{padding:22px}
.course-name{font-family:var(--display);font-size:1.3rem;font-weight:700;margin-bottom:7px}
.course-desc{font-size:.83rem;color:var(--muted2);line-height:1.75;margin-bottom:18px}
.feats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.feat{display:flex;align-items:center;gap:8px;font-size:.77rem;color:var(--muted2);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px}
.feat-ic{width:26px;height:26px;border-radius:7px;flex-shrink:0;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:.82rem}
.price-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--accent-light);border:1px solid rgba(45,90,61,.18);border-radius:var(--radius);padding:14px 18px}
.price-main{font-family:var(--mono);font-size:1.9rem;font-weight:700;color:var(--accent)}
.price-old{font-family:var(--mono);font-size:.88rem;color:var(--muted);text-decoration:line-through}
.price-saved{background:var(--accent);color:#fff;font-family:var(--mono);font-size:.6rem;font-weight:800;padding:3px 9px;border-radius:5px;margin-left:auto}

/* ── SUMMARY CARD ── */
.summary-card{animation-delay:.1s;position:sticky;top:80px}
.card-head{display:flex;align-items:center;gap:9px;padding:18px 22px;border-bottom:1px solid var(--border)}
.head-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.card-head-title{font-family:var(--display);font-weight:700;font-size:1rem}
.card-body{padding:20px 22px}

/* Cart item */
.cart-item{display:flex;align-items:center;gap:12px;padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px}
.cart-ico{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--accent-light);border:1px solid rgba(45,90,61,.18);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.cart-info{flex:1;min-width:0}
.cart-name{font-weight:700;font-size:.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-type{font-size:.67rem;color:var(--muted);font-family:var(--mono);margin-top:2px}
.cart-price{font-family:var(--mono);font-weight:800;font-size:.9rem;color:var(--accent);white-space:nowrap}

/* Coupon */
.field-lbl{font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);font-family:var(--mono);margin-bottom:8px}
.field-row{display:flex;gap:7px}
.code-input{flex:1;background:var(--bg);border:1.5px solid var(--border2);color:var(--text);padding:12px 14px;border-radius:var(--radius-sm);font-family:var(--mono);font-size:.82rem;letter-spacing:2px;text-align:center;outline:none;transition:all .22s}
.code-input::placeholder{color:var(--muted);letter-spacing:.5px;font-size:.75rem}
.code-input:focus{border-color:var(--accent);background:var(--surface)}
.code-input.err{border-color:var(--red);background:var(--red-bg);animation:shake .4s ease}
.code-input.ok{border-color:rgba(45,90,61,.4);background:var(--accent-light)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.code-btn{padding:12px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface2);color:var(--muted2);font-family:var(--sans);font-size:.8rem;font-weight:800;cursor:pointer;transition:all .2s;white-space:nowrap}
.code-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.code-btn:disabled{opacity:.4;cursor:not-allowed}
.code-btn.remove{border-color:var(--red-border);color:var(--red);background:var(--red-bg)}
.code-msg{font-size:.72rem;font-weight:700;min-height:16px;margin-top:7px}
.code-msg.ok{color:var(--accent2)}.code-msg.err{color:var(--red)}
.field-wrap{margin-bottom:16px}

/* Price rows */
.price-rows{border-top:1px solid var(--border);padding-top:14px;margin-top:4px}
.pr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:.83rem}
.pr .l{color:var(--muted2)}.pr .v{font-family:var(--mono);font-weight:700}
.pr.disc .v{color:var(--accent2)}
.pr.total{border-top:1px solid var(--border);margin-top:8px;padding-top:13px;font-size:.95rem;font-weight:800}
.pr.total .v{color:var(--accent);font-size:1.25rem}

/* Pay section */
.pay-section{margin-top:20px}
.pay-btn{width:100%;padding:16px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:1rem;font-weight:700;cursor:pointer;transition:all .25s;box-shadow:0 6px 20px var(--accent-glow);display:flex;align-items:center;justify-content:center;gap:9px;min-height:56px}
.pay-btn:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 10px 28px var(--accent-glow)}
.pay-btn:active{transform:none}
.pay-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.pay-note{font-size:.68rem;color:var(--muted);text-align:center;margin-top:9px;font-family:var(--mono)}
.secure-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:12px;flex-wrap:wrap}
.sec-chip{display:flex;align-items:center;gap:5px;font-size:.63rem;color:var(--muted2);font-family:var(--mono);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:.72rem;font-family:var(--mono)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── SUCCESS / PROCESSING OVERLAY ── */
.proc-overlay{position:fixed;inset:0;z-index:3000;background:rgba(44,36,24,.3);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:20px}
.proc-card{background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:48px 40px;text-align:center;max-width:420px;width:100%;box-shadow:0 12px 48px rgba(44,36,24,.12);animation:cardIn .4s cubic-bezier(.16,1,.3,1)}
.proc-spinner{width:60px;height:60px;margin:0 auto 22px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-title{font-family:var(--display);font-size:1.3rem;font-weight:700;margin-bottom:7px}
.proc-sub{font-size:.82rem;color:var(--muted2);line-height:1.7}
.suc-ring{width:80px;height:80px;margin:0 auto 18px;border-radius:50%;background:var(--accent-light);border:2px solid rgba(45,90,61,.25);display:flex;align-items:center;justify-content:center;font-size:2.2rem;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}
.suc-amount{font-family:var(--mono);font-size:2.1rem;font-weight:700;color:var(--accent);margin:10px 0 3px}
.suc-lbl{font-size:.75rem;color:var(--muted)}
.suc-details{margin-top:18px;text-align:left}
.suc-row{display:flex;justify-content:space-between;padding:8px 0;font-size:.8rem;border-bottom:1px solid var(--border)}
.suc-row:last-child{border-bottom:none}
.suc-row .sl{color:var(--muted)}.suc-row .sv{font-family:var(--mono);font-weight:700}
.go-btn{display:inline-flex;align-items:center;gap:8px;margin-top:24px;background:var(--accent);color:#fff;border:none;padding:13px 36px;border-radius:var(--radius);font-family:var(--sans);font-size:.92rem;font-weight:700;cursor:pointer;transition:all .25s;box-shadow:0 6px 20px var(--accent-glow)}
.go-btn:hover{background:var(--accent2);transform:translateY(-2px)}
.err-ring{width:72px;height:72px;margin:0 auto 16px;background:var(--red-bg);border:1.5px solid var(--red-border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;animation:popIn .4s ease}
.retry-btn{display:inline-flex;align-items:center;gap:7px;margin-top:18px;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);padding:11px 24px;border-radius:var(--radius-sm);font-family:var(--sans);font-size:.86rem;font-weight:700;cursor:pointer;transition:all .2s}
.retry-btn:hover{border-color:var(--border2);background:var(--bg2)}

@media(max-width:840px){
  .checkout-grid{grid-template-columns:1fr}
  .summary-card{position:static}
  .feats-grid{grid-template-columns:1fr}
}
@media(max-width:560px){
  main{padding:24px 14px 80px}
  .proc-card{padding:36px 22px}
}
</style>
</head>
<body>
<div id="loadingScreen">
  <div class="ld-mark">MP</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div class="ld-txt" id="ldTxt">Loading…</div>
</div>

<nav>
  <div class="nav-inner">
    <a class="logo" href="/home">
      <div class="logo-mark">MP</div>
      <div class="logo-name">Math<em>Pro</em></div>
    </a>
    <span class="nav-tag">Checkout</span>
    <button class="back-btn" onclick="history.back()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-kicker">Complete Your Order</div>
    <div class="page-title">Checkout</div>
  </div>

  <div class="checkout-grid">
    <!-- Course Details -->
    <div class="card" id="courseCard">
      <div style="padding:60px;text-align:center;color:var(--muted)">Loading course…</div>
    </div>

    <!-- Summary -->
    <div class="card summary-card">
      <div class="card-head"><div class="head-dot"></div><div class="card-head-title">Order Summary</div></div>
      <div class="card-body">
        <div class="cart-item" id="cartItem">
          <div class="cart-ico">📚</div>
          <div class="cart-info"><div class="cart-name">Loading…</div><div class="cart-type">Online Course · One-time</div></div>
          <div class="cart-price">—</div>
        </div>

        <!-- Discount Coupon -->
        <div class="field-wrap">
          <div class="field-lbl">Discount Coupon</div>
          <div class="field-row">
            <input id="couponInput" class="code-input" placeholder="Enter coupon code" autocomplete="off" spellcheck="false">
            <button id="couponBtn" class="code-btn" onclick="applyCoupon()">Apply</button>
          </div>
          <div id="couponMsg" class="code-msg"></div>
        </div>

        <!-- Price Breakdown -->
        <div class="price-rows" id="priceRows"></div>

        <!-- Payment Code -->
        <div class="pay-section">
          <div class="divider">— or activate with code —</div>
          <div class="field-wrap">
            <div class="field-lbl">Activation / Payment Code</div>
            <div class="field-row">
              <input id="codeInput" class="code-input" placeholder="Enter your access code" autocomplete="off" spellcheck="false">
              <button id="codeBtn" class="code-btn" onclick="redeemCode()">Activate</button>
            </div>
            <div id="codeMsg" class="code-msg"></div>
          </div>

          <div class="pay-note">Payment is available via activation code from your teacher</div>
          <div class="secure-row">
            <div class="sec-chip">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Secured
            </div>
            <div class="sec-chip">🔑 Code Activation</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="procOverlay" class="proc-overlay hidden">
  <div class="proc-card" id="procCard"></div>
</div>

<script>
(function(){
  document.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('copy',e=>{e.clipboardData.setData('text/plain','⚠️');e.preventDefault();});
  window.addEventListener('keydown',e=>{if(e.keyCode===123||(e.ctrlKey&&e.shiftKey&&[73,74,67].includes(e.keyCode))||(e.ctrlKey&&e.keyCode===85)){e.preventDefault();return false;}});
})();

const SUPABASE_URL="https://kspfjzewkpfoeyocbzbm.supabase.co";
const SUPABASE_ANON="sb_publishable_4RiANbDn7lrulIbcXHS_3A_ANMSwaYp";
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

let currentUser=null,lessonData=null,lessonId=null,appliedCoupon=null;
const CURRENCY='EGP';

function showLoader(t='Loading…'){const s=document.getElementById('loadingScreen');document.getElementById('ldTxt').textContent=t;s.style.display='flex';void s.offsetWidth;s.style.opacity='1';}
function hideLoader(){const s=document.getElementById('loadingScreen');s.style.opacity='0';setTimeout(()=>s.style.display='none',320);}

function renderCourseCard(){
  const p=lessonData.price||0;const disc=appliedCoupon?appliedCoupon.discount:0;const final=Math.max(0,p-disc);
  const qc=lessonData.questions?.length||0;const vc=(lessonData.videos||[]).length;const days=lessonData.validitydays||90;
  document.getElementById('courseCard').innerHTML=`
    <div class="course-img">
      ${lessonData.image?`<img src="${lessonData.image}" alt="">`:`<div class="course-img-ph">📚</div>`}
      <div class="course-img-ov"></div>
      ${disc>0?`<div class="disc-badge">-${appliedCoupon.discountPercent||0}% OFF</div>`:''}
    </div>
    <div class="course-body">
      <div class="course-name">${lessonData.name||'Course'}</div>
      <div class="course-desc">${lessonData.description||'Complete course with video lessons, exam, and PDF notes.'}</div>
      <div class="feats-grid">
        ${qc>0?`<div class="feat"><div class="feat-ic">📝</div>${qc} Exam Questions</div>`:''}
        ${vc>0?`<div class="feat"><div class="feat-ic">🎬</div>${vc} Video Lessons</div>`:''}
        <div class="feat"><div class="feat-ic">📅</div>Valid ${days} Days</div>
        <div class="feat"><div class="feat-ic">📄</div>PDF Notes</div>
        <div class="feat"><div class="feat-ic">✅</div>Completion Certificate</div>
        <div class="feat"><div class="feat-ic">♾️</div>Lifetime Access</div>
      </div>
      <div class="price-row">
        <span class="price-main">${final} ${CURRENCY}</span>
        ${disc>0?`<span class="price-old">${p} ${CURRENCY}</span>`:''}
        ${disc>0?`<span class="price-saved">You save ${disc} ${CURRENCY}</span>`:''}
      </div>
    </div>`;
}

function renderCartItem(){
  const p=lessonData.price||0;
  document.getElementById('cartItem').innerHTML=`<div class="cart-ico">📚</div><div class="cart-info"><div class="cart-name">${lessonData.name||'Course'}</div><div class="cart-type">Online Course · One-time</div></div><div class="cart-price">${p} ${CURRENCY}</div>`;
}

function renderPrices(){
  const p=lessonData.price||0;const disc=appliedCoupon?appliedCoupon.discount:0;const final=Math.max(0,p-disc);
  let h=`<div class="pr"><span class="l">Subtotal</span><span class="v">${p} ${CURRENCY}</span></div>`;
  if(disc>0)h+=`<div class="pr disc"><span class="l">Discount ${appliedCoupon.discountPercent?`(${appliedCoupon.discountPercent}%)`:''}</span><span class="v">− ${disc} ${CURRENCY}</span></div>`;
  h+=`<div class="pr total"><span class="l">Total</span><span class="v">${final} ${CURRENCY}</span></div>`;
  document.getElementById('priceRows').innerHTML=h;
}

async function applyCoupon(){
  const inp=document.getElementById('couponInput'),btn=document.getElementById('couponBtn'),msg=document.getElementById('couponMsg');
  const code=inp.value.trim().toUpperCase();
  if(appliedCoupon){appliedCoupon=null;inp.classList.remove('ok','err');inp.disabled=false;msg.className='code-msg';msg.textContent='';btn.textContent='Apply';btn.classList.remove('remove');renderCourseCard();renderPrices();return;}
  if(!code){inp.classList.add('err');msg.className='code-msg err';msg.textContent='Please enter a coupon code.';return;}
  btn.disabled=true;btn.textContent='Checking…';inp.classList.remove('err','ok');msg.textContent='';
  try{
    const{data:c}=await db.from('coupons').select('*').eq('code',code).single();
    if(!c)throw new Error('Invalid coupon code');
    if(!c.is_active)throw new Error('This coupon is not active');
    if(c.expires_at&&new Date(c.expires_at)<new Date())throw new Error('This coupon has expired');
    if(c.max_uses!==null&&c.used_count>=c.max_uses)throw new Error('This coupon is fully used');
    if(c.lesson_id&&c.lesson_id!==lessonId)throw new Error('This coupon does not apply to this course');
    const price=lessonData.price||0;let disc=0,pct=0;
    if(c.discount_percent>0){pct=c.discount_percent;disc=Math.round(price*pct/100*100)/100;}
    if(c.discount_amount>0)disc+=c.discount_amount;
    disc=Math.min(disc,price);
    if(disc<=0)throw new Error('This coupon provides no discount here');
    appliedCoupon={id:c.id,code,discount:disc,discountPercent:pct};
    inp.classList.add('ok');inp.disabled=true;msg.className='code-msg ok';msg.textContent=`✓ Applied — you save ${disc} ${CURRENCY}`;btn.textContent='Remove';btn.classList.add('remove');renderCourseCard();renderPrices();
  }catch(e){inp.classList.add('err');msg.className='code-msg err';msg.textContent='✗ '+e.message;btn.textContent='Apply';}
  btn.disabled=false;
}
document.getElementById('couponInput').addEventListener('keydown',e=>{if(e.key==='Enter')applyCoupon();});

async function getStudentId(){
  try{const{data:u}=await db.from('users').select('studentid').eq('id',currentUser.id).single();return u?.studentid||currentUser.id.substring(0,6).toUpperCase();}
  catch{return currentUser.id.substring(0,6).toUpperCase();}
}

async function redeemCode(){
  const inp=document.getElementById('codeInput'),btn=document.getElementById('codeBtn'),msg=document.getElementById('codeMsg');
  const code=inp.value.trim().toUpperCase();
  inp.classList.remove('err','ok');msg.className='code-msg';msg.textContent='';
  if(!code){inp.classList.add('err');msg.className='code-msg err';msg.textContent='Please enter your activation code.';return;}
  btn.disabled=true;btn.textContent='Verifying…';
  try{
    const{data:row,error}=await db.from('codes').select('*').eq('code',code).single();
    if(error||!row)throw new Error('Invalid code. Please check and try again.');
    if(row.used&&!(row.usedby===currentUser.email&&String(row.lessonid)===String(lessonId)))throw new Error('This code has already been used.');
    if(row.lessonid&&String(row.lessonid)!==String(lessonId))throw new Error('This code is not valid for this course.');

    const now=Date.now(),days=lessonData.validitydays||90,expiry=now+days*24*60*60*1000;

    if(!row.used){
      const{error:upErr}=await db.from('codes').update({used:true,usedby:currentUser.email,lessonid:lessonId,expiryat:expiry}).eq('code',code).eq('used',false);
      if(upErr)throw new Error('Failed to activate code. Try again.');
    }

    const sid=await getStudentId();
    localStorage.setItem(`access_${currentUser.id}_${lessonId}`,JSON.stringify({expiry,studentId:sid}));
    localStorage.removeItem('checkout_lesson_id');
    try{const c=JSON.parse(localStorage.getItem('mp_cart')||'[]');localStorage.setItem('mp_cart',JSON.stringify(c.filter(id=>id!==lessonId)));}catch{}

    inp.classList.add('ok');msg.className='code-msg ok';msg.textContent='✓ Activated successfully!';
    const final=Math.max(0,(lessonData.price||0)-(appliedCoupon?appliedCoupon.discount:0));
    showSuccess({final,code,lessonName:lessonData.name});
  }catch(e){
    inp.classList.add('err');msg.className='code-msg err';msg.textContent='✗ '+e.message;
  }
  btn.disabled=false;btn.textContent='Activate';
}
document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')redeemCode();});

function showSuccess({final,code,lessonName}){
  document.getElementById('procOverlay').classList.remove('hidden');
  document.getElementById('procCard').innerHTML=`
    <div class="suc-ring">✓</div>
    <div class="proc-title" style="color:var(--accent)">Access Granted!</div>
    <div class="suc-amount">${final} ${CURRENCY}</div>
    <div class="suc-lbl">Order Total</div>
    <div class="suc-details">
      <div class="suc-row"><span class="sl">Code</span><span class="sv">${code}</span></div>
      <div class="suc-row"><span class="sl">Course</span><span class="sv">${lessonName}</span></div>
      <div class="suc-row"><span class="sl">Status</span><span class="sv" style="color:var(--accent)">Active ✓</span></div>
    </div>
    <button class="go-btn" onclick="window.location.href='/lesson?id=${lessonId}'">
      Start Course Now →
    </button>`;
}

async function init(){
  showLoader('Loading…');
  lessonId=new URLSearchParams(location.search).get('lesson_id')||localStorage.getItem('checkout_lesson_id');
  if(!lessonId){hideLoader();document.querySelector('main').innerHTML=`<div style="text-align:center;padding:100px 20px"><div style="font-size:3rem;margin-bottom:16px">⚠️</div><div style="font-family:var(--display);font-size:1.3rem;font-weight:700;margin-bottom:8px">No Course Selected</div><div style="font-size:.83rem;color:var(--muted);margin-bottom:20px">Please go back and choose a course.</div><button onclick="history.back()" class="back-btn">← Back</button></div>`;return;}
  const{data:{session}}=await db.auth.getSession();
  if(!session){hideLoader();window.location.href='/home';return;}
  currentUser=session.user;
  try{
    const{data:snap,error}=await db.from('lessons').select('*').eq('id',lessonId).single();
    if(error||!snap)throw new Error('Course not found');
    lessonData=snap;localStorage.setItem('checkout_lesson_id',lessonId);
    renderCourseCard();renderCartItem();renderPrices();hideLoader();
  }catch(e){
    hideLoader();document.querySelector('main').innerHTML=`<div style="text-align:center;padding:100px 20px;color:var(--red)"><div style="font-size:3rem">❌</div><div style="font-size:1rem;font-weight:800;margin-top:12px">${e.message}</div></div>`;
  }
}
init();
</script>
