<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MathPro | تسجيل الدخول</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{font-family:'Tajawal',sans-serif}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.glass{
background:rgba(255,255,255,.95);
border-radius:30px;
padding:35px;
max-width:420px;
width:100%;
}

</style>
</head>

<body>

<div class="glass shadow-2xl">

<div class="text-center mb-6">

<div class="inline-block p-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl mb-3">
<i class="fa-solid fa-calculator text-white text-3xl"></i>
</div>

<h1 class="text-3xl font-black text-gray-800">MathPro</h1>
<p class="text-gray-600">Mr Sherif Ali</p>

</div>

<h2 class="text-xl font-bold mb-5 text-center">تسجيل الدخول</h2>

<input id="email" type="email"
placeholder="البريد الإلكتروني"
class="w-full p-4 border rounded-xl mb-4">

<input id="password" type="password"
placeholder="كلمة المرور"
class="w-full p-4 border rounded-xl mb-4">

<button id="loginBtn"
class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700">
تسجيل الدخول
</button>

<p class="text-center mt-5 text-gray-600">

ليس لديك حساب؟
<a href="signup.html" class="text-blue-600 font-bold">إنشاء حساب</a>

</p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth,signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
authDomain:"math-e62c9.firebaseapp.com",
projectId:"math-e62c9",
appId:"1:271507842148:web:2907aad4caf67afd08ab71"
}

const app=initializeApp(firebaseConfig)
const auth=getAuth(app)

document.getElementById("loginBtn").onclick=async()=>{

let email=document.getElementById("email").value
let password=document.getElementById("password").value

try{

await signInWithEmailAndPassword(auth,email,password)

window.location="dashboard.html"

}catch(e){

alert("خطأ: "+e.message)

}

}

</script>

</body>
</html>
