<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f6f1e8;
      --card:#fffaf3;
      --card2:#efe7d9;
      --text:#2c2418;
      --muted:#7f715d;
      --border:rgba(44,36,24,.12);
      --accent:#2d5a3d;
      --accent2:#3a7550;
      --red:#a33b2e;
      --redbg:rgba(163,59,46,.08);
      --amber:#c4654a;
      --amberbg:rgba(196,101,74,.08);
      --radius:14px;
      --shadow:0 10px 30px rgba(44,36,24,.08);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Cairo',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      max-width:1100px;
      margin:auto;
      padding:28px 18px 60px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:24px;
    }

    .brand{
      font-size:1.4rem;
      font-weight:800;
    }

    .back-btn{
      text-decoration:none;
      color:#fff;
      background:var(--accent);
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .layout{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px;
    }

    .title{
      font-size:1.2rem;
      font-weight:800;
      margin-bottom:16px;
    }

    .cart-item{
      display:flex;
      gap:12px;
      align-items:center;
      padding:12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:var(--card2);
      margin-bottom:12px;
    }

    .cart-item img{
      width:74px;
      height:54px;
      object-fit:cover;
      border-radius:10px;
      background:#ddd;
    }

    .cart-info{
      flex:1;
    }

    .cart-name{
      font-weight:800;
      margin-bottom:4px;
    }

    .cart-sub{
      color:var(--muted);
      font-size:.9rem;
    }

    .cart-price{
      font-weight:800;
      white-space:nowrap;
    }

    .remove-btn{
      border:none;
      background:var(--redbg);
      color:var(--red);
      width:34px;
      height:34px;
      border-radius:10px;
      cursor:pointer;
      font-weight:800;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }

    .total{
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid var(--border);
      font-size:1.15rem;
      font-weight:800;
    }

    .methods{
      display:grid;
      gap:12px;
      margin-top:14px;
    }

    .method{
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      background:var(--card2);
      cursor:pointer;
    }

    .method input{
      margin-left:8px;
    }

    .method-title{
      font-weight:800;
      margin-bottom:4px;
    }

    .method-sub{
      color:var(--muted);
      font-size:.92rem;
    }

    .notice{
      background:var(--amberbg);
      color:var(--amber);
      border:1px solid rgba(196,101,74,.18);
      border-radius:12px;
      padding:12px 14px;
      font-weight:800;
      margin-top:16px;
    }

    .box{
      margin-top:16px;
      border:1px solid var(--border);
      border-radius:12px;
      padding:16px;
      background:var(--card2);
    }

    .label{
      font-size:.95rem;
      font-weight:800;
      margin-bottom:10px;
    }

    .input,.file{
      width:100%;
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px 14px;
      font-family:inherit;
      font-size:1rem;
      background:#fff;
      margin-bottom:12px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:14px;
      font-family:inherit;
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
      background:var(--accent);
      color:#fff;
    }

    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .muted{
      color:var(--muted);
      font-size:.92rem;
      line-height:1.7;
    }

    .empty{
      text-align:center;
      padding:40px 16px;
      color:var(--muted);
      font-weight:700;
    }

    .success{
      margin-top:14px;
      background:rgba(45,90,61,.08);
      color:var(--accent);
      border:1px solid rgba(45,90,61,.18);
      border-radius:12px;
      padding:12px 14px;
      font-weight:800;
    }

    .error{
      margin-top:14px;
      background:var(--redbg);
      color:var(--red);
      border:1px solid rgba(163,59,46,.16);
      border-radius:12px;
      padding:12px 14px;
      font-weight:800;
    }

    @media(max-width:900px){
      .layout{grid-template-columns:1fr}
      .topbar{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">Checkout</div>
      <a class="back-btn" href="/dashboard">رجوع للدashboard</a>
    </div>

    <div class="layout">
      <div class="card">
        <div class="title">الكورسات المختارة</div>
        <div id="cartList"></div>
      </div>

      <div class="card">
        <div class="title">الدفع</div>

        <div class="row">
          <span>عدد الكورسات</span>
          <strong id="itemsCount">0</strong>
        </div>

        <div class="row total">
          <span>الإجمالي</span>
          <strong id="totalPrice">0 ج.م</strong>
        </div>

        <div class="methods">
          <label class="method">
            <div class="method-title">
              <input type="radio" name="paymentMethod" value="code" checked>
              كود تفعيل
            </div>
            <div class="method-sub">ادخل كود التفعيل مباشرة</div>
          </label>

          <label class="method">
            <div class="method-title">
              <input type="radio" name="paymentMethod" value="vodafone_cash">
              Vodafone Cash
            </div>
            <div class="method-sub">01064233004</div>
          </label>

          <label class="method">
            <div class="method-title">
              <input type="radio" name="paymentMethod" value="instapay">
              InstaPay
            </div>
            <div class="method-sub">ارفع صورة التحويل بعد الدفع</div>
          </label>
        </div>

        <div class="notice">دفع الفيزا غير شغال حالياً</div>

        <div id="codeBox" class="box">
          <div class="label">أدخل كود التفعيل</div>
          <input id="codeInput" class="input" placeholder="اكتب الكود هنا">
          <button id="codeBtn" class="btn">تفعيل الكود</button>
          <div class="muted">لو الكود صحيح سيتم تفعيل الكورس مباشرة.</div>
          <div id="codeMsg"></div>
        </div>

        <div id="manualBox" class="box" style="display:none">
          <div class="label">رفع صورة الدفع</div>
          <div class="muted" style="margin-bottom:10px">
            حوّل على Vodafone Cash أو InstaPay ثم ارفع صورة التحويل.
          </div>
          <input id="paymentFile" type="file" accept="image/*" class="file">
          <button id="manualBtn" class="btn">إرسال صورة الدفع</button>
          <div id="manualMsg"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL="https://kspfjzewkpfoeyocbzbm.supabase.co";
    const SUPABASE_ANON="sb_publishable_4RiANbDn7lrulIbcXHS_3A_ANMSwaYp";
    const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

    let currentUser=null;
    let cart=[];
    let lessonsMap={};

    function setMsg(id,type,text){
      const el=document.getElementById(id);
      el.className=type;
      el.textContent=text;
    }

    function getSelectedMethod(){
      return document.querySelector('input[name="paymentMethod"]:checked')?.value || 'code';
    }

    function toggleBoxes(){
      const method=getSelectedMethod();
      document.getElementById('codeBox').style.display = method === 'code' ? 'block' : 'none';
      document.getElementById('manualBox').style.display = method === 'code' ? 'none' : 'block';
    }

    function loadCart(){
      try{
        cart = JSON.parse(localStorage.getItem('checkout_cart') || '[]');
        if(!Array.isArray(cart)) cart = [];
      }catch(e){
        cart = [];
      }
    }

    async function getUser(){
      const { data } = await db.auth.getUser();
      currentUser = data?.user || null;
    }

    async function loadLessons(){
      if(!cart.length){
        renderCart();
        return;
      }

      const { data, error } = await db.from('lessons').select('*').in('id', cart);
      if(error){
        renderCart();
        return;
      }

      lessonsMap = {};
      (data || []).forEach(item => lessonsMap[item.id] = item);
      renderCart();
    }

    function renderCart(){
      const list=document.getElementById('cartList');

      if(!cart.length){
        list.innerHTML=`<div class="empty">السلة فارغة</div>`;
        document.getElementById('itemsCount').textContent='0';
        document.getElementById('totalPrice').textContent='0 ج.م';
        return;
      }

      let total=0;
      list.innerHTML='';

      cart.forEach(id=>{
        const item=lessonsMap[id];
        if(!item) return;

        const price=Number(item.price)||0;
        total += price;

        const row=document.createElement('div');
        row.className='cart-item';
        row.innerHTML=`
          <button class="remove-btn" onclick="removeItem('${id}')">×</button>
          <img src="${item.image || ''}" alt="">
          <div class="cart-info">
            <div class="cart-name">${item.name || 'Course'}</div>
            <div class="cart-sub">Course Access × 1</div>
          </div>
          <div class="cart-price">${price} ج.م</div>
        `;
        list.appendChild(row);
      });

      document.getElementById('itemsCount').textContent=cart.length;
      document.getElementById('totalPrice').textContent=`${total} ج.م`;
    }

    function removeItem(id){
      cart = cart.filter(x=>x!==id);
      localStorage.setItem('checkout_cart', JSON.stringify(cart));
      renderCart();
    }

    async function submitCode(){
      const code=document.getElementById('codeInput').value.trim();
      if(!code){
        setMsg('codeMsg','error','اكتب الكود الأول');
        return;
      }

      if(!currentUser){
        setMsg('codeMsg','error','لازم تسجل دخول الأول');
        return;
      }

      try{
        const { data:codeRow, error } = await db.from('codes').select('*').eq('code', code).single();
        if(error || !codeRow) throw new Error('الكود غير موجود');

        const targetId = codeRow.lessonid || cart[0];
        if(codeRow.lessonid && !cart.includes(codeRow.lessonid)){
          throw new Error('هذا الكود ليس للكورس الموجود في السلة');
        }

        const expiry = codeRow.expiryat || Date.now() + 90*24*60*60*1000;

        await db.from('codes').update({
          usedby: currentUser.email,
          lessonid: targetId,
          expiryat: expiry
        }).eq('code', code);

        localStorage.setItem(`access_${currentUser.id}_${targetId}`, JSON.stringify({
          expiry,
          studentId: currentUser.id.substring(0,6).toUpperCase()
        }));

        cart = cart.filter(id=>id!==targetId);
        localStorage.setItem('checkout_cart', JSON.stringify(cart));

        setMsg('codeMsg','success','تم تفعيل الكود بنجاح');
        setTimeout(()=>location.href=`/lesson?id=${targetId}`,1200);
      }catch(e){
        setMsg('codeMsg','error',e.message || 'فشل التفعيل');
      }
    }

    async function submitManualPayment(){
      const method=getSelectedMethod();
      const file=document.getElementById('paymentFile').files[0];

      if(!currentUser){
        setMsg('manualMsg','error','لازم تسجل دخول الأول');
        return;
      }

      if(method !== 'vodafone_cash' && method !== 'instapay'){
        setMsg('manualMsg','error','اختر Vodafone Cash أو InstaPay');
        return;
      }

      if(!cart.length){
        setMsg('manualMsg','error','السلة فارغة');
        return;
      }

      if(!file){
        setMsg('manualMsg','error','ارفع صورة الدفع أولاً');
        return;
      }

      try{
        let total = 0;
        cart.forEach(id=>{
          total += Number(lessonsMap[id]?.price || 0);
        });

        const ext = file.name.split('.').pop();
        const fileName = `payment_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const filePath = `payment-proofs/${fileName}`;

        const { error: uploadError } = await db.storage.from('payments').upload(filePath, file);
        if(uploadError) throw uploadError;

        const { data: publicData } = db.storage.from('payments').getPublicUrl(filePath);
        const imageUrl = publicData.publicUrl;

        const { error: orderError } = await db.from('orders').insert([{
          email: currentUser.email,
          lesson_id: cart[0],
          amount: total,
          final_amount: total,
          status: 'pending_review',
          payment_method: method,
          payment_ref: imageUrl,
          cart_items: cart
        }]);

        if(orderError) throw orderError;

        localStorage.removeItem('checkout_cart');
        setMsg('manualMsg','success','تم إرسال صورة الدفع بنجاح وسيتم مراجعتها وتفعيل الكورس');
      }catch(e){
        setMsg('manualMsg','error',e.message || 'فشل إرسال صورة الدفع');
      }
    }

    document.querySelectorAll('input[name="paymentMethod"]').forEach(el=>{
      el.addEventListener('change', toggleBoxes);
    });

    document.getElementById('codeBtn').addEventListener('click', submitCode);
    document.getElementById('manualBtn').addEventListener('click', submitManualPayment);

    loadCart();
    toggleBoxes();
    getUser().then(loadLessons);
  </script>
</body>
</html>
