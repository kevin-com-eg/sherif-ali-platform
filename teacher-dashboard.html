<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<nav class="bg-orange-500 text-white p-4">
Teacher Dashboard
</nav>


<div class="max-w-4xl mx-auto p-6 space-y-6">


<!-- VIDEO -->

<div class="bg-white p-6 rounded-xl">

<h2 class="font-bold mb-3">

YouTube Video URL

</h2>

<input id="videoUrl"

class="w-full border p-3 rounded"

placeholder="YouTube URL">

</div>



<!-- QUIZ -->

<div class="bg-white p-6 rounded-xl">

<h2 class="font-bold mb-3">

Quiz Questions

</h2>

<div id="questions"></div>

<button id="addQuestion"

class="bg-orange-500 text-white px-4 py-2 mt-4 rounded">

Add Question

</button>

</div>



<!-- PDF -->

<div class="bg-white p-6 rounded-xl">

<h2 class="font-bold mb-3">

Upload PDF

</h2>

<input type="file" id="pdfFile">

</div>


<button id="saveLesson"

class="bg-orange-500 text-white px-6 py-3 rounded">

Save Lesson

</button>

</div>



<script>

let questionCount=0

const questionsDiv=document.getElementById("questions")

document.getElementById("addQuestion").onclick=()=>{

if(questionCount>=100){

alert("Maximum 100 questions")

return

}

questionCount++

const q=document.createElement("div")

q.className="border p-4 mt-4 rounded"

q.innerHTML=`

<p class="font-bold mb-2">Question ${questionCount}</p>

<input type="file" class="qImage mb-2">

<input placeholder="A" class="a border p-2 w-full mb-1">

<input placeholder="B" class="b border p-2 w-full mb-1">

<input placeholder="C" class="c border p-2 w-full mb-1">

<input placeholder="D" class="d border p-2 w-full mb-1">

<input placeholder="Correct (A/B/C/D)" class="correct border p-2 w-full">

`

questionsDiv.appendChild(q)

}

</script>

</body>
</html>
