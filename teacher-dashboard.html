<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded shadow-lg">
        <h1 class="text-2xl font-bold mb-6 border-b pb-2">Teacher Dashboard</h1>

        <input id="lessonName" placeholder="Lesson Name" class="border p-2 w-full mb-3 rounded">
        <input id="videoUrl" placeholder="Youtube URL" class="border p-2 w-full mb-3 rounded">
        <input id="pdfUrl" placeholder="PDF URL" class="border p-2 w-full mb-6 rounded">

        <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-200">
            <h2 class="font-bold mb-4 text-blue-700 flex justify-between">
                <span>Add Question</span>
                <span id="qCounter" class="bg-blue-600 text-white px-2 py-1 rounded text-xs">Questions in queue: 0</span>
            </h2>
            <input id="qImage" placeholder="Question Image URL" class="border p-2 w-full mb-2 rounded">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input id="a" placeholder="Label A" class="border p-2 rounded text-sm">
                <input id="b" placeholder="Label B" class="border p-2 rounded text-sm">
                <input id="c" placeholder="Label C" class="border p-2 rounded text-sm">
                <input id="d" placeholder="Label D" class="border p-2 rounded text-sm">
            </div>
            <select id="correct" class="border p-2 w-full mb-4 rounded">
                <option value="a">Correct A</option>
                <option value="b">Correct B</option>
                <option value="c">Correct C</option>
                <option value="d">Correct D</option>
            </select>
            <button onclick="addQuestion()" class="bg-blue-500 text-white px-4 py-2 rounded w-full font-bold">Add Question to List</button>
        </div>

        <button onclick="saveLesson()" id="saveBtn" class="bg-green-600 text-white px-6 py-3 rounded w-full font-black shadow-lg">SAVE LESSON TO FIREBASE</button>
    </div>

    <script type="module">
        import { db } from "./firebase.js"
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

        let questionsArray = [];

        // دالة إضافة سؤال للقائمة المؤقتة
        window.addQuestion = function() {
            const img = document.getElementById("qImage").value;
            if(!img) return alert("Please enter Image URL first!");

            const q = {
                image: img,
                a: document.getElementById("a").value || "A",
                b: document.getElementById("b").value || "B",
                c: document.getElementById("c").value || "C",
                d: document.getElementById("d").value || "D",
                correct: document.getElementById("correct").value
            };

            questionsArray.push(q);
            document.getElementById("qCounter").innerText = `Questions in queue: ${questionsArray.length}`;
            
            // تنظيف الخانات لسؤال جديد
            document.getElementById("qImage").value = "";
            alert("Question added to local list!");
        }

        // دالة الحفظ النهائي
        window.saveLesson = async function() {
            const saveBtn = document.getElementById("saveBtn");
            const currentImg = document.getElementById("qImage").value;

            // "حركة ذكية": لو المدرس نسي يدوس Add وكان كاتب بيانات سؤال، نضيفه أوتوماتيك
            if(currentImg && questionsArray.length === 0) {
                addQuestion();
            }

            if(questionsArray.length === 0) return alert("Add at least one question!");

            saveBtn.innerText = "Saving...";
            saveBtn.disabled = true;

            try {
                await addDoc(collection(db, "lessons"), {
                    name: document.getElementById("lessonName").value,
                    video: document.getElementById("videoUrl").value, // سميتها video عشان تطابق صورتك
                    pdf: document.getElementById("pdfUrl").value,
                    questions: questionsArray
                });
                alert("Lesson Saved Successfully!");
                location.reload(); // ريفرش عشان تفضي الفورم
            } catch (e) {
                console.error(e);
                alert("Error saving lesson");
                saveBtn
