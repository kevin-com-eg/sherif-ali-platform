<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
    <h1 class="text-3xl font-bold mb-8 text-gray-800 border-b pb-4">Teacher Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <input id="lessonName" placeholder="Lesson Name (e.g. Chemistry 101)" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
        <input id="videoUrl" placeholder="YouTube Video URL" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
        <input id="pdfUrl" placeholder="PDF Summary URL" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 col-span-full">
    </div>

    <div class="bg-blue-50 p-6 rounded-xl border border-blue-100 mb-8">
        <h2 class="font-bold text-blue-800 mb-4 flex justify-between">
            <span>Add Question</span>
            <span id="qCount" class="text-sm bg-blue-200 px-2 py-1 rounded text-blue-900">Questions Added: 0</span>
        </h2>
        
        <input id="qImage" placeholder="Question Image URL (Link from Google Drive or Cloudinary)" class="border p-3 w-full mb-4 rounded-lg">
        
        <div class="grid grid-cols-2 gap-3 mb-4">
            <input id="a" placeholder="Label A (Optional)" class="border p-2 rounded">
            <input id="b" placeholder="Label B (Optional)" class="border p-2 rounded">
            <input id="c" placeholder="Label C (Optional)" class="border p-2 rounded">
            <input id="d" placeholder="Label D (Optional)" class="border p-2 rounded">
        </div>

        <select id="correct" class="border p-3 w-full mb-6 rounded-lg font-bold text-gray-700">
            <option value="a">Correct: A</option>
            <option value="b">Correct: B</option>
            <option value="c">Correct: C</option>
            <option value="d">Correct: D</option>
        </select>

        <button onclick="addQuestionToList()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
            + Add Question to List
        </button>
    </div>

    <button id="saveBtn" onclick="saveToFirebase()" class="w-full bg-green-600 text-white font-black py-4 rounded-xl text-xl shadow-xl hover:bg-green-700 transition">
        SAVE & PUBLISH LESSON
    </button>

    <div id="successMsg" class="hidden mt-6 p-4 bg-green-100 text-green-800 rounded-lg text-center font-bold">
        Lesson Saved! Copy ID: <span id="newId" class="select-all underline"></span>
    </div>
</div>

<script type="module">
    import { db } from "./firebase.js"
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

    let questionsList = [];

    window.addQuestionToList = function() {
        if(!document.getElementById("qImage").value) return alert("Please add Image URL!");
        
        const q = {
            image: document.getElementById("qImage").value,
            a: document.getElementById("a").value || "A",
            b: document.getElementById("b").value || "B",
            c: document.getElementById("c").value || "C",
            d: document.getElementById("d").value || "D",
            correct: document.getElementById("correct").value
        };

        questionsList.push(q);
        document.getElementById("qCount").innerText = `Questions Added: ${questionsList.length}`;
        
        // Reset question fields
        document.getElementById("qImage").value = "";
        alert("Question added! You can now add more or click Save.");
    }

    window.saveToFirebase = async function() {
        const name = document.getElementById("lessonName").value;
        const btn = document.getElementById("saveBtn");

        if(!name || questionsList.length === 0) return alert("Need Lesson Name and at least 1 Question!");

        btn.innerText = "Publishing...";
        btn.disabled = true;

        try {
            const docRef = await addDoc(collection(db, "lessons"), {
                name: name,
                videoUrl: document.getElementById("videoUrl").value,
                pdfUrl: document.getElementById("pdfUrl").value,
                questions: questionsList,
                createdAt: new Date()
            });

            document.getElementById("successMsg").classList.remove("hidden");
            document.getElementById("newId").innerText = docRef.id;
            btn.innerText = "DONE!";
        } catch (e) {
            console.error(e);
            alert("Error saving!");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
