<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | MathPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f0fdf4; } 
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .btn-green { background: linear-gradient(135deg, #10b981 0%, #047857 100%); } 
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="secureLayer" class="fixed inset-0 bg-white z-[100] flex items-center justify-center">
        <div class="text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-[#10b981] border-solid mx-auto"></div>
            <p class="mt-4 font-bold text-slate-600">جاري التحقق من صلاحيات المعلم...</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto space-y-10">
        
        <div class="glass p-8 rounded-[2.5rem] card-shadow border border-emerald-100 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-slate-800">لوحة تحكم المعلم 🎓</h1>
                <p class="text-[#10b981] font-bold">مستر شريف علي | إدارة المنصة</p>
            </div>
            <button onclick="signOut()" class="bg-red-50 text-red-600 px-6 py-2 rounded-xl font-bold hover:bg-red-100 transition">خروج</button>
        </div>

        <div class="glass p-8 rounded-[2.5rem] card-shadow border border-emerald-100 bg-emerald-50/50">
            <div class="flex items-center gap-3 mb-6">
                <span class="text-3xl">📢</span>
                <h2 class="text-2xl font-black text-slate-800">إرسال تنبيه عام للطلاب</h2>
            </div>
            <textarea id="notifMessage" placeholder="اكتب رسالتك هنا..." class="w-full p-5 bg-white border-2 border-emerald-200 rounded-2xl outline-none focus:border-[#10b981] mb-4 h-28 font-medium text-lg"></textarea>
            <button id="sendNotifBtn" class="btn-green text-white px-8 py-4 rounded-2xl font-black hover:opacity-90 transition w-full md:w-auto shadow-lg text-lg">إرسال لجميع الطلاب فوراً 🚀</button>
        </div>

        <div class="glass p-8 rounded-[2.5rem] card-shadow border border-emerald-100">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-8 bg-green-500 rounded-full"></div>
                    <h2 class="text-2xl font-black text-slate-800">سجل درجات الطلاب 📊</h2>
                </div>
                <div class="w-full md:w-1/3 relative">
                    <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="ابحث باسم الطالب، الإيميل، أو الحصة..." class="w-full p-3 pl-10 bg-slate-50 border-2 border-emerald-100 rounded-xl outline-none focus:border-[#10b981] text-sm font-bold text-slate-700">
                    <span class="absolute left-3 top-3 text-slate-400">🔍</span>
                </div>
            </div>
            
            <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
                <table class="w-full text-right border-collapse" id="resultsMainTable">
                    <thead class="sticky top-0 bg-white shadow-sm z-10">
                        <tr class="border-b-2 border-emerald-100">
                            <th class="p-4 text-slate-500 font-black">اسم الطالب</th>
                            <th class="p-4 text-slate-500 font-black">البريد الإلكتروني</th>
                            <th class="p-4 text-slate-500 font-black">اسم الحصة</th>
                            <th class="p-4 text-slate-500 font-black">الدرجة</th>
                            <th class="p-4 text-slate-500 font-black">الوقت والتاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTable" class="text-slate-700">
                        <tr><td colspan="5" class="p-10 text-center text-slate-400 font-bold">جاري تحميل وسحب الدرجات... ⏳</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="glass p-8 rounded-[2.5rem] card-shadow border border-emerald-100">
            <h2 class="text-2xl font-black text-slate-800 mb-8 flex items-center gap-2">
                <div class="w-2 h-8 bg-[#10b981] rounded-full"></div> بيانات الحصة الأساسية ➕
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">اسم الحصة / الدرس</label>
                    <input id="lessonName" placeholder="مثال: الباب الأول - الدرس الثاني" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:border-[#10b981]">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">المرحلة الدراسية</label>
                    <select id="lessonGrade" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:border-[#10b981]">
                        <option value="1">أولى ثانوي</option>
                        <option value="2">تانية ثانوي</option>
                        <option value="3">تالتة ثانوي</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">سعر الحصة (بالجنيه)</label>
                    <input id="lessonPrice" type="number" placeholder="مثال: 50" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:border-[#10b981]">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 border-t border-slate-100 pt-6">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">رابط صورة الغلاف للكارت</label>
                    <input id="lessonImage" placeholder="رابط صورة خارجية" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:border-[#10b981]">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">رابط فيديو الشرح</label>
                    <input id="videoUrl" placeholder="رابط اليوتيوب" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:border-[#10b981]">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">رابط الملزمة PDF</label>
                    <input id="attachmentUrl" placeholder="رابط جوجل درايف للملزمة" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:border-[#10b981]">
                </div>
            </div>

            <h3 class="text-xl font-black text-slate-800 mb-4 border-t border-slate-100 pt-6">أسئلة الامتحان (اختياري)</h3>
            <div id="questionsContainer" class="space-y-6"></div>
            
            <div class="mt-10 flex flex-col md:flex-row gap-4">
                <button id="addNewQBtn" class="flex-1 bg-slate-100 text-slate-700 font-black py-4 rounded-2xl border-2 border-slate-200 hover:bg-slate-200">+ إضافة سؤال</button>
                <button id="saveBtn" class="flex-1 btn-green text-white font-black py-4 rounded-2xl text-xl shadow-lg active:scale-95">نشر الحصة الآن 🚀</button>
            </div>
        </div>

        <div class="glass p-8 rounded-[2.5rem] card-shadow border border-emerald-100">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black text-slate-800">توليد أكواد الاشتراك 🎫</h2>
                <button id="genCodesBtn" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black hover:bg-[#10b981] transition shadow-lg">توليد 50 كود جديد</button>
            </div>
            <div id="codesResultArea" class="hidden">
                <div class="bg-emerald-50 border-2 border-emerald-200 p-6 rounded-3xl">
                    <button id="copyCodesBtn" class="mb-4 bg-[#10b981] text-white px-4 py-2 rounded-lg text-sm font-bold">نسخ الأكواد للطباعة 📋</button>
                    <div id="codesGrid" class="grid grid-cols-2 md:grid-cols-5 gap-2 font-mono text-xs text-center"></div>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut as firebaseSignOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, doc, setDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo", authDomain: "math-e62c9.firebaseapp.com", projectId: "math-e62c9", appId: "1:271507842148:web:2907aad4caf67afd08ab71" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const MASTER_EMAIL = "kevin.hany.08@proton.me";

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === MASTER_EMAIL) {
            document.getElementById("secureLayer").classList.add("hidden");
            loadResults(); 
        } else { window.location.href = "index.html"; }
    });

    document.getElementById('sendNotifBtn').onclick = async () => {
        const msg = document.getElementById('notifMessage').value;
        const btn = document.getElementById('sendNotifBtn');
        if(!msg) return alert("اكتب رسالة التنبيه أولاً!");
        btn.innerText = "جاري الإرسال..."; btn.disabled = true;
        try { await addDoc(collection(db, "announcements"), { message: msg, createdAt: new Date(), active: true }); alert("تم إرسال التنبيه بنجاح!"); document.getElementById('notifMessage').value = ""; } catch(e) { alert("خطأ"); }
        btn.innerText = "إرسال لجميع الطلاب فوراً 🚀"; btn.disabled = false;
    };

    async function loadResults() {
        const resultsTable = document.getElementById("resultsTable");
        try {
            const usersSnap = await getDocs(collection(db, "users"));
            let usersMap = {};
            usersSnap.forEach(doc => { const data = doc.data(); if(data.email) usersMap[data.email] = data.name; });

            let querySnapshot;
            try { querySnapshot = await getDocs(query(collection(db, "results"), orderBy("date", "desc"))); } 
            catch(e) { querySnapshot = await getDocs(collection(db, "results")); }

            let resultsArray = [];
            querySnapshot.forEach(doc => resultsArray.push(doc.data()));
            resultsArray.sort((a,b) => { const dateA = a.date ? a.date.seconds : 0; const dateB = b.date ? b.date.seconds : 0; return dateB - dateA; });

            resultsTable.innerHTML = "";
            if (resultsArray.length === 0) { resultsTable.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-500 font-bold">لا توجد نتائج مسجلة حتى الآن.</td></tr>`; return; }

            resultsArray.forEach((res) => {
                const studentName = usersMap[res.email] || "طالب غير مسجل بالاسم";
                const dateOptions = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' };
                const examDate = res.date ? new Date(res.date.seconds * 1000).toLocaleDateString('ar-EG', dateOptions) : "غير محدد";
                const tr = document.createElement("tr");
                tr.className = "border-b border-slate-100 hover:bg-slate-50 transition student-row";
                tr.innerHTML = `
                    <td class="p-4 font-bold text-slate-800">${studentName}</td>
                    <td class="p-4 text-slate-500 font-mono text-sm">${res.email || "-"}</td>
                    <td class="p-4 font-black text-[#10b981]">${res.lesson || "-"}</td>
                    <td class="p-4"><span class="bg-[#10b981]/10 text-[#10b981] px-4 py-1.5 rounded-full font-black border border-[#10b981]/20 shadow-sm">${res.score} / ${res.total}</span></td>
                    <td class="p-4 text-xs text-slate-400 font-bold" dir="ltr">${examDate}</td>`;
                resultsTable.appendChild(tr);
            });
        } catch (e) { resultsTable.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500 font-bold">حدث خطأ أثناء تحميل البيانات</td></tr>`; }
    }

    window.searchTable = () => {
        const input = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll(".student-row").forEach(row => { row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none"; });
    }

    document.getElementById("addNewQBtn").onclick = () => {
        const qCount = document.querySelectorAll('.question-block').length + 1;
        const qHtml = `<div class="question-block bg-white p-6 rounded-3xl border-2 border-emerald-100 mb-4"><p class="font-black mb-4 text-[#10b981] underline">سؤال رقم ${qCount}</p><div class="grid grid-cols-2 gap-4 mb-4"><input class="q-image p-3 border rounded-xl" placeholder="رابط صورة السؤال"><select class="q-correct p-3 border rounded-xl font-bold"><option value="a">A</option><option value="b">B</option><option value="c">C</option><option value="d">D</option></select></div><div class="grid grid-cols-4 gap-2"><input class="q-a p-2 border rounded-lg text-xs" placeholder="خيار A"><input class="q-b p-2 border rounded-lg text-xs" placeholder="خيار B"><input class="q-c p-2 border rounded-lg text-xs" placeholder="خيار C"><input class="q-d p-2 border rounded-lg text-xs" placeholder="خيار D"></div></div>`;
        document.getElementById("questionsContainer").insertAdjacentHTML('beforeend', qHtml);
    };

    document.getElementById("saveBtn").onclick = async () => {
        const name = document.getElementById("lessonName").value;
        const grade = document.getElementById("lessonGrade").value; // 🔥 السنة
        const price = document.getElementById("lessonPrice").value;
        const image = document.getElementById("lessonImage").value;
        const video = document.getElementById("videoUrl").value;
        
        if (!name || !video) return alert("ادخل اسم الحصة ورابط الفيديو!");
        
        let questionsData = [];
        document.querySelectorAll('.question-block').forEach(block => {
            questionsData.push({ image: block.querySelector('.q-image').value, a: block.querySelector('.q-a').value || "A", b: block.querySelector('.q-b').value || "B", c: block.querySelector('.q-c').value || "C", d: block.querySelector('.q-d').value || "D", correct: block.querySelector('.q-correct').value });
        });
        
        const btn = document.getElementById('saveBtn');
        btn.innerText = "جاري النشر..."; btn.disabled = true;

        try {
            await addDoc(collection(db, "lessons"), { name, grade, video, pdf: document.getElementById("attachmentUrl").value, price, image, questions: questionsData, createdAt: new Date() });
            alert("تم نشر الحصة بنجاح! ✅"); location.reload();
        } catch (e) { alert("خطأ في الحفظ"); btn.innerText = "نشر الحصة الآن 🚀"; btn.disabled = false; }
    };

    document.getElementById('genCodesBtn').onclick = async () => {
        if(!confirm("توليد 50 كود؟")) return;
        const grid = document.getElementById('codesGrid');
        grid.innerHTML = "جاري الرفع...";
        for (let i = 0; i < 50; i++) {
            const code = "SA-" + Math.floor(Math.random() * 1e12);
            await setDoc(doc(db, "codes", code), { used: false, createdAt: new Date() });
            grid.innerHTML += `<div class="p-1 border rounded bg-white shadow-sm font-bold text-slate-700">${code}</div>`;
        }
        document.getElementById('codesResultArea').classList.remove('hidden');
    };

    document.getElementById('copyCodesBtn').onclick = () => {
        const codes = Array.from(document.getElementById('codesGrid').children).map(div => div.innerText).join('\n');
        navigator.clipboard.writeText(codes).then(() => alert("تم النسخ بنجاح! ✅"));
    };

    window.signOut = () => firebaseSignOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>
