<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<nav class="bg-orange-500 text-white p-4 text-xl font-bold">
Teacher Dashboard
</nav>


<div class="max-w-4xl mx-auto p-6 space-y-6">


<!-- LESSON INFO -->

<div class="bg-white p-6 rounded-xl shadow">

<input id="lessonName"
placeholder="Lesson Name"
class="w-full border p-3 rounded mb-3">

<input id="lessonPrice"
placeholder="Lesson Price"
class="w-full border p-3 rounded">

</div>


<!-- VIDEO -->

<div class="bg-white p-6 rounded-xl shadow">

<input id="videoUrl"
placeholder="YouTube URL"
class="w-full border p-3 rounded">

</div>


<!-- PDF -->

<div class="bg-white p-6 rounded-xl shadow">

<input id="pdfLink"
placeholder="PDF Link"
class="w-full border p-3 rounded">

</div>



<!-- QUIZ -->

<div class="bg-white p-6 rounded-xl shadow">

<h2 class="font-bold mb-4">

Quiz Questions

</h2>

<div id="questions"></div>

<button id="addQuestion"
class="bg-orange-500 text-white px-4 py-2 rounded mt-4">

Add Question

</button>

</div>



<button id="saveLesson"
class="bg-orange-500 text-white px-6 py-3 rounded">

Save Lesson

</button>


</div>



<script type="module">

import { db } from "./firebase.js"

import { collection, addDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"



let questionCount = 0

const questionsDiv = document.getElementById("questions")



document.getElementById("addQuestion").onclick = () => {

if(questionCount >= 100){

alert("Maximum 100 questions")
return

}

questionCount++

const q = document.createElement("div")

q.className="border p-4 mt-4 rounded"

q.innerHTML = `

<p class="font-bold mb-2">Question ${questionCount}</p>

<input placeholder="Question Image URL" class="qImage border p-2 w-full mb-2">

<input placeholder="Answer A" class="a border p-2 w-full mb-1">

<input placeholder="Answer B" class="b border p-2 w-full mb-1">

<input placeholder="Answer C" class="c border p-2 w-full mb-1">

<input placeholder="Answer D" class="d border p-2 w-full mb-1">

<input placeholder="Correct (A/B/C/D)" class="correct border p-2 w-full">

`

questionsDiv.appendChild(q)

}



document.getElementById("saveLesson").onclick = async () => {

const lessonName = document.getElementById("lessonName").value
const lessonPrice = document.getElementById("lessonPrice").value
const video = document.getElementById("videoUrl").value
const pdf = document.getElementById("pdfLink").value


const questionsElements = document.querySelectorAll("#questions > div")

let questions = []


questionsElements.forEach(q=>{

questions.push({

image:q.querySelector(".qImage").value,

a:q.querySelector(".a").value,
b:q.querySelector(".b").value,
c:q.querySelector(".c").value,
d:q.querySelector(".d").value,

correct:q.querySelector(".correct").value

})

})


await addDoc(collection(db,"lessons"),{

name:lessonName,
price:lessonPrice,
video:video,
pdf:pdf,
questions:questions,
createdAt:Date.now()

})


alert("Lesson Saved Successfully")

}

</script>


</body>
</html>
