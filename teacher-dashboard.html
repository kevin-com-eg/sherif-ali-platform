<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard | MathPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-black mb-8 text-gray-800 border-b-4 border-orange-500 pb-2 w-fit">إضافة حصة جديدة</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
            <div>
                <label class="block mb-2 font-bold text-gray-700">اسم الحصة</label>
                <input id="lessonName" placeholder="مثلاً: جبر - الدرس الأول" class="border p-3 w-full rounded-lg outline-none focus:ring-2 focus:ring-orange-400">
            </div>
            <div>
                <label class="block mb-2 font-bold text-gray-700">رابط الفيديو (يوتيوب)</label>
                <input id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." class="border p-3 w-full rounded-lg outline-none focus:ring-2 focus:ring-orange-400">
            </div>
        </div>

        <div id="questionsContainer" class="space-y-6">
            <h2 class="text-xl font-bold text-orange-600 mb-4">الأسئلة:</h2>
            
            <div class="question-block bg-gray-50 p-6 rounded-xl border-2 border-dashed border-gray-200 relative">
                <span class="absolute top-[-15px] right-4 bg-orange-500 text-white px-3 py-1 rounded-full text-sm font-bold shadow-md">سؤال 1</span>
                
                <label class="block mb-2 font-bold text-gray-600">رابط صورة السؤال</label>
                <input class="q-image border p-2 w-full mb-4 rounded-md" placeholder="حط لينك الصورة هنا">
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input class="q-a border p-2 rounded-md" placeholder="اختيار A">
                    <input class="q-b border p-2 rounded-md" placeholder="اختيار B">
                    <input class="q-c border p-2 rounded-md" placeholder="اختيار C">
                    <input class="q-d border p-2 rounded-md" placeholder="اختيار D">
                </div>
                
                <label class="block mb-2 font-bold text-gray-600">الإجابة الصحيحة</label>
                <select class="q-correct border p-2 w-full rounded-md bg-white">
                    <option value="a">A</option>
                    <option value="b">B</option>
                    <option value="c">C</option>
                    <option value="d">D</option>
                </select>
            </div>
        </div>

        <div class="mt-8 flex flex-col gap-4">
            <button id="addNewQBtn" class="bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-gray-700 transition">
                + إضافة سؤال آخر للحصة
            </button>

            <button id="saveBtn" class="bg-orange-600 text-white font-black py-5 rounded-2xl text-xl shadow-xl hover:bg-orange-700 transition transform hover:scale-[1.02]">
                حفظ الحصة بالكامل الآن
            </button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
        authDomain: "math-e62c9.firebaseapp.com",
        projectId: "math-e62c9",
        appId: "1:271507842148:web:2907aad4caf67afd08ab71"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const questionsContainer = document.getElementById("questionsContainer");
    const addNewQBtn = document.getElementById("addNewQBtn");
    const saveBtn = document.getElementById("saveBtn");

    // دالة لإضافة بلوك سؤال جديد في الصفحة
    addNewQBtn.onclick = () => {
        const qCount = document.querySelectorAll('.question-block').length + 1;
        const qHtml = `
            <div class="question-block bg-gray-50 p-6 rounded-xl border-2 border-dashed border-gray-200 relative animate-fade-in">
                <span class="absolute top-[-15px] right-4 bg-orange-500 text-white px-3 py-1 rounded-full text-sm font-bold shadow-md">سؤال ${qCount}</span>
                <label class="block mb-2 font-bold text-gray-600">رابط صورة السؤال</label>
                <input class="q-image border p-2 w-full mb-4 rounded-md" placeholder="حط لينك الصورة هنا">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input class="q-a border p-2 rounded-md" placeholder="اختيار A">
                    <input class="q-b border p-2 rounded-md" placeholder="اختيار B">
                    <input class="q-c border p-2 rounded-md" placeholder="اختيار C">
                    <input class="q-d border p-2 rounded-md" placeholder="اختيار D">
                </div>
                <label class="block mb-2 font-bold text-gray-600">الإجابة الصحيحة</label>
                <select class="q-correct border p-2 w-full rounded-md bg-white">
                    <option value="a">A</option><option value="b">B</option><option value="c">C</option><option value="d">D</option>
                </select>
            </div>`;
        questionsContainer.insertAdjacentHTML('beforeend', qHtml);
    };

    // دالة الحفظ النهائي (تجمع كل الأسئلة وترفعها)
    saveBtn.onclick = async () => {
        const name = document.getElementById("lessonName").value;
        const video = document.getElementById("videoUrl").value;
        
        if (!name) return alert("من فضلك اكتب اسم الحصة أولاً");

        const questionBlocks = document.querySelectorAll('.question-block');
        let questionsData = [];

        questionBlocks.forEach(block => {
            const img = block.querySelector('.q-image').value;
            if (img) { // لا نضيف السؤال إلا لو فيه صورة
                questionsData.push({
                    image: img,
                    a: block.querySelector('.q-a').value || "A",
                    b: block.querySelector('.q-b').value || "B",
                    c: block.querySelector('.q-c').value || "C",
                    d: block.querySelector('.q-d').value || "D",
                    correct: block.querySelector('.q-correct').value
                });
            }
        });

        if (questionsData.length === 0) return alert("من فضلك ضيف سؤال واحد على الأقل (حط لينك الصورة)");

        saveBtn.innerText = "جاري الحفظ والرفع...";
        saveBtn.disabled = true;

        try {
            await addDoc(collection(db, "lessons"), {
                name: name,
                video: video,
                questions: questionsData,
                createdAt: new Date()
            });
            alert("تم حفظ الحصة بنجاح!");
            location.reload();
        } catch (e) {
            console.error(e);
            alert("خطأ في الحفظ");
            saveBtn.disabled = false;
            saveBtn.innerText = "حفظ الحصة بالكامل الآن";
        }
    };
</script>
</body>
</html>
