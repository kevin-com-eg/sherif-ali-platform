<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Sherif Ali - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .clip-path-slant { clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); }
        .clip-path-slant-reverse { clip-path: polygon(0 15%, 100% 0, 100% 100%, 0 100%); }

        @keyframes spin-slow { to { transform: rotate(360deg); } }
        @keyframes spin-reverse { to { transform: rotate(-360deg); } }
        .animate-spin-slow { animation: spin-slow 10s linear infinite; }
        .animate-spin-reverse { animation: spin-reverse 15s linear infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.6s ease-out forwards; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .animate-shake { animation: shake 0.5s ease-in-out; }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
        .animate-pulse-ring { animation: pulse-ring 2s ease-in-out infinite; }

        .tab-active {
            background: #dc2626;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(220,38,38,0.3);
        }
        .tab-inactive {
            background: rgba(255,255,255,0.05);
            color: #9ca3af;
        }

        input:focus { outline: none; }
        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220,38,38,0.15);
            background: rgba(255,255,255,0.08);
        }
        .input-field.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
        }
        .input-field.success {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
        }

        .form-panel {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-panel.hidden-panel {
            opacity: 0;
            transform: translateX(40px);
            position: absolute;
            pointer-events: none;
        }
        .form-panel.active-panel {
            opacity: 1;
            transform: translateX(0);
            position: relative;
            pointer-events: all;
        }

        .password-strength-bar {
            transition: all 0.3s ease;
        }

        .toast {
            animation: fade-in-up 0.4s ease-out forwards;
        }
        .toast-exit {
            animation: fade-out-down 0.3s ease-in forwards;
        }
        @keyframes fade-out-down {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(20px); }
        }
    </style>
</head>
<body class="bg-[#020617] text-white">

    <div id="toastContainer" class="fixed top-24 right-6 z-[100] flex flex-col gap-3"></div>

    <nav class="fixed top-0 left-0 right-0 z-50 h-20 flex items-center" style="background: rgba(2,6,23,0.8); backdrop-filter: blur(12px);">
        <div class="max-w-7xl mx-auto w-full px-6 lg:px-8 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="graduation-cap" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-xl font-semibold tracking-tight">Mr Sherif Ali</span>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <a href="#home" class="text-slate-300 hover:text-white transition-colors text-sm font-medium">Home</a>
                <a href="#about" class="text-slate-300 hover:text-white transition-colors text-sm font-medium">About</a>
                <a href="#auth" class="text-slate-300 hover:text-white transition-colors text-sm font-medium">Portal</a>
                <a href="#contact" class="text-slate-300 hover:text-white transition-colors text-sm font-medium">Contact</a>
            </div>
            <button id="mobileMenuBtn" class="md:hidden text-slate-300">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
        </div>
    </nav>

    <div id="mobileMenu" class="fixed inset-0 z-[60] bg-[#020617]/95 backdrop-blur-md hidden flex-col items-center justify-center gap-8">
        <button id="mobileMenuClose" class="absolute top-6 right-6 text-white">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <a href="#home" class="text-2xl text-slate-300 hover:text-white transition-colors mobile-link">Home</a>
        <a href="#about" class="text-2xl text-slate-300 hover:text-white transition-colors mobile-link">About</a>
        <a href="#auth" class="text-2xl text-slate-300 hover:text-white transition-colors mobile-link">Portal</a>
        <a href="#contact" class="text-2xl text-slate-300 hover:text-white transition-colors mobile-link">Contact</a>
    </div>

    <section id="home" class="relative clip-path-slant bg-[#020617] pt-32 pb-48 overflow-hidden">
        <div class="absolute top-20 left-10 w-[500px] h-[500px] border border-red-600/20 rounded-full animate-spin-slow"></div>
        <div class="absolute bottom-10 right-10 w-[400px] h-[400px] border border-blue-600/20 rounded-full animate-spin-reverse"></div>
        <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10">
            <div class="grid lg:grid-cols-2 gap-12 items-center">
                <div>
                    <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-red-600/10 border border-red-600/20 text-red-400 text-sm font-medium mb-6">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                        3rd Secondary Education
                    </span>
                    <h1 class="text-4xl lg:text-7xl font-semibold leading-[1.1] tracking-tight mb-6">
                        Welcome to<br>
                        <span class="bg-gradient-to-r from-red-500 to-orange-500 bg-clip-text text-transparent">Mr Sherif Ali's</span><br>
                        Portal
                    </h1>
                    <p class="text-lg lg:text-xl text-slate-400 leading-relaxed mb-8 max-w-lg">
                        Access your learning materials, track your progress, and excel in your 3rd secondary year with comprehensive resources.
                    </p>
                    <div class="flex flex-wrap gap-4">
                        <a href="#auth" class="inline-flex items-center gap-2 px-8 py-4 bg-red-600 hover:bg-red-500 text-white font-medium rounded-xl transition-all shadow-lg shadow-red-600/20 hover:shadow-red-600/40">
                            Get Started
                            <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </a>
                    </div>
                </div>
                <div class="relative flex justify-center">
                    <img src="https://picsum.photos/seed/sherifali-hero/600/400.jpg" alt="Education" class="rounded-2xl shadow-2xl shadow-black/50 object-cover w-full max-w-md">
                </div>
            </div>
        </div>
    </section>

    <section id="auth" class="relative py-24 overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10">
            <div class="text-center mb-12">
                <span class="text-red-500 text-sm font-semibold uppercase tracking-wide">Student Portal</span>
                <h2 class="text-3xl lg:text-5xl font-semibold tracking-tight mt-3">
                    Access Your <span class="bg-gradient-to-r from-red-500 to-orange-500 bg-clip-text text-transparent">Account</span>
                </h2>
            </div>

            <div class="max-w-xl mx-auto">
                <div class="bg-slate-900/60 backdrop-blur-md border border-white/10 rounded-2xl p-8 lg:p-10 shadow-2xl shadow-black/30">
                    <div class="flex bg-slate-950/50 rounded-xl p-1 mb-8">
                        <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-3 px-6 rounded-lg text-sm font-semibold transition-all duration-300 tab-active flex items-center justify-center gap-2">
                            <i data-lucide="log-in" class="w-4 h-4"></i> Login
                        </button>
                        <button id="signupTab" onclick="switchTab('signup')" class="flex-1 py-3 px-6 rounded-lg text-sm font-semibold transition-all duration-300 tab-inactive flex items-center justify-center gap-2">
                            <i data-lucide="user-plus" class="w-4 h-4"></i> Sign Up
                        </button>
                    </div>

                    <div id="loginPanel" class="form-panel active-panel">
                        <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
                            <div class="space-y-5">
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                                    <input type="email" id="loginEmail" placeholder="student@example.com" class="input-field w-full px-4 py-3.5 rounded-xl text-white text-sm">
                                    <p id="loginEmailError" class="text-red-400 text-xs mt-1.5 hidden"></p>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                                    <input type="password" id="loginPassword" placeholder="••••••••" class="input-field w-full px-4 py-3.5 rounded-xl text-white text-sm">
                                    <p id="loginPasswordError" class="text-red-400 text-xs mt-1.5 hidden"></p>
                                </div>
                                <div class="flex items-center justify-between">
                                    <button type="button" onclick="showForgotPassword()" class="text-sm text-red-400 hover:text-red-300 transition-colors font-medium">Forgot password?</button>
                                </div>
                                <button type="submit" id="loginBtn" class="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-semibold rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                                    <span id="loginBtnText">Sign In</span>
                                    <div id="loginSpinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                </button>
                            </div>
                        </form>
                    </div>

                    <div id="signupPanel" class="form-panel hidden-panel">
                        <form id="signupForm" onsubmit="handleSignup(event)" novalidate>
                            <div class="space-y-4">
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="block text-sm font-medium text-slate-300 mb-2">First Name</label>
                                        <input type="text" id="firstName" placeholder="Ahmed" class="input-field w-full px-4 py-3.5 rounded-xl text-white text-sm">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-slate-300 mb-2">Last Name</label>
                                        <input type="text" id="lastName" placeholder="Ali" class="input-field w-full px-4 py-3.5 rounded-xl text-white text-sm">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Grade</label>
                                    <select id="signupGrade" class="input-field w-full px-4 py-3.5 rounded-xl text-slate-300 text-sm bg-[#020617]">
                                        <option value="1">1st Secondary</option>
                                        <option value="2">2nd Secondary</option>
                                        <option value="3">3rd Secondary</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                                    <input type="email" id="signupEmail" placeholder="student@example.com" class="input-field w-full px-4 py-3.5 rounded-xl text-white text-sm">
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="block text-sm font-medium text-slate-300 mb-2">Student Phone</label>
                                        <input type="tel" id="signupPhone" placeholder="01XXXXXXXXX" class="input-field w-full px-4 py-3.5 rounded-xl text-white text-sm">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-slate-300 mb-2">Parent Phone</label>
                                        <input type="tel" id="parentPhone" placeholder="01XXXXXXXXX" class="input-field w-full px-4 py-3.5 rounded-xl text-white text-sm">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                                    <input type="password" id="signupPassword" placeholder="••••••••" class="input-field w-full px-4 py-3.5 rounded-xl text-white text-sm">
                                </div>
                                <button type="submit" id="signupBtn" class="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-semibold rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                                    <span id="signupBtnText">Create Account</span>
                                    <div id="signupSpinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                </button>
                            </div>
                        </form>
                    </div>

                    <div id="forgotPanel" class="form-panel hidden-panel">
                         <form onsubmit="handleForgotPassword(event)">
                            <div class="space-y-5">
                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                                    <input type="email" id="forgotEmail" placeholder="student@example.com" class="input-field w-full px-4 py-3.5 rounded-xl text-white text-sm">
                                </div>
                                <button type="submit" class="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-semibold rounded-xl transition-all">Send Reset Link</button>
                                <button type="button" onclick="switchTab('login')" class="w-full text-sm text-slate-400">Back to Login</button>
                            </div>
                         </form>
                    </div>

                    <div class="flex items-center gap-4 my-6">
                        <div class="flex-1 h-px bg-white/10"></div>
                        <span class="text-xs text-slate-500 uppercase tracking-wide">or</span>
                        <div class="flex-1 h-px bg-white/10"></div>
                    </div>

                    <button onclick="socialLogin('Google')" class="w-full flex items-center justify-center gap-2 py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl transition-all text-sm font-medium text-slate-300">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5"> Google
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // 1. Supabase Config
        const SUPABASE_URL = "https://kspfjzewkpfoeyocbzbm.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_4RiANbDn7lrulIbcXHS_3A_ANMSwaYp";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const adminEmail = "kevin.hany.08@proton.me";

        lucide.createIcons();

        // 2. Device ID Logic
        function getLocalDeviceId() {
            let did = localStorage.getItem('mp_device_id');
            if (!did) {
                did = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('mp_device_id', did);
            }
            return did;
        }

        // 3. UI Helpers
        function switchTab(tab) {
            const panels = ['loginPanel', 'signupPanel', 'forgotPanel'];
            panels.forEach(p => {
                document.getElementById(p).classList.add('hidden-panel');
                document.getElementById(p).classList.remove('active-panel');
            });
            
            document.getElementById(tab + 'Panel').classList.remove('hidden-panel');
            document.getElementById(tab + 'Panel').classList.add('active-panel');
            
            document.getElementById('loginTab').className = tab === 'login' ? 'flex-1 py-3 rounded-lg text-sm font-semibold tab-active' : 'flex-1 py-3 rounded-lg text-sm font-semibold tab-inactive';
            document.getElementById('signupTab').className = tab === 'signup' ? 'flex-1 py-3 rounded-lg text-sm font-semibold tab-active' : 'flex-1 py-3 rounded-lg text-sm font-semibold tab-inactive';
        }

        function showForgotPassword() {
            switchTab('forgot');
        }

        function showToast(msg, type='success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast flex items-center gap-3 px-5 py-4 rounded-xl border backdrop-blur-md ${type==='error'?'bg-red-500/20 text-red-300':'bg-green-500/20 text-green-300'}`;
            toast.innerHTML = `<span class="text-sm font-medium">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // 4. Auth Logic
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');

            btn.disabled = true; spinner.classList.remove('hidden');

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if (error) {
                showToast(error.message, 'error');
                btn.disabled = false; spinner.classList.add('hidden');
                return;
            }

            if (email === adminEmail) {
                window.location.href = "teacher-dashboard.html";
                return;
            }

            const deviceId = getLocalDeviceId();
            const { data: dbUser } = await supabaseClient.from('users').select('devices').eq('id', data.user.id).single();
            let userDevices = dbUser?.devices || [];

            if (!userDevices.includes(deviceId)) {
                if (userDevices.length >= 2) {
                    await supabaseClient.auth.signOut();
                    showToast("Device limit reached (Max 2)", 'error');
                    btn.disabled = false; spinner.classList.add('hidden');
                    return;
                } else {
                    userDevices.push(deviceId);
                    await supabaseClient.from('users').update({ devices: userDevices }).eq('id', data.user.id);
                }
            }
            window.location.href = "dashboard.html";
        }

        async function handleSignup(e) {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPassword').value;
            const fname = document.getElementById('firstName').value;
            const lname = document.getElementById('lastName').value;
            const grade = document.getElementById('signupGrade').value;
            const phone = document.getElementById('signupPhone').value;
            const pphone = document.getElementById('parentPhone').value;

            const { data, error } = await supabaseClient.auth.signUp({ email, password: pass });
            if (error) return showToast(error.message, 'error');

            if (data.user) {
                const deviceId = getLocalDeviceId();
                await supabaseClient.from('users').insert([{
                    id: data.user.id,
                    name: `${fname} ${lname}`,
                    email, grade, phone, parentphone: pphone,
                    studentid: Math.floor(100000 + Math.random() * 900000).toString(),
                    role: "student",
                    devices: [deviceId]
                }]);
            }
            window.location.href = "dashboard.html";
        }

        async function socialLogin(provider) {
            await supabaseClient.auth.signInWithOAuth({ 
                provider: provider.toLowerCase(),
                options: { redirectTo: window.location.origin }
            });
        }

        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
            if (error) showToast(error.message, 'error');
            else showToast("Reset link sent to your email!");
        }

        // Check Session
        (async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) window.location.href = "dashboard.html";
        })();
    </script>
</body>
</html>
