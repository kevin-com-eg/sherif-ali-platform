<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MathPro | MR Sherif Ali</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-slate-100 font-[Tajawal]">


<div class="min-h-screen flex items-center justify-center p-6">

<div class="grid md:grid-cols-2 gap-12 items-center max-w-6xl w-full">


<!-- LEFT SIDE -->

<div class="text-center">

<img src="images/sherif.png"
class="w-72 mx-auto rounded-full shadow-2xl border-8 border-purple-500">

<h2 class="text-3xl font-bold mt-6 bg-purple-600 text-white inline-block px-6 py-2 rounded-xl">

MR Sherif Ali

</h2>

<p class="text-gray-600 mt-4">

أفضل شرح للرياضيات لطلاب الثانوية العامة

</p>

</div>


<!-- RIGHT SIDE -->

<div class="bg-white p-8 rounded-2xl shadow-xl">

<h1 class="text-3xl font-black mb-6 text-gray-800">

المذاكرة بقت أقرب وأسهل

</h1>


<!-- TABS -->

<div class="flex mb-6">

<button id="loginTab"
class="flex-1 p-3 bg-teal-700 text-white rounded-r-xl">

تسجيل الدخول

</button>

<button id="signupTab"
class="flex-1 p-3 bg-gray-200 rounded-l-xl">

إنشاء حساب

</button>

</div>


<!-- FORM -->

<input id="name"
placeholder="الاسم"
class="w-full p-3 border rounded-lg mb-4 hidden">

<input id="email"
placeholder="البريد الإلكتروني"
class="w-full p-3 border rounded-lg mb-4">

<input id="password"
type="password"
placeholder="كلمة المرور"
class="w-full p-3 border rounded-lg mb-4">


<button id="actionBtn"
class="w-full bg-teal-700 text-white p-3 rounded-lg font-bold">

تسجيل الدخول

</button>


<button id="googleBtn"
class="w-full bg-red-500 text-white p-3 rounded-lg mt-3 font-bold">

الدخول بجوجل

</button>

</div>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
signInWithPopup,
GoogleAuthProvider
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig={
apiKey:"AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
authDomain:"math-e62c9.firebaseapp.com",
projectId:"math-e62c9",
appId:"1:271507842148:web:2907aad4caf67afd08ab71"
}

const app=initializeApp(firebaseConfig)

const auth=getAuth(app)

const email=document.getElementById("email")
const password=document.getElementById("password")
const name=document.getElementById("name")

const actionBtn=document.getElementById("actionBtn")

let mode="login"


document.getElementById("signupTab").onclick=()=>{

mode="signup"

name.classList.remove("hidden")

actionBtn.innerText="إنشاء حساب"

}


document.getElementById("loginTab").onclick=()=>{

mode="login"

name.classList.add("hidden")

actionBtn.innerText="تسجيل الدخول"

}


actionBtn.onclick=async()=>{

try{

if(mode==="login"){

await signInWithEmailAndPassword(auth,email.value,password.value)

}

else{

await createUserWithEmailAndPassword(auth,email.value,password.value)

}

window.location="dashboard.html"

}

catch(e){

alert(e.message)

}

}


document.getElementById("googleBtn").onclick=async()=>{

const provider=new GoogleAuthProvider()

await signInWithPopup(auth,provider)

window.location="dashboard.html"

}

</script>

</body>
</html>
