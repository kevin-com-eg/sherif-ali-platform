<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MathPro | Sherif Ali</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
body{
font-family:'Tajawal',sans-serif;
transition:background-color 0.4s,color 0.2s;
}

.fade-in{
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

.hover-scale{
transition:transform .2s;
}
.hover-scale:hover{
transform:scale(1.02);
}

input[type="password"]{
letter-spacing:2px;
}
</style>

</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-900 dark:to-gray-800 min-h-screen">

<!-- NAVBAR -->

<nav class="flex justify-between items-center p-6 max-w-6xl mx-auto">

<h1 class="text-3xl font-black text-orange-500">

Math<span class="text-gray-800 dark:text-white">Pro</span>

</h1>

<button id="modeBtn"
class="bg-orange-500 text-white px-5 py-2 rounded-xl">

🌙

</button>

</nav>


<!-- HERO -->

<div class="grid md:grid-cols-2 gap-8 items-center max-w-6xl mx-auto p-6 fade-in">

<div class="text-center">

<img src="images/sherif.png"
class="w-72 mx-auto rounded-full shadow-2xl border-8 border-orange-500">

<h2 class="text-3xl font-bold mt-6 bg-orange-500 text-white inline-block px-8 py-3 rounded-xl">

MR Sherif Ali

</h2>

<p class="text-gray-600 dark:text-gray-300 mt-4">

أفضل شرح للرياضيات لطلاب الثانوية العامة

</p>

</div>


<!-- LOGIN CARD -->

<div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-xl hover-scale">

<h1 class="text-3xl font-black mb-6 text-gray-800 dark:text-white text-center">

المذاكرة بقت أقرب وأسهل

</h1>

<div class="flex mb-6">

<button id="loginTab"
class="flex-1 p-3 bg-orange-500 text-white rounded-r-xl">

تسجيل الدخول

</button>

<button id="signupTab"
class="flex-1 p-3 bg-gray-200 dark:bg-gray-700 rounded-l-xl">

إنشاء حساب

</button>

</div>

<div id="nameField" class="hidden">

<input id="name"
placeholder="الاسم"
class="w-full p-3 border rounded-lg mb-4">

</div>

<input id="email"
placeholder="البريد الإلكتروني"
class="w-full p-3 border rounded-lg mb-4">

<input id="password"
type="password"
placeholder="كلمة المرور"
class="w-full p-3 border rounded-lg mb-4">

<button id="actionBtn"
class="w-full bg-orange-500 text-white p-3 rounded-lg font-bold">

تسجيل الدخول

</button>

<button id="googleBtn"
class="w-full bg-red-500 text-white p-3 rounded-lg mt-3 font-bold">

الدخول بجوجل

</button>

</div>

</div>


<footer class="text-center mt-16 p-6 text-gray-600 dark:text-gray-400">

© 2026 MathPro Platform — All Rights Reserved

</footer>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
signInWithPopup,
GoogleAuthProvider
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig={
apiKey:"AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
authDomain:"math-e62c9.firebaseapp.com",
projectId:"math-e62c9",
appId:"1:271507842148:web:2907aad4caf67afd08ab71"
}

const app=initializeApp(firebaseConfig)

const auth=getAuth(app)

const adminEmail="kevin.hany.08@proton.me"

const email=document.getElementById("email")
const password=document.getElementById("password")
const nameField=document.getElementById("nameField")

const actionBtn=document.getElementById("actionBtn")

let mode="login"


document.getElementById("signupTab").onclick=()=>{

mode="signup"

nameField.classList.remove("hidden")

actionBtn.innerText="إنشاء حساب"

}


document.getElementById("loginTab").onclick=()=>{

mode="login"

nameField.classList.add("hidden")

actionBtn.innerText="تسجيل الدخول"

}


actionBtn.onclick=async()=>{

try{

let userCredential

if(mode==="login"){

userCredential = await signInWithEmailAndPassword(auth,email.value,password.value)

}

else{

userCredential = await createUserWithEmailAndPassword(auth,email.value,password.value)

}

const userEmail = userCredential.user.email

if(userEmail === adminEmail){

window.location="teacher-dashboard.html"

}else{

window.location="dashboard.html"

}

}

catch(e){

alert(e.message)

}

}


document.getElementById("googleBtn").onclick=async()=>{

const provider=new GoogleAuthProvider()

const result = await signInWithPopup(auth,provider)

if(result.user.email===adminEmail){

window.location="teacher-dashboard.html"

}else{

window.location="dashboard.html"

}

}


/* DARK MODE */

const modeBtn=document.getElementById("modeBtn")

modeBtn.onclick=()=>{

document.body.classList.toggle("dark")

}

</script>

</body>
</html>
