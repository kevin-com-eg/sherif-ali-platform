<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | الأستاذ شريف علي</title>
    <meta name="theme-color" content="#f8fafc">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>

<style>
/* --- التصميم والشكل (نفس ذوقك العالي) --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
:root {
    --bg: #f8fafc; --bg2: #ffffff; --card: rgba(255, 255, 255, 0.9); 
    --border: rgba(0, 0, 0, 0.08); --g1: #00b578; --g2: #008f5e;
    --glow: rgba(0, 181, 120, 0.15); --muted:#64748b; 
    --text: #0f172a; --text2:#334155; --mono: 'DM Mono', monospace; --sans: 'Tajawal', sans-serif;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; cursor: none; }
#cur-dot { position:fixed; width:8px; height:8px; background:var(--g1); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); box-shadow:0 0 12px var(--g1); transition:width .2s,height .2s; }
#cur-ring { position:fixed; width:36px; height:36px; border:1px solid rgba(0,181,120,.4); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); }
#cvs { position:fixed; inset:0; z-index:0; opacity:.8; }
.page { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; }
nav { position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border); backdrop-filter:blur(24px); background:rgba(255,255,255,.85); }
.nav-w { max-width:1300px; margin:0 auto; padding:0 40px; height:64px; display:flex; align-items:center; justify-content:space-between; }
.logo { display:flex; align-items:center; gap:10px; text-decoration:none; font-family:var(--mono); font-size:1.45rem; color:var(--text); }
.logo b { color:var(--g1); }
.nav-btn { background:linear-gradient(135deg,var(--g1),var(--g2)); color:white; padding:10px 24px; border-radius:10px; font-weight:700; border:none; cursor:pointer; }
main { display:grid; grid-template-columns:1fr 480px; max-width:1300px; margin:0 auto; padding:48px 40px; gap:40px; align-items:center; }
@media(max-width:960px){ main{grid-template-columns:1fr;} .card-col{order:-1;} }
.hero-title { font-size:clamp(2.5rem,5vw,4rem); font-weight:900; line-height:1.1; margin-bottom:20px; }
.hero-title .accent { background:linear-gradient(120deg,var(--g1),var(--g2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.auth-card { background:var(--card); backdrop-filter:blur(40px); border:1px solid var(--border); border-radius:24px; padding:32px; box-shadow:0 30px 60px rgba(0,0,0,0.05); }
.tabs { display:flex; gap:5px; background:rgba(0,0,0,0.05); padding:5px; border-radius:12px; margin-bottom:20px; }
.tab { flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight:700; background:none; color:var(--muted); }
.tab.on { background:white; color:var(--g1); box-shadow:0 4px 10px rgba(0,0,0,0.05); }
.inp { width:100%; padding:12px; border-radius:10px; border:1px solid rgba(0,0,0,0.1); background:rgba(255,255,255,0.5); outline:none; font-family:var(--sans); }
.cta-btn { width:100%; padding:14px; border-radius:12px; border:none; background:linear-gradient(135deg,var(--g1),var(--g2)); color:white; font-weight:900; cursor:pointer; margin-top:10px; }
.hidden { display:none !important; }
.custom-popup-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:0.3s; z-index:9999; }
.custom-popup-overlay.show { opacity:1; pointer-events:all; }
.custom-popup-card { background:white; padding:40px; border-radius:24px; max-width:450px; width:90%; text-align:center; }
</style>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<canvas id="cvs"></canvas>

<div id="googleProfilePopup" class="custom-popup-overlay">
    <div class="custom-popup-card">
        <h3 style="font-weight:900; font-size:1.5rem; margin-bottom:10px;">خطوة أخيرة يا بطل! 🚀</h3>
        <p style="color:var(--muted); margin-bottom:20px;">كمل بياناتك عشان تفتح المنصة</p>
        <div style="display:flex; flex-direction:column; gap:10px; text-align:right;">
            <label style="font-size:0.8rem; font-weight:700;">الصف الدراسي</label>
            <select id="googleGrade" class="inp">
                <option value="" disabled selected>اختر صفك...</option>
                <option value="1">الأول الثانوي</option>
                <option value="2">الثاني الثانوي</option>
                <option value="3">الثالث الثانوي</option>
            </select>
            <label style="font-size:0.8rem; font-weight:700;">رقم موبايلك</label>
            <input type="text" id="googlePhone" class="inp" placeholder="01xxxxxxxxx">
            <label style="font-size:0.8rem; font-weight:700;">رقم ولي الأمر</label>
            <input type="text" id="googleParentPhone" class="inp" placeholder="01xxxxxxxxx">
        </div>
        <button id="saveGoogleProfileBtn" class="cta-btn">حفظ ودخول ⚡</button>
    </div>
</div>

<div class="page">
    <nav>
        <div class="nav-w">
            <a class="logo" href="#">Math<b>Pro</b></a>
            <button class="nav-btn">دخول المنصة</button>
        </div>
    </nav>

    <main>
        <div class="hero">
            <h1 class="hero-title">تعلّم الرياضيات <br><span class="accent">بذكاء واحترافية</span></h1>
            <p style="color:var(--text2); line-height:1.8; margin-bottom:30px;">منصة الأستاذ شريف علي - طريقك للدرجة النهائية في الثانوية العامة بأسلوب شرح حديث ومبسط.</p>
            <div style="display:flex; gap:15px;">
                <div style="background:white; padding:15px; border-radius:15px; border:1px solid var(--border); text-align:center; flex:1;">
                    <div style="font-weight:900; color:var(--g1); font-size:1.5rem;">+500</div>
                    <div style="font-size:0.7rem; color:var(--muted);">طالب مشترك</div>
                </div>
                <div style="background:white; padding:15px; border-radius:15px; border:1px solid var(--border); text-align:center; flex:1;">
                    <div style="font-weight:900; color:var(--g1); font-size:1.5rem;">+120</div>
                    <div style="font-size:0.7rem; color:var(--muted);">درس فيديو</div>
                </div>
            </div>
        </div>

        <div class="card-col">
            <div class="auth-card" id="authCard">
                <div class="tabs">
                    <button class="tab on" id="loginTab">دخول</button>
                    <button class="tab" id="signupTab">حساب جديد</button>
                </div>

                <div id="extraFields" class="hidden" style="display:flex; flex-direction:column; gap:10px; margin-bottom:10px;">
                    <input id="userName" class="inp" placeholder="الاسم الرباعي">
                    <select id="userGrade" class="inp">
                        <option value="" disabled selected>اختر الصف الدراسي...</option>
                        <option value="1">الصف الأول الثانوي</option>
                        <option value="2">الصف الثاني الثانوي</option>
                        <option value="3">الصف الثالث الثانوي</option>
                    </select>
                    <input id="userPhone" class="inp" placeholder="رقم الموبايل">
                    <input id="parentPhone" class="inp" placeholder="رقم ولي الأمر">
                </div>

                <div style="display:flex; flex-direction:column; gap:10px;">
                    <input id="email" type="email" class="inp" placeholder="البريد الإلكتروني">
                    <input id="password" type="password" class="inp" placeholder="كلمة المرور">
                </div>

                <button class="cta-btn" id="actionBtn">دخول ←</button>

                <div style="text-align:center; margin:15px 0; color:var(--muted); font-size:0.7rem;">أو عبر</div>

                <button class="cta-btn" id="googleBtn" style="background:white; color:#333; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; gap:10px;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    /* --- 1. إعدادات Appwrite (باستخدام الـ ID بتاعك) --- */
    const { Client, Account, Databases, ID } = Appwrite;
    const client = new Client()
        .setEndpoint('https://cloud.appwrite.io/v1') 
        .setProject('1353123456788765432345679876543'); 

    const account = new Account(client);
    const databases = new Databases(client);

    const DB_ID = "MainDB"; 
    const USERS_COL = "users"; 
    const adminEmail = "kevin.hany.08@proton.me";

    // دالة معرف الجهاز
    function getLocalDeviceId() {
        let did = localStorage.getItem('mp_device_id');
        if (!did) {
            did = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            localStorage.setItem('mp_device_id', did);
        }
        return did;
    }

    // فحص الجلسة والتوجه للـ Dashboard
    async function checkSession() {
        try {
            const session = await account.get();
            if (session) {
                if (session.email === adminEmail) {
                    window.location.href = "teacher-dashboard.html";
                    return;
                }
                
                try {
                    const dbUser = await databases.getDocument(DB_ID, USERS_COL, session.$id);
                    const deviceId = getLocalDeviceId();
                    let userDevices = dbUser.devices || [];
                    
                    if (!userDevices.includes(deviceId)) {
                        if (userDevices.length >= 2) {
                            await account.deleteSession('current');
                            alert("⚠️ الحساب مسجل على جهازين بالفعل!");
                            return;
                        } else {
                            userDevices.push(deviceId);
                            await databases.updateDocument(DB_ID, USERS_COL, session.$id, { devices: userDevices });
                        }
                    }

                    if (!dbUser.phone || !dbUser.parentphone) {
                        document.getElementById('googleProfilePopup').classList.add('show');
                    } else {
                        window.location.href = "dashboard.html";
                    }
                } catch (e) {
                    document.getElementById('googleProfilePopup').classList.add('show');
                }
            }
        } catch (err) { console.log("مستني تسجيل الدخول"); }
    }
    checkSession();

    // تبديل Login/Signup
    let mode = "login";
    const lTab = document.getElementById("loginTab"), sTab = document.getElementById("signupTab");
    const extra = document.getElementById("extraFields"), btn = document.getElementById("actionBtn");

    sTab.onclick = () => { mode="signup"; extra.classList.remove("hidden"); btn.textContent="إنشاء حساب ←"; sTab.classList.add("on"); lTab.classList.remove("on"); };
    lTab.onclick = () => { mode="login"; extra.classList.add("hidden"); btn.textContent="دخول ←"; lTab.classList.add("on"); sTab.classList.remove("on"); };

    // تنفيذ الدخول/التسجيل
    btn.onclick = async () => {
        const e = document.getElementById("email").value;
        const p = document.getElementById("password").value;
        if(!e || !p) return alert("اكتب البيانات!");

        try {
            if (mode === "signup") {
                const n = document.getElementById("userName").value;
                const g = document.getElementById("userGrade").value;
                const ph = document.getElementById("userPhone").value;
                const pp = document.getElementById("parentPhone").value;
                if(!n || !g || !ph || !pp) return alert("اكمل بياناتك");

                btn.textContent = "جاري الحفظ...";
                const user = await account.create(ID.unique(), e, p, n);
                await account.createEmailPasswordSession(e, p);
                
                await databases.createDocument(DB_ID, USERS_COL, user.$id, {
                    name: n, email: e, grade: g, phone: ph, parentphone: pp,
                    studentid: Math.floor(100000 + Math.random() * 900000).toString(),
                    role: "student", devices: [getLocalDeviceId()]
                });
                window.location.href = "dashboard.html";
            } else {
                btn.textContent = "جاري التحقق...";
                await account.createEmailPasswordSession(e, p);
                checkSession(); 
            }
        } catch (err) { alert("خطأ: " + err.message); btn.textContent = "حاول مرة أخرى"; }
    };

    // جوجل
    document.getElementById("googleBtn").onclick = () => {
        account.createOAuth2Session('google', window.location.href, window.location.href);
    };

    // حفظ بروفايل جوجل
    document.getElementById('saveGoogleProfileBtn').onclick = async () => {
        const g = document.getElementById('googleGrade').value;
        const ph = document.getElementById('googlePhone').value;
        const pp = document.getElementById('googleParentPhone').value;
        if(!g || !ph || !pp) return alert("اكمل البيانات");

        try {
            const user = await account.get();
            await databases.createDocument(DB_ID, USERS_COL, user.$id, {
                name: user.name, email: user.email, grade: g, phone: ph, parentphone: pp,
                studentid: Math.floor(100000 + Math.random() * 900000).toString(),
                role: "student", devices: [getLocalDeviceId()]
            });
            window.location.href = "dashboard.html";
        } catch(e) { alert(e.message); }
    };

    /* --- الأنيميشن (الماوس والخلفية) --- */
    const dot=document.getElementById('cur-dot'), ring=document.getElementById('cur-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
    (function ar(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ar);})();

    const c=document.getElementById('cvs'),cx=c.getContext('2d');
    let W,H,pts=[];
    function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
    resize(); window.addEventListener('resize',resize);
    class P{
        constructor(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;this.r=Math.random()*1.5;}
        update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W)this.vx*=-1;if(this.y<0||this.y>H)this.vy*=-1;}
        draw(){cx.beginPath();cx.arc(this.x,this.y,this.r,0,Math.PI*2);cx.fillStyle='rgba(0,181,120,0.3)';cx.fill();}
    }
    for(let i=0;i<60;i++)pts.push(new P());
    (function anim(){
        cx.clearRect(0,0,W,H); pts.forEach(p=>{p.update();p.draw();});
        requestAnimationFrame(anim);
    })();
</script>
</body>
</html>
