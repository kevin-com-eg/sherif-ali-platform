<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MathPro | Sherif Ali</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
body{
font-family:'Tajawal',sans-serif;
transition:background-color 0.4s, color 0.2s;
}

/* تحسينات الشكل */
.fade-in{
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* تأثيرات إضافية */
.hover-scale{
transition: transform 0.2s;
}
.hover-scale:hover{
transform: scale(1.02);
}

/* تحسين خط الباسورد */
input[type="password"]{
letter-spacing: 2px;
}
</style>

</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-900 dark:to-gray-800 min-h-screen">

<!-- إضافة خلفية متدرجة خفيفة -->


<!-- NAVBAR -->

<nav class="flex justify-between items-center p-6 max-w-6xl mx-auto relative z-10">

<h1 class="text-3xl font-black text-orange-500 drop-shadow-md">

Math<span class="text-gray-800 dark:text-white">Pro</span>

</h1>

<button id="modeBtn"
class="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 rounded-xl shadow-lg transition-all duration-300 hover:shadow-xl flex items-center gap-2">

<span>🌙</span>
<span class="text-sm">ليلي</span>

</button>

</nav>



<!-- HERO -->

<div class="grid md:grid-cols-2 gap-8 items-center max-w-6xl mx-auto p-6 fade-in">


<!-- LEFT - تحسين الصورة والنص -->

<div class="text-center relative">

<!-- دائرة خلفية مزخرفة -->
<div class="absolute inset-0 bg-orange-500/10 rounded-full blur-3xl -z-10"></div>

<img src="images/sherif.png"
class="w-72 mx-auto rounded-full shadow-2xl border-8 border-orange-500 hover:border-orange-600 transition-all duration-300 hover:scale-105"

onerror="this.src='https://via.placeholder.com/300x300/ff8800/ffffff?text=Sherif+Ali'">

<h2 class="text-3xl font-bold mt-6 bg-gradient-to-l from-orange-500 to-orange-600 text-white inline-block px-8 py-3 rounded-xl shadow-lg">

MR Sherif Ali

</h2>

<p class="text-gray-600 dark:text-gray-300 mt-4 text-lg">

أفضل شرح للرياضيات لطلاب الثانوية العامة

</p>

<!-- إضافة شريط إحصائيات بسيط -->
<div class="flex justify-center gap-6 mt-6">
<div class="text-center">
<div class="text-2xl font-bold text-orange-500">+50</div>
<div class="text-sm text-gray-500">فيديو</div>
</div>
<div class="text-center">
<div class="text-2xl font-bold text-orange-500">+5000</div>
<div class="text-sm text-gray-500">طالب</div>
</div>
<div class="text-center">
<div class="text-2xl font-bold text-orange-500">⭐ 4.9</div>
<div class="text-sm text-gray-500">تقييم</div>
</div>
</div>

</div>



<!-- RIGHT LOGIN CARD - تحسين البطاقة -->

<div class="bg-white/90 dark:bg-gray-800/90 backdrop-blur-sm p-8 rounded-3xl shadow-2xl border border-white/20 dark:border-gray-700/30 hover-scale">

<h1 class="text-3xl font-black mb-6 text-gray-800 dark:text-white text-center">

✨ المذاكرة بقت أقرب وأسهل

</h1>


<!-- TABS - تحسين التبويب -->

<div class="flex mb-8 p-1 bg-gray-100 dark:bg-gray-700 rounded-2xl">

<button id="loginTab"
class="flex-1 p-3 bg-orange-500 text-white rounded-xl shadow-md transition-all duration-300 font-bold">

تسجيل الدخول

</button>

<button id="signupTab"
class="flex-1 p-3 bg-transparent text-gray-600 dark:text-gray-300 rounded-xl font-bold transition-all duration-300 hover:bg-gray-200 dark:hover:bg-gray-600">

إنشاء حساب

</button>

</div>


<!-- إضافة أيقونات للحقول -->

<div class="space-y-4">

<div class="relative hidden" id="nameField">
<span class="absolute right-3 top-3 text-gray-400">👤</span>
<input id="name"
placeholder="الاسم الكامل"
class="w-full p-3 pr-10 border-2 border-gray-200 dark:border-gray-700 rounded-xl focus:border-orange-500 focus:outline-none transition dark:bg-gray-700 dark:text-white">
</div>

<div class="relative">
<span class="absolute right-3 top-3 text-gray-400">📧</span>
<input id="email"
type="email"
placeholder="البريد الإلكتروني"
class="w-full p-3 pr-10 border-2 border-gray-200 dark:border-gray-700 rounded-xl focus:border-orange-500 focus:outline-none transition dark:bg-gray-700 dark:text-white">
</div>

<div class="relative">
<span class="absolute right-3 top-3 text-gray-400">🔒</span>
<input id="password"
type="password"
placeholder="كلمة المرور"
class="w-full p-3 pr-10 border-2 border-gray-200 dark:border-gray-700 rounded-xl focus:border-orange-500 focus:outline-none transition dark:bg-gray-700 dark:text-white">
</div>

</div>


<button id="actionBtn"
class="w-full bg-gradient-to-l from-orange-500 to-orange-600 text-white p-3 rounded-xl font-bold mt-6 shadow-lg hover:shadow-xl transition-all duration-300 hover:scale-[1.02] text-lg">

تسجيل الدخول

</button>


<button id="googleBtn"
class="w-full bg-white dark:bg-gray-700 text-gray-700 dark:text-white p-3 rounded-xl font-bold mt-3 border-2 border-gray-200 dark:border-gray-600 hover:bg-red-500 hover:text-white hover:border-red-500 transition-all duration-300 flex items-center justify-center gap-2">

<img src="https://www.google.com/favicon.ico" class="w-5 h-5">
الدخول بجوجل

</button>

<!-- إضافة روابط إضافية -->
<div class="text-center mt-4">
<a href="#" class="text-sm text-orange-500 hover:underline">نسيت كلمة المرور؟</a>
</div>

</div>

</div>



<!-- FOOTER - تحسين التذييل -->

<footer class="text-center mt-16 p-6 text-gray-600 dark:text-gray-400 border-t border-gray-300 dark:border-gray-700">

<div class="max-w-6xl mx-auto">

<p>© 2026 MathPro Platform — جميع الحقوق محفوظة</p>

<div class="flex justify-center gap-4 mt-2 text-sm">
<a href="#" class="hover:text-orange-500 transition">عن المنصة</a>
<a href="#" class="hover:text-orange-500 transition">الشروط</a>
<a href="#" class="hover:text-orange-500 transition">الخصوصية</a>
</div>

</div>

</footer>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
signInWithPopup,
GoogleAuthProvider
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig={
apiKey:"AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
authDomain:"math-e62c9.firebaseapp.com",
projectId:"math-e62c9",
appId:"1:271507842148:web:2907aad4caf67afd08ab71"
}

const app=initializeApp(firebaseConfig)

const auth=getAuth(app)

const email=document.getElementById("email")
const password=document.getElementById("password")
const name=document.getElementById("name")
const nameField=document.getElementById("nameField")

const actionBtn=document.getElementById("actionBtn")
const loginTab=document.getElementById("loginTab")
const signupTab=document.getElementById("signupTab")

let mode="login"



signupTab.onclick=()=>{
mode="signup"
nameField.classList.remove("hidden")
actionBtn.innerText="إنشاء حساب"

// تحديث شكل التبويبات
loginTab.classList.remove("bg-orange-500", "text-white")
loginTab.classList.add("bg-transparent", "text-gray-600", "dark:text-gray-300")
signupTab.classList.add("bg-orange-500", "text-white")
signupTab.classList.remove("bg-transparent", "text-gray-600", "dark:text-gray-300")
}


loginTab.onclick=()=>{
mode="login"
nameField.classList.add("hidden")
actionBtn.innerText="تسجيل الدخول"

// تحديث شكل التبويبات
signupTab.classList.remove("bg-orange-500", "text-white")
signupTab.classList.add("bg-transparent", "text-gray-600", "dark:text-gray-300")
loginTab.classList.add("bg-orange-500", "text-white")
loginTab.classList.remove("bg-transparent", "text-gray-600", "dark:text-gray-300")
}



actionBtn.onclick=async()=>{
try{
if(mode==="login"){
await signInWithEmailAndPassword(auth,email.value,password.value)
}
else{
await createUserWithEmailAndPassword(auth,email.value,password.value)
}
window.location="dashboard.html"
}
catch(e){
alert("خطأ: " + e.message)
}
}



document.getElementById("googleBtn").onclick=async()=>{
const provider=new GoogleAuthProvider()
try{
await signInWithPopup(auth,provider)
window.location="dashboard.html"
} catch(e){
alert("خطأ في تسجيل الدخول بجوجل: " + e.message)
}
}



/* DARK MODE */
const modeBtn=document.getElementById("modeBtn")
let darkMode = false

modeBtn.onclick=()=>{
document.body.classList.toggle("dark")
darkMode = !darkMode
modeBtn.innerHTML = darkMode ? '<span>☀️</span><span class="text-sm">نهاري</span>' : '<span>🌙</span><span class="text-sm">ليلي</span>'
}

// تعيين القيم الافتراضية للتبويبات
loginTab.click()

</script>

</body>
</html>
