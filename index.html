<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | الأستاذ شريف علي</title>
    
    <meta name="theme-color" content="#0b1120">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0b1120; color: #ffffff; overflow-x: hidden; }
        
        /* تأثيرات النيون في الخلفية */
        .glow-bg {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, rgba(11, 17, 32, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
            animation: pulseGlow 8s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
            100% { transform: scale(1.2) translate(20px, -20px); opacity: 1; }
        }

        .glass-card { background: #151e32; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .emerald-text { background: linear-gradient(to left, #34d399, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-green { background: linear-gradient(135deg, #10b981 0%, #047857 100%); transition: 0.3s; }
        .btn-green:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4); }

        input, select { outline: none !important; background: #0b1120 !important; border: 1px solid #1e293b !important; color: #ffffff !important; transition: 0.3s; }
        input:focus, select:focus { border-color: #10b981 !important; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        
        select option { background-color: #151e32; color: white; }

        .fade-in { animation: fadeInUp 0.8s forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen relative flex flex-col">

    <div class="glow-bg top-[-10%] right-[-5%]"></div>
    <div class="glow-bg bottom-[-10%] left-[-5%]" style="animation-delay: -4s;"></div>

    <nav class="w-full z-50 border-b border-gray-800/50 bg-[#0b1120]/80 backdrop-blur-md sticky top-0">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-3xl font-black text-white tracking-tighter">Math<span class="text-emerald-500">Pro</span></h1>
            <button onclick="document.getElementById('authArea').scrollIntoView({ behavior: 'smooth' });" class="btn-green text-white px-6 py-2 rounded-xl font-bold text-sm">دخول المنصة</button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center py-12 px-6">
        <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center w-full">
            
            <div class="fade-in text-center lg:text-right">
                <div class="inline-flex items-center gap-2 bg-gray-800 border border-gray-700 px-4 py-2 rounded-full mb-6">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-sm font-bold text-gray-300">نظام تعليمي متطور لطلاب الثانوية</span>
                </div>
                <h2 class="text-5xl md:text-7xl font-black leading-tight mb-6">
                    تعلم الرياضيات <br> بطريقة <span class="emerald-text">مختلفة</span>
                </h2>
                <p class="text-gray-400 text-lg max-w-xl mx-auto lg:mx-0 mb-10">منصة الأستاذ شريف علي توفر لك شرحاً وافياً لكل جزئية في المنهج مع امتحانات تفاعلية لكل مرحلة دراسية.</p>
            </div>

            <div id="authArea" class="fade-in" style="animation-delay: 0.2s;">
                <div class="glass-card p-8 md:p-10 rounded-[2.5rem] max-w-md mx-auto relative overflow-hidden">
                    
                    <div class="flex p-1.5 bg-[#0b1120] rounded-2xl mb-8 border border-gray-800">
                        <button id="loginTab" class="flex-1 py-3 rounded-xl font-black bg-emerald-600 text-white shadow-lg transition-all">دخول</button>
                        <button id="signupTab" class="flex-1 py-3 rounded-xl font-bold text-gray-500 hover:text-white transition-all">حساب جديد</button>
                    </div>

                    <div id="authFields" class="space-y-4">
                        <div id="extraFields" class="hidden space-y-4">
                            <input id="userName" placeholder="الاسم الرباعي" class="w-full p-4 rounded-xl">
                            
                            <select id="userGrade" class="w-full p-4 rounded-xl text-gray-400">
                                <option value="" disabled selected>اختر الصف الدراسي...</option>
                                <option value="1">الصف الأول الثانوي</option>
                                <option value="2">الصف الثاني الثانوي</option>
                                <option value="3">الصف الثالث الثانوي</option>
                            </select>

                            <div class="grid grid-cols-2 gap-3">
                                <input id="userPhone" placeholder="رقم الطالب" class="w-full p-4 rounded-xl">
                                <input id="parentPhone" placeholder="رقم ولي الأمر" class="w-full p-4 rounded-xl">
                            </div>
                        </div>

                        <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-xl">
                        <input id="password" type="password" placeholder="كلمة المرور" class="w-full p-4 rounded-xl">
                    </div>

                    <div id="forgotArea" class="text-right mt-3 mb-6">
                        <button id="forgotBtn" class="text-xs font-bold text-emerald-500 hover:text-emerald-400">نسيت كلمة المرور؟</button>
                    </div>

                    <button id="actionBtn" class="w-full btn-green text-white py-4 rounded-xl font-black text-lg">دخول</button>
                    
                    <div class="relative my-8 text-center">
                        <hr class="border-gray-700">
                        <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#151e32] px-4 text-xs text-gray-500 font-bold rounded-full">أو عبر</span>
                    </div>

                    <button id="googleBtn" class="w-full flex items-center justify-center gap-3 bg-[#0b1120] border border-gray-700 py-3.5 rounded-xl font-bold text-white hover:bg-gray-800 transition">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> 
                        حساب Google
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-800 bg-[#0b1120] py-8 text-center">
        <p class="text-gray-500 font-bold text-sm">Developed with 💚 By Kevin | MathPro © 2026</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
            authDomain: "math-e62c9.firebaseapp.com",
            projectId: "math-e62c9",
            appId: "1:271507842148:web:2907aad4caf67afd08ab71"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const adminEmail = "kevin.hany.08@proton.me";

        let mode = "login";
        const loginTab = document.getElementById("loginTab");
        const signupTab = document.getElementById("signupTab");
        const extraFields = document.getElementById("extraFields");
        const actionBtn = document.getElementById("actionBtn");

        signupTab.onclick = () => {
            mode = "signup";
            extraFields.classList.remove("hidden"); actionBtn.innerText = "إنشاء حساب جديد 🚀";
            signupTab.className = "flex-1 py-3 rounded-xl font-black bg-emerald-600 text-white shadow-lg";
            loginTab.className = "flex-1 py-3 text-gray-500 font-bold";
        }

        loginTab.onclick = () => {
            mode = "login";
            extraFields.classList.add("hidden"); actionBtn.innerText = "دخول";
            loginTab.className = "flex-1 py-3 rounded-xl font-black bg-emerald-600 text-white shadow-lg";
            signupTab.className = "flex-1 py-3 text-gray-500 font-bold";
        }

        actionBtn.onclick = async () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;

            try {
                if (mode === "signup") {
                    const name = document.getElementById("userName").value;
                    const grade = document.getElementById("userGrade").value;
                    const phone = document.getElementById("userPhone").value;
                    const pPhone = document.getElementById("parentPhone").value;

                    if(!name || !grade || !phone) return alert("من فضلك أكمل جميع بياناتك");

                    actionBtn.innerText = "جاري الإنشاء...";
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    
                    // توليد الـ ID المكون من 6 أرقام للعلامة المائية
                    const randomId = Math.floor(100000 + Math.random() * 900000).toString();

                    await setDoc(doc(db, "users", res.user.uid), {
                        name, grade, phone, parentPhone: pPhone,
                        email, studentId: randomId, role: "student", createdAt: new Date()
                    });
                    window.location = "dashboard.html";
                } else {
                    actionBtn.innerText = "جاري الدخول...";
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    window.location = (email === adminEmail) ? "teacher-dashboard.html" : "dashboard.html";
                }
            } catch(e) { 
                alert("خطأ: " + e.message); 
                actionBtn.innerText = mode === "login" ? "دخول" : "إنشاء حساب جديد 🚀"; 
            }
        };

        document.getElementById("googleBtn").onclick = async () => {
            try {
                const res = await signInWithPopup(auth, new GoogleAuthProvider());
                window.location = (res.user.email === adminEmail) ? "teacher-dashboard.html" : "dashboard.html";
            } catch(e) { alert(e.message); }
        };

        document.getElementById("forgotBtn").onclick = async () => {
            const emailVal = document.getElementById("email").value;
            if(!emailVal) return alert("اكتب إيميلك أولاً");
            try { await sendPasswordResetEmail(auth, emailVal); alert("تم إرسال رابط الاستعادة لإيميلك."); } catch(e) { alert(e.message); }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('App Ready!'))
                    .catch(err => console.log('App Error', err));
            });
        }
    </script>
</body>
</html>
