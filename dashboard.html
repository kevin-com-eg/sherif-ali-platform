<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | رمضان كريم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .ramadan-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        /* زينة رمضان */
        .zena {
            position: absolute; top: 0; left: 0; width: 100%; height: 80px;
            background-image: url('https://www.transparentpng.com/download/ramadan/ramadan-hanging-decor-png-15.png');
            background-repeat: repeat-x; background-size: contain; z-index: 50;
        }
        .card-ramadan { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.3); }
        .gold-text { color: #ffd700; }
        .gold-btn { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); color: #000; }
    </style>
</head>
<body class="ramadan-bg text-white min-h-screen">

    <div class="zena"></div>

    <nav class="p-6 flex justify-between items-center border-b border-gray-700 bg-black bg-opacity-30">
        <div class="flex items-center gap-4">
            <h1 class="text-3xl font-black gold-text tracking-tighter">MathPro</h1>
            <span class="text-xs bg-red-600 px-2 py-1 rounded animate-pulse">مباشر الآن</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleProfile()" class="hover:text-gold-text transition">تعديل الملف الشخصي</button>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-700 px-4 py-2 rounded-lg font-bold">تسجيل خروج</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-8">
        <div class="text-center mb-12 mt-10">
            <h2 class="text-4xl font-black mb-2">أهلاً بك يا بطل في MathPro 🌙</h2>
            <p class="text-xl gold-text font-bold uppercase tracking-widest">رمضان في مصر حاجة تانية</p>
        </div>

        <div class="mb-10 flex justify-center">
            <div class="card-ramadan p-4 rounded-2xl flex items-center gap-4">
                <span class="text-sm">🎶 استمع للأجواء:</span>
                <audio controls class="h-8">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                    </audio>
            </div>
        </div>

        <div id="lessonsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>

        <div id="profileModal" class="fixed inset-0 bg-black bg-opacity-80 hidden z-[100] flex items-center justify-center p-4">
            <div class="bg-gray-800 p-8 rounded-3xl w-full max-w-md border-2 border-gold-text">
                <h3 class="text-2xl font-bold mb-6 gold-text">تعديل بياناتك</h3>
                <input id="newName" type="text" placeholder="الاسم الجديد" class="w-full p-3 rounded-lg bg-gray-700 mb-4 border border-gray-600">
                <button onclick="saveProfile()" class="gold-btn w-full py-3 rounded-xl font-black">حفظ التعديلات</button>
                <button onclick="toggleProfile()" class="w-full mt-2 text-gray-400">إلغاء</button>
            </div>
        </div>

        <footer class="mt-20 text-center pb-10">
            <p class="text-3xl font-black gold-text">كل عام وأنتم بخير</p>
            <p class="text-gray-500 mt-2">رمضان مبارك عليكم وعلى أسرتكم</p>
        </footer>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
        authDomain: "math-e62c9.firebaseapp.com",
        projectId: "math-e62c9",
        appId: "1:271507842148:web:2907aad4caf67afd08ab71"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // تحميل الحصص
    async function loadLessons() {
        const querySnapshot = await getDocs(collection(db, "lessons"));
        const container = document.getElementById("lessonsGrid");
        querySnapshot.forEach((doc) => {
            const lesson = doc.data();
            container.innerHTML += `
                <div class="card-ramadan p-6 rounded-3xl hover:scale-105 transition-all">
                    <h4 class="text-xl font-bold mb-4">${lesson.name}</h4>
                    <a href="lesson.html?id=${doc.id}" class="gold-btn block text-center py-2 rounded-lg font-bold">ابدأ المذاكرة</a>
                </div>
            `;
        });
    }

    // وظائف الواجهة
    window.toggleProfile = () => {
        document.getElementById("profileModal").classList.toggle("hidden");
    };

    window.logout = () => {
        if(confirm("هل تريد تسجيل الخروج؟")) {
            window.location.href = "login.html"; // وجهه لصفحة اللوجن بتاعتك
        }
    };

    window.saveProfile = () => {
        const name = document.getElementById("newName").value;
        if(name) {
            alert("تم تحديث اسمك بنجاح يا " + name);
            toggleProfile();
        }
    };

    loadLessons();
</script>
</body>
</html>
