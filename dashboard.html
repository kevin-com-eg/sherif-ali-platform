<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .lesson-card { transition: transform 0.2s; }
        .lesson-card:hover { transform: translateY(-5px); }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">

    <nav class="bg-orange-600 text-white p-4 shadow-md flex justify-between items-center px-8">
        <h1 class="font-bold text-2xl tracking-tighter">MathPro</h1>
        <div class="flex items-center gap-2">
            <span class="bg-orange-700 px-3 py-1 rounded-full text-sm">منصة الأستاذ شريف علي</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black text-gray-800 dark:text-white border-r-4 border-orange-500 pr-4">
                الحصص المتاحة
            </h2>
        </div>

        <div id="lessons" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div id="loader" class="col-span-full text-center py-20 text-gray-400">جاري تحميل الحصص...</div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
        authDomain: "math-e62c9.firebaseapp.com",
        projectId: "math-e62c9",
        appId: "1:271507842148:web:2907aad4caf67afd08ab71"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const lessonsContainer = document.getElementById("lessons");

    async function loadLessons() {
        try {
            const querySnapshot = await getDocs(collection(db, "lessons"));
            document.getElementById("loader").remove(); // إخفاء كلمة جاري التحميل

            if (querySnapshot.empty) {
                lessonsContainer.innerHTML = `<p class="col-span-full text-center text-gray-500">لا توجد حصص منشورة حالياً.</p>`;
                return;
            }

            querySnapshot.forEach((doc) => {
                const lesson = doc.data();
                // تصحيح: استخدام الحقل lesson.name كما هو موجود في صورتك من Firebase
                const lessonName = lesson.name || "حصة بدون اسم"; 

                lessonsContainer.innerHTML += `
                    <div class="lesson-card bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 flex flex-col justify-between">
                        <div>
                            <div class="bg-orange-100 text-orange-600 w-fit px-3 py-1 rounded-lg text-xs font-bold mb-4">ثالثة ثانوي</div>
                            <h3 class="text-xl font-bold mb-2 text-gray-800 dark:text-white leading-tight">
                                ${lessonName}
                            </h3>
                            <p class="text-gray-500 dark:text-gray-400 mb-6 text-sm">
                                المدرس: MR Sherif Ali
                            </p>
                        </div>
                        
                        <a href="lesson.html?id=${doc.id}" 
                           class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl block text-center transition shadow-md shadow-orange-200">
                            ابدأ الحصة الآن
                        </a>
                    </div>
                `;
            });
        } catch (error) {
            console.error("Error loading lessons:", error);
            document.getElementById("loader").innerText = "حدث خطأ أثناء تحميل البيانات. تأكد من إعدادات Firebase.";
        }
    }

    loadLessons();
</script>

</body>
</html>
