<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPro | لوحة الطالب 🌙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0b0e14; color: white; overflow-x: hidden; }
        .gold-gradient { background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* زينة رمضان */
        .zena-rope {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: url('https://www.transparentpng.com/download/ramadan/ramadan-hanging-decor-png-15.png') repeat-x;
            background-size: contain; opacity: 0.6; z-index: 10;
        }

        .lesson-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            border-radius: 2rem;
        }
        .lesson-card:hover {
            transform: translateY(-10px);
            border-color: #f97316;
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.2);
        }

        .audio-player {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid #f97316;
            border-radius: 50px;
        }
    </style>
</head>
<body>

    <div class="zena-rope"></div>

    <nav class="flex justify-between items-center p-6 border-b border-gray-800 bg-black/50 sticky top-0 z-40 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center font-black text-white shadow-lg shadow-orange-500/50">M</div>
            <h1 class="text-2xl font-black tracking-tighter gold-gradient">MathPro</h1>
        </div>
        
        <div class="flex items-center gap-4 md:gap-6">
            <button onclick="openProfile()" class="text-sm font-bold text-gray-400 hover:text-orange-500 transition">الملف الشخصي</button>
            <button id="logoutBtn" class="bg-red-500/10 text-red-500 border border-red-500/20 px-4 py-2 rounded-xl font-bold hover:bg-red-500 hover:text-white transition">خروج</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        
        <div class="text-center mb-16">
            <h2 class="text-4xl md:text-5xl font-black mb-4 leading-tight">أهلاً بك يا بطل، <br> <span class="gold-gradient" id="userNameDisplay">جاري التحميل...</span> 🌙</h2>
            <p class="text-gray-400 text-lg italic">"رمضان في مصر حاجة تانية.. ومذاكرتك معانا كمان!"</p>
            
            <div class="mt-8 flex justify-center">
                <div class="audio-player px-6 py-2 flex items-center gap-4">
                    <span class="text-xs font-bold text-orange-500 tracking-widest">🎶 رمضان في مصر</span>
                    <audio id="ramadanSong" loop>
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                    </audio>
                    <button onclick="toggleMusic()" id="musicBtn" class="bg-orange-500 w-8 h-8 rounded-full flex items-center justify-center text-white shadow-lg">▶</button>
                </div>
            </div>
        </div>

        <h3 class="text-xl font-bold mb-8 flex items-center gap-2">
            <span class="w-2 h-8 bg-orange-500 rounded-full"></span>
            دروسك المتاحة
        </h3>

        <div id="lessonsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>

        <footer class="mt-32 text-center border-t border-gray-800 pt-10 pb-10">
            <p class="text-3xl font-black gold-gradient mb-2">كل عام وأنتم بخير</p>
            <p class="text-gray-500 text-sm">© 2026 MathPro Platform — All Rights Reserved</p>
            <p class="text-gray-400 mt-4 font-bold">Developed with ❤️ By <span class="text-orange-500">Kevin Hany</span></p>
            <p class="text-xs text-gray-600">01064233004</p>
        </footer>
    </main>

    <div id="profileModal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-orange-500/30 p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h3 class="text-2xl font-black mb-6 gold-gradient text-center">بياناتك الشخصية</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-orange-500 font-bold uppercase mr-2">الاسم بالكامل</label>
                    <input id="editName" type="text" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-xl outline-none focus:border-orange-500 text-white transition">
                </div>
                <div>
                    <label class="text-[10px] text-orange-500 font-bold uppercase mr-2">رقم تليفونك</label>
                    <input id="editPhone" type="tel" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-xl outline-none focus:border-orange-500 text-white transition">
                </div>
                <div>
                    <label class="text-[10px] text-orange-500 font-bold uppercase mr-2">رقم ولي الأمر</label>
                    <input id="editParentPhone" type="tel" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-xl outline-none focus:border-orange-500 text-white transition">
                </div>
                
                <button onclick="updateProfile()" id="saveBtn" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-orange-500/20 hover:bg-orange-600 transition mt-4">حفظ البيانات</button>
                <button onclick="closeProfile()" class="w-full text-gray-500 font-bold text-sm">إغلاق</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
        authDomain: "math-e62c9.firebaseapp.com",
        projectId: "math-e62c9",
        appId: "1:271507842148:web:2907aad4caf67afd08ab71"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser;

    // 1. التحقق من المستخدم وتحميل بياناته
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                const data = userSnap.data();
                document.getElementById('userNameDisplay').innerText = data.name || user.email.split('@')[0];
                document.getElementById('editName').value = data.name || "";
                document.getElementById('editPhone').value = data.phone || "";
                document.getElementById('editParentPhone').value = data.parentPhone || "";
            } else {
                document.getElementById('userNameDisplay').innerText = user.email.split('@')[0];
            }
            loadLessons();
        } else {
            window.location.href = "index.html";
        }
    });

    // 2. تحميل الحصص
    async function loadLessons() {
        const querySnapshot = await getDocs(collection(db, "lessons"));
        const grid = document.getElementById("lessonsGrid");
        grid.innerHTML = "";
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            grid.innerHTML += `
                <div class="lesson-card p-8 flex flex-col justify-between">
                    <div>
                        <span class="text-[10px] font-bold text-orange-500 bg-orange-500/10 px-3 py-1 rounded-full border border-orange-500/20">حصة جديدة</span>
                        <h4 class="text-2xl font-black mt-4 mb-2">${data.name}</h4>
                        <p class="text-gray-500 text-sm mb-8 leading-relaxed">استعد لتقفيل المادة مع أقوى شرح وتدريبات.</p>
                    </div>
                    <a href="lesson.html?id=${doc.id}" class="w-full bg-white text-black font-black py-4 rounded-2xl text-center hover:bg-orange-500 hover:text-white transition-all shadow-xl">ابدأ المذاكرة ←</a>
                </div>
            `;
        });
    }

    // 3. تحديث الملف الشخصي
    window.updateProfile = async () => {
        const name = document.getElementById('editName').value;
        const phone = document.getElementById('editPhone').value;
        const pPhone = document.getElementById('editParentPhone').value;
        const btn = document.getElementById('saveBtn');

        if(!name || !phone || !pPhone) return alert("املأ كل الخانات يا بطل!");

        btn.innerText = "جاري الحفظ...";
        try {
            await setDoc(doc(db, "users", currentUser.uid), {
                name, phone, parentPhone: pPhone, email: currentUser.email
            }, { merge: true });
            document.getElementById('userNameDisplay').innerText = name;
            alert("تم حفظ بياناتك بنجاح! ✅");
            closeProfile();
        } catch (e) { alert("حدث خطأ في الحفظ"); }
        btn.innerText = "حفظ البيانات";
    }

    // وظائف الواجهة
    window.toggleMusic = () => {
        const song = document.getElementById('ramadanSong');
        const btn = document.getElementById('musicBtn');
        if (song.paused) { song.play(); btn.innerText = '⏸'; }
        else { song.pause(); btn.innerText = '▶'; }
    }
    window.openProfile = () => document.getElementById('profileModal').classList.remove('hidden');
    window.closeProfile = () => document.getElementById('profileModal').classList.add('hidden');
    document.getElementById('logoutBtn').onclick = () => { if(confirm("خارج يا بطل؟")) signOut(auth); };

</script>
</body>
</html>
