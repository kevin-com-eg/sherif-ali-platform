<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MathPro | Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Tajawal',sans-serif;
}
</style>

</head>


<body class="bg-gray-100 dark:bg-gray-900">


<!-- NAVBAR -->

<nav class="bg-orange-500 text-white p-4 flex justify-between">

<h1 class="font-bold text-xl">

MathPro

</h1>

<span>

حصص الصف الثالث الثانوي

</span>

</nav>



<div class="max-w-6xl mx-auto p-6">


<h2 class="text-2xl font-bold mb-6">

الحصص المتاحة

</h2>



<div id="lessons"
class="grid md:grid-cols-3 gap-6">

</div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyByKmG7LLj9JMq2O94gS1-da2Kt8ghLzMo",
authDomain:"math-e62c9.firebaseapp.com",
projectId:"math-e62c9",
appId:"1:271507842148:web:2907aad4caf67afd08ab71"
}

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)


const lessonsContainer=document.getElementById("lessons")



async function loadLessons(){

const querySnapshot = await getDocs(collection(db,"lessons"))

querySnapshot.forEach((doc)=>{

const lesson = doc.data()

lessonsContainer.innerHTML += `

<div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">

<h3 class="text-xl font-bold mb-2">

${lesson.title}

</h3>

<p class="text-gray-500 mb-4">

المدرس: MR Sherif Ali

</p>

<a href="lesson.html?id=${doc.id}"

class="bg-orange-500 text-white px-4 py-2 rounded-lg block text-center">

فتح الحصة

</a>

</div>

`

})

}

loadLessons()

</script>

</body>
</html>
